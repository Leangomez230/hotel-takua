<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>TK Serrano — Restaurante</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet"/>
<style>
:root{--sidebar:#1a2035;--sw:72px;--accent:#00c9b1}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Nunito',sans-serif;background:#f0f4f8;color:#1a2035;min-height:100vh;font-size:14px;overflow-x:hidden}
button{cursor:pointer;border:none;font-family:inherit;font-size:14px;transition:all .15s}
input,select,textarea{font-family:inherit;font-size:14px;border:1.5px solid #e2e8f0;border-radius:10px;padding:10px 14px;width:100%;outline:none;transition:border-color .2s;background:#fff;color:#1a2035}
input:focus,select:focus,textarea:focus{border-color:var(--accent)}

/* SIDEBAR */
.sidebar{width:var(--sw);background:var(--sidebar);position:fixed;top:0;left:0;bottom:0;z-index:200;display:flex;flex-direction:column;align-items:center;padding:14px 0;gap:2px}
.s-logo{width:44px;height:44px;background:var(--accent);border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:900;color:#fff;margin-bottom:18px;flex-shrink:0}
.nav-btn{width:58px;height:52px;border-radius:12px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;cursor:pointer;color:#64748b;border:none;background:none;font-family:'Nunito',sans-serif;transition:all .15s;flex-shrink:0}
.nav-btn:hover{background:rgba(255,255,255,.07);color:#fff}
.nav-btn.active{background:rgba(0,201,177,.18);color:var(--accent)}
.nav-btn .ni{font-size:18px;line-height:1}
.nav-btn .nl{font-size:8px;font-weight:700;letter-spacing:.3px;text-transform:uppercase}
.nav-btn.bottom{margin-top:auto}
.main-wrap{margin-left:var(--sw);display:flex;flex-direction:column;min-height:100vh}

/* TOPBAR */
.topbar{background:#fff;padding:12px 22px;display:flex;align-items:center;gap:10px;border-bottom:1px solid #e8edf3;position:sticky;top:0;z-index:100}
.tb-left{flex:1}
.tb-left h2{font-size:16px;font-weight:800;color:#1a2035;margin:0}
.tb-left p{font-size:12px;color:#64748b;margin:0}
.tb-right{display:flex;align-items:center;gap:8px}
.tb-btn{background:#f0f4f8;border:none;border-radius:8px;padding:7px 14px;font-size:13px;font-weight:700;color:#1a2035;cursor:pointer;font-family:inherit}
.tb-btn:hover{background:#e2e8f0}
.tb-btn.salon{background:#0f766e;color:#99f6e4}
.tb-btn.salon:hover{background:#0d9488}
.tb-btn.salir{color:#dc2626}
.user-av-tb{width:34px;height:34px;border-radius:50%;background:var(--accent);display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:800;color:#fff;flex-shrink:0}

/* PANTALLAS */
.screen{display:none;min-height:100vh}
.screen.active{display:flex;flex-direction:column}

/* LOGIN */
#screen-login{align-items:center;justify-content:center;background:linear-gradient(160deg,#0f172a,#1e3a5f 60%,#0f172a);padding:20px}
.login-box{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);border-radius:24px;padding:36px 32px;width:100%;max-width:360px}
.login-logo{text-align:center;margin-bottom:28px}
.login-logo .icon{font-size:48px;margin-bottom:10px}
.login-logo h1{color:#fff;font-size:22px;font-weight:800}
.login-logo p{color:#94a3b8;font-size:12px;letter-spacing:2px;text-transform:uppercase;margin-top:3px}
.lf{margin-bottom:14px}
.lf label{display:block;color:#94a3b8;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}
.lf input{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15);border-radius:10px;padding:11px 14px;color:#fff;font-size:14px;width:100%}
.lf input:focus{outline:none;border-color:#3b82f6}
.lf input::placeholder{color:#64748b}
.login-btn{width:100%;background:#3b82f6;border:none;border-radius:12px;padding:14px;color:#fff;font-size:15px;font-weight:800;font-family:inherit;cursor:pointer;margin-top:4px}
.login-btn:hover{background:#2563eb}
.login-err{color:#f87171;font-size:12px;text-align:center;margin-top:8px;display:none}

/* HEADER */










/* CONTENT */
.content{padding:clamp(12px,3vw,20px);max-width:760px;margin:0 auto;flex:1}

/* PILLS ESTADO */
.pills-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px}
.pill-estado{display:flex;align-items:center;gap:5px;border-radius:20px;padding:5px 13px;font-size:13px;font-weight:600;border:1.5px solid}

/* TARJETAS MÉTRICAS estilo habitaciones */
.metricas-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px}
@media(max-width:700px){.metricas-grid{grid-template-columns:repeat(2,1fr)}}
@media(max-width:400px){.metricas-grid{grid-template-columns:1fr 1fr}}
.metrica-card{border-radius:16px;padding:16px 14px;color:#fff;position:relative;overflow:hidden;min-height:90px;border:none}
.metrica-card::after{content:'';position:absolute;right:-15px;bottom:-15px;width:80px;height:80px;border-radius:50%;background:rgba(255,255,255,.08)}
.metrica-card .mc-lbl{font-size:9px;font-weight:700;letter-spacing:1px;opacity:.75;text-transform:uppercase}
.metrica-card .mc-ttl{font-size:11px;font-weight:800;opacity:.9;margin-bottom:4px}
.metrica-card .mc-val{font-size:clamp(18px,3vw,22px);font-weight:900;line-height:1.1}
.mc-total  {background:linear-gradient(135deg,#059669,#10b981)}
.mc-cobradas{background:linear-gradient(135deg,#2563eb,#3b82f6)}
.mc-comen  {background:linear-gradient(135deg,#f59e0b,#fbbf24)}
.mc-desc   {background:linear-gradient(135deg,#ec4899,#f43f5e)}

/* MAPA SALÓN */
.mapa-wrap{background:#fff;border-radius:18px;border:1px solid #e2e8f0;overflow:hidden;margin-bottom:20px}
.mapa-inner{overflow-x:auto;padding:16px 16px 8px}
.mapa-canvas{position:relative;min-width:600px}
.barra-ref{border-radius:10px;background:#f1f5f9;border:2px solid #cbd5e1;display:flex;align-items:center;justify-content:center;height:44px;margin-top:8px}
.barra-ref span{font-weight:700;font-size:13px;color:#94a3b8;letter-spacing:3px}
.s-mesa{position:absolute;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;border:2.5px solid;transition:box-shadow .15s,transform .1s;user-select:none;touch-action:none}
.s-mesa:active{transform:scale(.95)}
.s-mesa.libre  {background:#dcfce7;border-color:#16a34a}
.s-mesa.ocupada{background:#fee2e2;border-color:#dc2626}
.s-mesa.cuenta {background:#ffedd5;border-color:#ea580c}
.s-mesa.reservada{background:#ede9fe;border-color:#7c3aed}
.s-mesa.redonda{border-radius:50%}
.s-mesa:not(.redonda){border-radius:10px}
.s-mesa.dragging{opacity:.7;box-shadow:0 8px 32px rgba(0,0,0,.25);z-index:50;transform:scale(1.05)}
.s-mesa.sel-unir{box-shadow:0 0 0 3px #f59e0b!important;border-color:#f59e0b!important}
.s-mesa-num{font-size:12px;font-weight:800;line-height:1}
.s-mesa-sub{font-size:9px;opacity:.6;margin-top:1px}
.s-mesa-total{font-size:10px;font-weight:700;margin-top:2px}

/* CARD BASE */
.card{background:#fff;border-radius:16px;border:1px solid #e2e8f0;padding:20px;margin-bottom:16px}
.card-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.card-title{font-weight:700;font-size:16px}

/* DESPLEGABLE */
.desplegable{background:#fff;border-radius:16px;border:1px solid #e2e8f0;margin-bottom:16px;overflow:hidden}
.desp-btn{width:100%;padding:16px 20px;display:flex;justify-content:space-between;align-items:center;background:none;border:none;cursor:pointer;text-align:left}
.desp-left{display:flex;align-items:center;gap:10px}
.desp-icon{font-size:20px}
.desp-title{font-weight:700;font-size:15px;color:#1e293b}
.desp-sub{font-size:12px;color:#64748b}
.desp-arrow{width:32px;height:32px;border-radius:50%;background:#f1f5f9;display:flex;align-items:center;justify-content:center;font-size:14px;color:#475569;transition:transform .25s;flex-shrink:0}
.desp-arrow.open{transform:rotate(180deg)}
.desp-body{max-height:0;overflow:hidden;transition:max-height .4s ease}
.desp-body.open{max-height:1200px}
.desp-content{padding:0 16px 20px}

/* CAJA */
.caja-turno-info{display:flex;align-items:center;gap:8px;margin-bottom:4px}
.dot-green{width:10px;height:10px;border-radius:50%;background:#22c55e;flex-shrink:0}
.resumen-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:16px}
.resumen-item{border-radius:12px;padding:12px 14px;border:1px solid}

/* TABLA COMANDAS */
.cmd-row{display:flex;justify-content:space-between;align-items:center;padding:10px 14px;background:#fff;border:1px solid #f1f5f9;border-radius:10px;margin-bottom:6px}

/* MESAS CAJA - tarjetas de cuenta pendiente */
.cuenta-cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:10px;margin-bottom:20px}
.cuenta-card{background:#fff;border:1.5px solid #c4b5fd;border-radius:14px;padding:16px;cursor:pointer;transition:box-shadow .15s}
.cuenta-card:hover{box-shadow:0 4px 16px rgba(124,58,237,.15)}

/* MODAL BOTTOM SHEET */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:200;display:none;align-items:flex-end;justify-content:center}
.overlay.open{display:flex}
.modal{background:#fff;border-radius:20px 20px 0 0;width:100%;max-width:680px;max-height:92vh;display:flex;flex-direction:column;overflow:hidden;box-shadow:0 -8px 40px rgba(0,0,0,.2);animation:slideUp .22s ease}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.modal-handle{display:flex;justify-content:center;padding:10px 0 4px}
.modal-handle div{width:40px;height:4px;border-radius:2px;background:#e2e8f0}
.modal-header{display:flex;align-items:center;justify-content:space-between;padding:8px 20px 12px}
.modal-title{font-weight:700;font-size:17px}
.modal-body{flex:1;overflow-y:auto;padding:0 20px 24px}
.btn-close-modal{background:#f1f5f9;border:none;border-radius:50%;width:36px;height:36px;cursor:pointer;font-size:18px;color:#64748b;display:flex;align-items:center;justify-content:center;flex-shrink:0}

/* ITEMS COMANDA */
.item-row{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid #f1f5f9}
.item-row:last-child{border:none}
.item-name{flex:1;font-size:14px;font-weight:500}
.item-qty-ctrl{display:flex;align-items:center;gap:8px}
.qty-btn{width:28px;height:28px;border-radius:8px;border:1px solid #e2e8f0;background:#f8fafc;font-size:15px;font-weight:700;display:flex;align-items:center;justify-content:center}
.qty-btn:hover{background:#e2e8f0}
.item-precio{font-size:13px;font-weight:600;color:#475569;min-width:70px;text-align:right}
.comanda-total-row{display:flex;justify-content:space-between;font-size:16px;font-weight:800;padding:12px 0;border-top:2px solid #f1f5f9;margin-top:4px}

/* MENÚ GRID */
.cats-row{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px}
.cat-pill{padding:6px 14px;border-radius:20px;border:none;font-size:12px;font-weight:600;background:#f1f5f9;color:#64748b;cursor:pointer}
.cat-pill.active{background:#3b82f6;color:#fff}
.menu-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:8px;max-height:260px;overflow-y:auto}
.menu-item-btn{padding:12px;border-radius:12px;border:1.5px solid #e2e8f0;background:#f8fafc;cursor:pointer;text-align:left;transition:all .15s}
.menu-item-btn:hover{border-color:#3b82f6;background:#eff6ff}
.menu-item-nombre{font-size:13px;font-weight:600;margin-bottom:2px}
.menu-item-precio{font-size:13px;font-weight:700;color:#3b82f6}

/* ADMIN MENÚ */
.prod-row{display:flex;align-items:center;gap:10px;padding:12px 14px;border-radius:12px;background:#f8fafc;border:1px solid #f1f5f9;margin-bottom:6px}
.prod-nombre{flex:1;font-weight:600;font-size:14px}
.prod-precio{font-size:13px;font-weight:700;color:#475569;margin-right:4px}
.btn-sm{padding:6px 12px;border-radius:8px;font-size:12px;font-weight:600}

/* USUARIOS */
.user-row{display:flex;align-items:center;gap:10px;padding:12px 14px;background:#fff;border:1px solid #f1f5f9;border-radius:12px;margin-bottom:6px}
.user-av{width:36px;height:36px;border-radius:50%;background:#f1f5f9;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.user-info{flex:1}
.user-nombre{font-weight:700;font-size:14px}
.user-sub{font-size:12px;color:#64748b}

/* ADMIN MENÚ FORM */
.form-grid-2{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px}
@media(max-width:400px){.form-grid-2{grid-template-columns:1fr}}

/* BTN PRIMARIO */
.btn-primary{width:100%;padding:14px;border-radius:12px;border:none;background:#3b82f6;color:#fff;font-weight:700;font-size:15px;cursor:pointer;font-family:inherit}
.btn-primary:hover{background:#2563eb}
.btn-primary:disabled{background:#cbd5e1;cursor:not-allowed}
.btn-green{background:#22c55e;color:#fff;border-radius:12px;border:none;padding:12px 20px;font-weight:700;font-size:15px;cursor:pointer;font-family:inherit}
.btn-green:hover{background:#16a34a}
.btn-red{background:#ef4444;color:#fff;border-radius:10px;border:none;padding:10px 16px;font-weight:700;font-size:13px;cursor:pointer}
.btn-ghost-light{background:#f8fafc;border:1px solid #e2e8f0;border-radius:10px;padding:10px 14px;font-size:13px;font-weight:600;color:#475569;cursor:pointer;font-family:inherit}
.btn-ghost-light:hover{background:#f1f5f9}
.btn-purple{background:#8b5cf6;color:#fff;border-radius:12px;border:none;padding:13px;font-weight:700;font-size:15px;cursor:pointer;width:100%;font-family:inherit}
.btn-purple:hover{background:#7c3aed}

/* TOAST */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#1e293b;color:#fff;border-radius:12px;padding:12px 20px;font-size:13px;font-weight:600;z-index:9999;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1}

/* LOADING */
.loading-overlay{position:fixed;inset:0;background:rgba(241,245,249,.7);z-index:300;display:none;align-items:center;justify-content:center}
.loading-overlay.active{display:flex}
.spinner{width:32px;height:32px;border:3px solid #e2e8f0;border-top-color:#3b82f6;border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.empty{text-align:center;padding:40px 20px;color:#94a3b8}
.empty .ei{font-size:36px;margin-bottom:10px}

/* VISTA CLIENTE */
#screen-cliente{background:#f1f5f9;align-items:center;justify-content:center;padding:20px}
.cliente-box{width:100%;max-width:400px}
.cliente-card{background:#fff;border-radius:18px;border:1px solid #e2e8f0;overflow:hidden;margin-bottom:14px}
.cliente-header-card{padding:20px;border-bottom:1px solid #f1f5f9;text-align:center}
.cliente-mesa-num{font-size:36px;font-weight:800;color:#3b82f6}
.cliente-label{font-size:12px;color:#94a3b8;text-transform:uppercase;letter-spacing:.1em}
.cliente-item{display:flex;justify-content:space-between;align-items:center;padding:12px 20px;border-bottom:1px solid #f8fafc}
.cliente-item:last-child{border:none}
.cliente-total{display:flex;justify-content:space-between;align-items:center;padding:16px 20px;background:#f8fafc;border-top:2px solid #e2e8f0}
.cliente-estado{text-align:center;padding:12px;border-radius:12px;font-size:13px;font-weight:600;border:1.5px solid}

/* NOTA INPUT */
.nota-row{display:flex;gap:8px;margin-bottom:14px}
.nota-row input{flex:1;padding:9px 12px;border-radius:9px;font-size:13px}

/* ABRIR TURNO FORM */
.turno-form{display:flex;gap:10px;align-items:stretch}
.turno-form input{flex:1;font-size:15px;padding:12px 14px}

/* INFO COMANDA BAND */
.cmd-band{margin:0 0 10px;padding:8px 14px;border-radius:10px;background:#f8fafc;border:1px solid #e2e8f0;display:flex;gap:16px;font-size:12px;color:#64748b;flex-wrap:wrap}

/* MÉTRICAS POR MÉTODO */
.metodo-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(110px,1fr));gap:8px;margin-bottom:16px}
.metodo-card{background:#f8fafc;border-radius:10px;padding:10px 12px;border:1px solid #e2e8f0}

/* HISTORIAL */
.hist-table{width:100%;border-collapse:collapse;font-size:13px}
.hist-table th{text-align:left;color:#94a3b8;padding:8px 10px;border-bottom:1px solid #f1f5f9;font-size:11px;text-transform:uppercase;letter-spacing:.05em}
.hist-table td{padding:10px 10px;border-bottom:1px solid #f8fafc;vertical-align:middle}
.hist-table tr:last-child td{border:none}

@media(max-width:500px){
  .metricas-grid{grid-template-columns:1fr 1fr}
  .resumen-grid{grid-template-columns:1fr 1fr}
  .form-grid-2{grid-template-columns:1fr}
}
</style>
</head>
<body>

<div class="loading-overlay" id="loading"><div class="spinner"></div></div>
<div class="toast" id="toast"></div>

<!-- ══ LOGIN ══ -->
<div class="screen" id="screen-login" style="display:none"></div>

<!-- ══ MAIN ══ -->
<div class="screen" id="screen-main">
  <nav class="sidebar" id="sidebar">
    <div class="s-logo">T</div>
    <button class="nav-btn" onclick="irA('dashboard')"><span class="ni">🏠</span><span class="nl">Inicio</span></button>
    <button class="nav-btn" onclick="irA('habitaciones')"><span class="ni">🛏</span><span class="nl">Habitaciones</span></button>
    <button class="nav-btn" onclick="irA('reservas')"><span class="ni">📅</span><span class="nl">Reservas</span></button>
    <button class="nav-btn" onclick="irA('huespedes')"><span class="ni">👤</span><span class="nl">Huéspedes</span></button>
    <button class="nav-btn" onclick="irA('tienda')"><span class="ni">🛒</span><span class="nl">Tienda POS</span></button>
    <button class="nav-btn" onclick="irA('inventario')"><span class="ni">📦</span><span class="nl">Inventario</span></button>
    <button class="nav-btn" onclick="irA('caja')"><span class="ni">💰</span><span class="nl">Caja</span></button>
    <button class="nav-btn" onclick="irA('finanzas')"><span class="ni">📊</span><span class="nl">Finanzas</span></button>
    <button class="nav-btn active" id="snav-salon" onclick="snav('salon')"><span class="ni">🍽️</span><span class="nl">Restaurante</span></button>
    <button class="nav-btn bottom" id="nav-config" onclick="irA('config')" style="display:none"><span class="ni">⚙️</span><span class="nl">Config</span></button>
  </nav>
  <div class="main-wrap">
    <div class="topbar">
      <div class="tb-left">
        <h2>TK Serrano — Restaurante</h2>
        <p id="header-sub">—</p>
      </div>
      <div class="tb-right">
        <div class="user-av-tb" id="user-av-tb">A</div>
        <button class="tb-btn salir" onclick="doLogout()">Salir</button>
      </div>
    </div>
    <div style="padding:clamp(12px,3vw,20px);max-width:760px;margin:0 auto;flex:1" id="main-content"></div>
  </div>
</div>

<!-- ══ SALON EDITOR (Admin) ══ -->
<div class="screen" id="screen-salon">
  <nav class="sidebar">
    <div class="s-logo">T</div>
    <button class="nav-btn" onclick="irA('dashboard')"><span class="ni">🏠</span><span class="nl">Inicio</span></button>
    <button class="nav-btn" onclick="irA('habitaciones')"><span class="ni">🛏</span><span class="nl">Habitaciones</span></button>
    <button class="nav-btn" onclick="irA('reservas')"><span class="ni">📅</span><span class="nl">Reservas</span></button>
    <button class="nav-btn" onclick="irA('huespedes')"><span class="ni">👤</span><span class="nl">Huéspedes</span></button>
    <button class="nav-btn" onclick="irA('tienda')"><span class="ni">🛒</span><span class="nl">Tienda POS</span></button>
    <button class="nav-btn" onclick="irA('inventario')"><span class="ni">📦</span><span class="nl">Inventario</span></button>
    <button class="nav-btn" onclick="irA('caja')"><span class="ni">💰</span><span class="nl">Caja</span></button>
    <button class="nav-btn" onclick="irA('finanzas')"><span class="ni">📊</span><span class="nl">Finanzas</span></button>
    <button class="nav-btn" onclick="showScreen('screen-main');renderMain()"><span class="ni">🍽️</span><span class="nl">Restaurante</span></button>
    <button class="nav-btn active"><span class="ni">🪑</span><span class="nl">Editor</span></button>
  </nav>
  <div class="main-wrap">

<script>
// ════════════════════════════════════
// CONFIG & STATE
// ════════════════════════════════════
const API = '';
const MESA_STATUS = {
  libre:    {label:'Libre',    color:'#16a34a',bg:'#dcfce7',border:'#16a34a'},
  ocupada:  {label:'Ocupada',  color:'#dc2626',bg:'#fee2e2',border:'#dc2626'},
  cuenta:   {label:'Cuenta',   color:'#ea580c',bg:'#ffedd5',border:'#ea580c'},
  reservada:{label:'Reservada',color:'#7c3aed',bg:'#ede9fe',border:'#7c3aed'},
};
const ROL_LABELS = {mozo:'🍽️ Mozo', cajero:'💰 Cajero', admin:'⚙️ Admin'};
const METODOS = ['Efectivo','Débito','Crédito','Transferencia','QR'];
const METODO_ICONS = {Efectivo:'💵',Débito:'💳',Crédito:'💳',Transferencia:'🏦',QR:'📱'};
const SZ = {redonda:{w:70,h:70}, cuadrada:{w:70,h:70}, rectangular:{w:150,h:70}};

let TOKEN = localStorage.getItem('takua_token')||'';
let ME    = JSON.parse(localStorage.getItem('takua_user')||'null');
let S = { mesas:[], comandas:[], menu:[], turno:null, usuarios:[],
          selMesaId:null, selCmdId:null, destCambioId:null,
          menuEditId:null, modoUnir:false, unirSel:[], ticketData:null };

// ════════════════════════════════════
// UTILS
// ════════════════════════════════════
const fmt = n => '$'+Number(n||0).toLocaleString('es-AR',{minimumFractionDigits:2,maximumFractionDigits:2});
const nowFull = () => new Date().toLocaleString('es-AR',{day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit'});
const mesaLabel = m => m.alias||`M${m.numero||m.id}`;
const mesaDims  = t => SZ[t]||SZ.cuadrada;

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}
function openModal(id)  { document.getElementById(id).classList.add('open'); }
function closeModal(id) { document.getElementById(id).classList.remove('open'); }

let _toastT;
function toast(msg,type='ok') {
  const t = document.getElementById('toast');
  t.textContent = (type==='ok'?'✅ ':type==='err'?'❌ ':'ℹ️ ')+msg;
  t.classList.add('show');
  clearTimeout(_toastT);
  _toastT = setTimeout(()=>t.classList.remove('show'),3000);
}
function loading(on){ document.getElementById('loading').classList.toggle('active',on); }

async function api(method,path,body){
  const opts={method,headers:{'Content-Type':'application/json','Authorization':`Bearer ${TOKEN}`}};
  if(body) opts.body=JSON.stringify(body);
  const r=await fetch(API+path,opts);
  const d=await r.json().catch(()=>({}));
  if(!r.ok) throw new Error(d.error||`Error ${r.status}`);
  return d;
}

// ════════════════════════════════════
// AUTH
// ════════════════════════════════════
async function doLogin(){
  const usuario=document.getElementById('l-user').value.trim();
  const clave  =document.getElementById('l-pass').value;
  const errEl  =document.getElementById('login-err');
  errEl.style.display='none';
  if(!usuario||!clave){errEl.textContent='Completá usuario y contraseña';errEl.style.display='block';return;}
  loading(true);
  try{
    const d=await api('POST','/api/portal/login',{usuario,clave});
    TOKEN=d.token; ME=d.user;
    localStorage.setItem('takua_token',TOKEN);
    localStorage.setItem('takua_user',JSON.stringify(ME));
    await initApp();
  }catch(e){errEl.textContent=e.message;errEl.style.display='block';}
  finally{loading(false);}
}
// Login centralizado en portal.html

function doLogout(){
  TOKEN='';ME=null;
  localStorage.removeItem('takua_token');
  localStorage.removeItem('takua_user');
  window.location.href='/portal.html';
}

// ════════════════════════════════════
// INIT
// ════════════════════════════════════
async function initApp(){
  if(!TOKEN||!ME){window.location.href='/portal.html';return;}
  if(['recepcionista','mucama'].includes(ME.rol)){window.location.href='/index.html';return;}

  const sub = document.getElementById('header-sub');
  sub.textContent = `${ROL_LABELS[ME.rol]||ME.rol} · ${ME.nombre||ME.email||''}`;

  // Configurar sidebar según rol
  if(ME.rol==='admin'){
    const btnConfig = document.getElementById('nav-config');
    if(btnConfig) btnConfig.style.display='';
  }

  showScreen('screen-main');
  await loadAll();
  renderMain();

  // Poll cada 20s — solo actualiza datos en background, sin re-renderizar
  setInterval(async()=>{
    const hayModal     = document.querySelector('.overlay.open');
    const hayFocoInput = document.activeElement &&
                         ['INPUT','TEXTAREA','SELECT'].includes(document.activeElement.tagName);
    const enMain       = document.getElementById('screen-main').classList.contains('active');
    if(!enMain || hayModal || hayFocoInput) return;

    // Guardar estado previo para comparar
    const mesasAntes   = JSON.stringify(S.mesas.map(m=>({id:m.id,status:m.status,total:m.total})));
    const turnoAntes   = JSON.stringify(S.turno?.id);
    const comandasAntes= JSON.stringify(S.comandas.map(c=>({id:c.id,estado:c.estado,total:c.total})));

    await loadAll(true); // silencioso — sin spinner

    // Solo re-renderizar si algo cambió
    const mesasDespues   = JSON.stringify(S.mesas.map(m=>({id:m.id,status:m.status,total:m.total})));
    const turnoDespues   = JSON.stringify(S.turno?.id);
    const comandasDespues= JSON.stringify(S.comandas.map(c=>({id:c.id,estado:c.estado,total:c.total})));

    if(mesasAntes!==mesasDespues || turnoAntes!==turnoDespues || comandasAntes!==comandasDespues){
      renderMain();
    }
  }, 20000);
}

async function loadAll(silencioso=false){
  if(!silencioso) loading(true);
  try{
    const [mesas,menu]=await Promise.all([
      api('GET','/api/restaurante/mesas'),
      api('GET','/api/restaurante/menu'),
    ]);
    S.mesas=mesas; S.menu=menu;
    if(ME.rol==='mozo'){
      S.comandas=await api('GET','/api/restaurante/comandas').catch(()=>[]);
    } else {
      const [turno,turnoUltimo,cmds]=await Promise.all([
        api('GET','/api/restaurante/turno/activo').catch(()=>null),
        api('GET','/api/restaurante/turno/ultimo').catch(()=>null),
        api('GET','/api/restaurante/comandas').catch(()=>[]),
      ]);
      // Si hay turno activo usarlo, sino mostrar el último (cerrado)
      S.turno=turno||turnoUltimo;
      S.comandas=cmds;
    }
    if(ME.rol==='admin'){
      S.usuarios=await api('GET','/api/portal/usuarios').catch(()=>[]);
    }
  }catch(e){toast('Error cargando datos','err');}
  finally{loading(false);}
}

// ════════════════════════════════════
// ════════════════════════════════════
// NAVEGACIÓN SIDEBAR
// ════════════════════════════════════
// Navegar a sección de index.html pasando destino como hash
function irA(seccion) {
  window.location.href = '/index.html#' + seccion;
}

let _snavActual = 'salon';

function snav(id) {
  _snavActual = id;
  document.querySelectorAll('.nav-btn[id^="snav-"]').forEach(b => b.classList.remove('active'));
  const btn = document.getElementById('snav-' + id);
  if (btn) btn.classList.add('active');
  const el = document.getElementById('main-content');
  if (!el) return;
  if (id === 'salon') {
    if (ME.rol === 'mozo') renderMozo(el);
    else if (ME.rol === 'cajero') renderCajero(el);
    else renderAdmin(el);
  }
}

// ════════════════════════════════════
// RENDER MAIN
// ════════════════════════════════════
function renderMain(){
  snav(_snavActual || 'salon');
}

// ── MAPA (solo lectura) ───────────────────────────────
function renderMapa(editable=false){
  if(!S.mesas.length) return `<div class="empty"><div class="ei">🪑</div><p>Sin mesas configuradas</p></div>`;
  const maxX=Math.max(...S.mesas.map(m=>(m.x||50)+(mesaDims(m.tipo).w)))+30;
  const maxY=Math.max(...S.mesas.map(m=>(m.y||50)+(mesaDims(m.tipo).h)))+70;
  const mesasHTML=S.mesas.map(m=>{
    const st=MESA_STATUS[m.status]||MESA_STATUS.libre;
    const {w,h}=mesaDims(m.tipo);
    const x=m.x||50; const y=m.y||50;
    const cmd=S.comandas.find(c=>c.mesa_id===m.id&&c.estado!=='cerrada');
    const br=m.tipo==='redonda'?'50%':'10px';
    const ev=editable
      ? `onmousedown="startDrag(event,${m.id})" ontouchstart="startDragTouch(event,${m.id})" ondblclick="editarMesaSalon(${m.id})"`
      : `onclick="clickMesa(${m.id})"`;
    return `<div id="sm-${m.id}" class="s-mesa ${m.status}" ${ev}
      style="left:${x}px;top:${y}px;width:${w}px;height:${h}px;border-radius:${br};
      background:${st.bg};border-color:${st.border};${editable?'cursor:grab':''}">
      <div class="s-mesa-num" style="color:${st.color}">${mesaLabel(m)}</div>
      ${m.tipo==='rectangular'&&!m.alias?`<div class="s-mesa-sub" style="color:${st.color}">2 mesas</div>`:''}
      ${cmd?`<div class="s-mesa-total" style="color:${st.color}">${fmt(cmd.total||0)}</div>`:''}
    </div>`;
  }).join('');
  return `<div style="position:relative;width:${maxX}px;height:${maxY}px;min-width:320px">${mesasHTML}
    <div class="barra-ref" style="position:absolute;bottom:0;left:0;right:0"><span>BARRA</span></div></div>`;
}

function renderPills(){
  const counts={};
  Object.keys(MESA_STATUS).forEach(k=>counts[k]=0);
  S.mesas.forEach(m=>counts[m.status]=(counts[m.status]||0)+1);
  return Object.entries(MESA_STATUS).map(([k,v])=>
    `<div class="pill-estado" style="background:${v.bg};border-color:${v.border};color:${v.color}">
      <div style="width:8px;height:8px;border-radius:50%;background:${v.color}"></div>
      ${v.label} (${counts[k]||0})
    </div>`
  ).join('');
}

// ── VISTA MOZO ───────────────────────────────────────
function renderMozo(el){
  el.innerHTML=`
    <p style="font-size:13px;color:#64748b;margin-bottom:12px">Tocá una mesa libre para abrir comanda · Tocá una ocupada para ver el pedido</p>
    <div class="pills-row">${renderPills()}</div>
    <div class="mapa-wrap">
      <div class="mapa-inner">${renderMapa(false)}</div>
    </div>`;
}

// ── VISTA CAJERO ─────────────────────────────────────
function renderCajero(el){
  const turno=S.turno;
  const cerradas=turno?((turno.cerradas||[])):[];
  const abiertas=S.comandas.filter(c=>c.estado==='abierta');
  const enCuenta=S.comandas.filter(c=>c.estado==='cuenta');
  const totalNeto=cerradas.reduce((s,c)=>s+(Number(c.total_final)||0),0);
  const totalDesc=cerradas.reduce((s,c)=>s+(Number(c.total||0)-Number(c.total_final||c.total||0)),0);
  const porMetodo=METODOS.reduce((acc,m)=>{acc[m]=cerradas.filter(c=>c.metodo_pago===m).reduce((s,c)=>s+(Number(c.total_final)||0),0);return acc;},{});

  // Tarjetas métricas
  let html=`<div class="metricas-grid">
    <div class="metrica-card mc-total">
      <div class="mc-lbl">Turno actual</div>
      <div class="mc-ttl">TOTAL COBRADO</div>
      <div class="mc-val">${fmt(totalNeto)}</div>
    </div>
    <div class="metrica-card mc-cobradas">
      <div class="mc-lbl">Turno actual</div>
      <div class="mc-ttl">COMANDAS</div>
      <div class="mc-val">${cerradas.length}</div>
    </div>
    <div class="metrica-card mc-comen">
      <div class="mc-lbl">Turno actual</div>
      <div class="mc-ttl">COMENSALES</div>
      <div class="mc-val">${cerradas.reduce((s,c)=>s+(c.comensales||0),0)}</div>
    </div>
    <div class="metrica-card mc-desc">
      <div class="mc-lbl">Turno actual</div>
      <div class="mc-ttl">DESCUENTOS</div>
      <div class="mc-val">${fmt(totalDesc)}</div>
    </div>
  </div>`;

  // Panel caja
  if(!turno){
    html+=`<div class="card">
      <div class="card-title" style="margin-bottom:4px">💰 Caja cerrada</div>
      <div style="font-size:13px;color:#64748b;margin-bottom:16px">Ingresá el fondo inicial para abrir el turno</div>
      <div class="turno-form">
        <input type="number" id="fondo-inp" placeholder="Fondo inicial ($)" min="0"/>
        <button class="btn-green" onclick="abrirTurno()">Abrir turno</button>
      </div></div>`;
  } else if(turno.estado==='cerrado'){
    html+=`<div class="card">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
        <div>
          <div class="card-title">📊 Resumen del turno</div>
          <div style="font-size:12px;color:#64748b">${turno.abierto_at?new Date(turno.abierto_at).toLocaleString('es-AR',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'}):''}</div>
        </div>
        <div style="display:flex;gap:8px">
          <button class="btn-ghost-light" onclick="imprimirArqueo()" style="background:#1e293b;color:#fff">🖨️ Imprimir arqueo</button>
          <button class="btn-ghost-light" onclick="nuevoTurno()">+ Nuevo turno</button>
        </div>
      </div>
      ${renderResumenCaja(turno.fondo_inicial||0,totalNeto,totalDesc,porMetodo,cerradas)}</div>`;
  } else {
    html+=`<div class="card">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;flex-wrap:wrap;gap:10px">
        <div>
          <div class="caja-turno-info"><div class="dot-green"></div><span style="font-weight:700;font-size:17px">Caja abierta</span></div>
          <div style="font-size:12px;color:#64748b">Fondo: ${fmt(turno.fondo_inicial||0)}</div>
        </div>
        <div style="display:flex;gap:8px">
          <button class="btn-ghost-light" onclick="toggleResumen()">Ver detalle</button>
          <button class="btn-ghost-light" onclick="imprimirArqueo()" style="background:#1e293b;color:#fff">🖨️ Imprimir arqueo</button>
          <button class="btn-red" onclick="cerrarTurno()">Cerrar turno</button>
        </div>
      </div>
      <div id="resumen-detail" style="display:none">
        ${renderResumenCaja(turno.fondo_inicial||0,totalNeto,totalDesc,porMetodo,cerradas)}
      </div></div>`;
  }

  // Mesas en cuenta
  if(enCuenta.length){
    html+=`<div class="card"><div class="card-title" style="margin-bottom:12px">🔔 Mesas pidieron la cuenta (${enCuenta.length})</div>
    <div class="cuenta-cards">
      ${enCuenta.map(c=>{
        const mesa=S.mesas.find(m=>m.id===c.mesa_id);
        return `<div class="cuenta-card" onclick="abrirModalCobrar(${c.id})">
          <div style="display:flex;justify-content:space-between;margin-bottom:6px">
            <span style="font-weight:700;font-size:15px">${mesa?mesaLabel(mesa):`Mesa ${c.mesa_id}`}</span>
            <span style="font-size:11px;background:#ede9fe;color:#7c3aed;border-radius:20px;padding:2px 8px;font-weight:600">cuenta</span>
          </div>
          <div style="font-size:12px;color:#64748b;margin-bottom:8px">Mozo: ${c.mozo_nombre||'—'}</div>
          <div style="font-size:20px;font-weight:800;color:#7c3aed">${fmt(c.total)}</div>
          <button class="btn-primary" style="margin-top:10px;padding:10px" onclick="event.stopPropagation();abrirModalCobrar(${c.id})">Cobrar</button>
        </div>`;
      }).join('')}
    </div></div>`;
  }

  // Mapa
  html+=`<div class="card"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
    <div class="card-title">🗺️ Salón</div>
    <div style="display:flex;gap:6px">
      <button class="btn-ghost-light btn-sm" onclick="abrirEditorSalon()">✏️ Editar</button>
      <button class="btn-ghost-light btn-sm" onclick="loadAll().then(renderMain)">↻</button>
    </div>
  </div>
  <div class="pills-row">${renderPills()}</div>
  <div style="overflow-x:auto">${renderMapa(false)}</div></div>`;

  el.innerHTML=html;
}

function renderResumenCaja(fondo,totalNeto,totalDesc,porMetodo,cerradas){
  const totalBruto=totalNeto+totalDesc;
  const activos=METODOS.filter(m=>porMetodo[m]>0);
  return `
    ${activos.length?`<div style="margin-bottom:14px">
      <div style="font-weight:600;font-size:14px;color:#475569;margin-bottom:8px">Por método de pago</div>
      <div class="metodo-grid">
        ${activos.map(m=>`<div class="metodo-card"><div style="font-size:18px">${METODO_ICONS[m]}</div><div style="font-weight:700;font-size:15px">${fmt(porMetodo[m])}</div><div style="font-size:12px;color:#64748b">${m}</div></div>`).join('')}
      </div></div>`:''}
    <div style="background:#f8fafc;border-radius:12px;padding:14px 16px;margin-bottom:14px;border:1px solid #e2e8f0">
      ${[['Fondo inicial',fmt(fondo),'#475569'],['Total bruto',fmt(totalBruto),'#1e293b'],['Descuentos','- '+fmt(totalDesc),'#f97316'],['Total neto',fmt(totalNeto),'#22c55e'],['Total en caja',fmt(Number(fondo)+totalNeto),'#3b82f6']].map(([l,v,c])=>`
        <div style="display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid #f1f5f9">
          <span style="font-size:14px;color:#64748b">${l}</span><span style="font-size:14px;font-weight:700;color:${c}">${v}</span>
        </div>`).join('')}
    </div>
    ${cerradas.length?`<div>
      <div style="font-weight:600;font-size:14px;color:#475569;margin-bottom:8px">Comandas cobradas</div>
      <div style="max-height:220px;overflow-y:auto;display:flex;flex-direction:column;gap:6px">
        ${cerradas.map(c=>{const m=S.mesas.find(ms=>ms.id===c.mesa_id);return `
          <div class="cmd-row">
            <div><span style="font-weight:600;font-size:14px">${m?mesaLabel(m):`Mesa ${c.mesa_id}`}</span>
              ${c.mozo_nombre?`<span style="font-size:11px;color:#64748b;margin-left:6px">👤${c.mozo_nombre}</span>`:''}
              ${c.cajero_nombre?`<span style="font-size:11px;color:#64748b;margin-left:6px">💰${c.cajero_nombre}</span>`:''}
            </div>
            <div style="text-align:right"><div style="font-weight:700;color:#22c55e">${fmt(c.total_final||0)}</div>
              <div style="font-size:11px;color:#64748b">${METODO_ICONS[c.metodo_pago]||''} ${c.metodo_pago||'—'}</div>
            </div>
          </div>`}).join('')}
      </div></div>`:''}`;
}

  _histLoaded=true;
  const el=document.getElementById('hist-content');
  el.innerHTML='<div class="empty"><div class="spinner" style="margin:auto"></div></div>';

async function crearUsuarioAdmin(){
  const nombre=document.getElementById('nu-nombre').value.trim();
  const usuario=document.getElementById('nu-usuario').value.trim();
  const clave=document.getElementById('nu-clave').value;
  const rol=S._rolNuevo||'mozo';
  const errEl=document.getElementById('nu-err');

  if(!nombre||!usuario||!clave){errEl.textContent='Completá nombre, usuario y contraseña';errEl.style.display='block';return;}
  loading(true);
  try{
    await api('POST','/api/portal/usuarios',{nombre,usuario,password:clave,rol});

    document.getElementById('nu-nombre').value='';
    document.getElementById('nu-usuario').value='';

}

async function guardarEdicionProducto(){
  const nombre  =document.getElementById('ep-nombre')?.value.trim();
  const categoria=document.getElementById('ep-cat')?.value;
  const precio  =parseFloat(document.getElementById('ep-precio')?.value);
  if(!nombre||!precio){toast('Completá todos los campos','err');return;}
  loading(true);
  try{
    await api('PUT',`/api/restaurante/menu/${_editProdId}`,{nombre,precio,categoria});
    toast('Producto actualizado ✓','ok');
    _editProdId=null;
    closeModal('m-edit-prod');
    await loadAll(); renderMain();
  }catch(e){toast(e.message,'err');}
  finally{loading(false);}
}
function agregarCategoria(){
  const v=document.getElementById('mp-cat-nueva').value.trim(); if(!v) return;
  const sel=document.getElementById('mp-cat');
  const opt=document.createElement('option');
  opt.value=opt.textContent=v; sel.appendChild(opt); sel.value=v;
  document.getElementById('mp-cat-nueva').value='';
}
async function guardarProducto(){
  const nombre=document.getElementById('mp-nombre').value.trim();
  const precio=parseFloat(document.getElementById('mp-precio').value);
  const categoria=document.getElementById('mp-cat').value||document.getElementById('mp-cat-nueva').value.trim();
  if(!nombre||!precio||!categoria){toast('Completá todos los campos','err');return;}
  loading(true);
  try{
    if(_editProdId){
      await api('PUT',`/api/restaurante/menu/${_editProdId}`,{nombre,precio,categoria});
      toast('Producto actualizado ✓','ok'); _editProdId=null;
      document.getElementById('mp-btn').textContent='Agregar';
    } else {
      await api('POST','/api/restaurante/menu',{nombre,precio,categoria});
      toast('Producto agregado ✓','ok');
    }
    document.getElementById('mp-nombre').value='';
    document.getElementById('mp-precio').value='';
    await loadAll(); renderMain();
  }catch(e){toast(e.message,'err');}
  finally{loading(false);}
}
async function toggleProducto(id,actual){
  loading(true);
  try{
    await api('PUT',`/api/restaurante/menu/${id}`,{disponible:actual?0:1});
    toast(actual?'Producto desactivado':'Producto activado','ok');
    await loadAll(); renderMain();
  }catch(e){toast(e.message,'err');}
  finally{loading(false);}
}

function clickMesa(mesaId){
  const mesa=S.mesas.find(m=>m.id===mesaId); if(!mesa) return;
  S.selMesaId=mesaId;
  const cmd=S.comandas.find(c=>c.mesa_id===mesaId&&c.estado!=='cerrada');
  if(ME.rol==='cajero'||ME.rol==='admin'){
    if(cmd&&(cmd.estado==='cuenta'||cmd.estado==='abierta')) abrirModalCobrar(cmd.id);
    return;
  }
  // Mozo
  if(mesa.status==='libre'||mesa.status==='reservada'){
    document.getElementById('m-abrir-title').textContent=`Nueva comanda — ${mesaLabel(mesa)}`;
    openModal('m-abrir');
  } else if(cmd){
    verComanda(cmd.id);
  }
}

// Items extra fuera de menú (estado local del modal de cobrar)
let _extraItems = [];

function abrirModalCobrar(cmdId){
  const cmd=S.comandas.find(c=>c.id===cmdId); if(!cmd) return;
  S.selCmdId=cmdId;
  _extraItems=[];
  const mesa=S.mesas.find(m=>m.id===cmd.mesa_id);
  document.getElementById('m-cobrar-title').textContent=`Cobrar — ${mesa?mesaLabel(mesa):`Mesa ${cmd.mesa_id}`}`;
  S._cobrarBaseTotal=Number(cmd.total)||0;
  renderModalCobrar(cmd);
  S._metodoIdx=0;
  openModal('m-cobrar');
}

function renderModalCobrar(cmd){
  const items=cmd.items||[];
  const extraTotal=_extraItems.reduce((s,i)=>s+i.precio,0);
  const baseTotal=S._cobrarBaseTotal;
  const subtotal=baseTotal+extraTotal;
  const desc=Number(document.getElementById('cob-desc')?.value)||0;
  const totalFinal=subtotal*(1-desc/100);

  document.getElementById('m-cobrar-body').innerHTML=`
    <!-- Items de la comanda -->
    <div style="margin-bottom:8px;background:#f8fafc;border-radius:10px;padding:10px 12px">
      <div style="font-size:11px;font-weight:700;color:#94a3b8;text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px">Ítems del pedido</div>
      ${items.map(i=>`<div style="display:flex;justify-content:space-between;padding:4px 0;font-size:13px">
        <span>${i.nombre} x${i.cantidad}</span>

      <div style="font-size:11px;font-weight:700;color:#94a3b8;text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px">
        ➕ Ítems extra
        <span style="font-size:10px;color:#94a3b8;font-weight:400;margin-left:4px">(fuera de menú)</span>
      </div>
      <div id="cob-extras">
        ${_extraItems.length===0
          ? `<div style="font-size:12px;color:#cbd5e1;text-align:center;padding:8px">Sin ítems extra</div>`
          : _extraItems.map((it,idx)=>`
            <div style="display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-bottom:1px solid #f1f5f9;font-size:13px">
              <span style="flex:1">${it.nombre}</span>
              <span style="font-weight:600;margin-right:8px">${fmt(it.precio)}</span>
              <button onclick="quitarExtra(${idx})" style="background:#fee2e2;border:none;border-radius:6px;color:#dc2626;font-size:12px;font-weight:700;padding:3px 8px;cursor:pointer">✕</button>
            </div>`).join('')}
      </div>
      <!-- Form agregar extra -->
      <div style="display:flex;gap:6px;margin-top:8px">
        <input type="text" id="extra-nombre" placeholder="Descripción" style="flex:2;padding:8px 10px;border-radius:8px;border:1.5px solid #e2e8f0;font-size:13px"/>
        <input type="number" id="extra-precio" placeholder="$" min="0" style="flex:1;padding:8px 10px;border-radius:8px;border:1.5px solid #e2e8f0;font-size:13px"/>
        <button onclick="agregarExtra()" style="background:#3b82f6;border:none;border-radius:8px;color:#fff;font-weight:700;padding:8px 12px;cursor:pointer;white-space:nowrap">+ Agregar</button>
      </div>
    </div>

    <!-- Totales -->
    <div style="background:#f8fafc;border-radius:10px;padding:10px 14px;margin-bottom:12px">
      <div style="display:flex;justify-content:space-between;font-size:13px;color:#64748b;margin-bottom:4px">
        <span>Subtotal pedido</span><span>${fmt(baseTotal)}</span>
      </div>
      ${extraTotal>0?`<div style="display:flex;justify-content:space-between;font-size:13px;color:#64748b;margin-bottom:4px">
        <span>Ítems extra</span><span>${fmt(extraTotal)}</span>
      </div>`:''}
      <div style="display:flex;justify-content:space-between;font-size:15px;font-weight:800;padding-top:6px;border-top:1px solid #e2e8f0">
        <span>Subtotal</span><span>${fmt(subtotal)}</span>
      </div>
    </div>

    <div style="margin-bottom:12px">
      <label style="font-size:13px;font-weight:600;color:#475569;display:block;margin-bottom:6px">Descuento (%)</label>
      <input type="number" id="cob-desc" value="${desc}" min="0" max="100"
        oninput="updCobrarTotalDinamico(${baseTotal})"/>
    </div>
    <div style="display:flex;justify-content:space-between;font-size:16px;font-weight:800;margin-bottom:14px;color:#22c55e">

          ${METODO_ICONS[m]} ${m}</button>`).join('')}

    <button class="btn-green" style="width:100%;padding:14px" onclick="confirmarCobro(${S.selCmdId},${baseTotal})">✓ Cobrar y cerrar</button>`;

function agregarExtra(){
  const nombre=document.getElementById('extra-nombre')?.value.trim();
  const precio=parseFloat(document.getElementById('extra-precio')?.value)||0;
  if(!nombre||!precio){toast('Completá nombre y precio','err');return;}
  _extraItems.push({nombre,precio});
  document.getElementById('extra-nombre').value='';
  document.getElementById('extra-precio').value='';
  // Re-renderizar solo la parte de extras y totales
  const cmd=S.comandas.find(c=>c.id===S.selCmdId);
  if(cmd) renderModalCobrar(cmd);
  if(S._metodoIdx) selMetodo(S._metodoIdx);
}

function quitarExtra(idx){
  _extraItems.splice(idx,1);
  const cmd=S.comandas.find(c=>c.id===S.selCmdId);
  if(cmd) renderModalCobrar(cmd);
  if(S._metodoIdx) selMetodo(S._metodoIdx);
}

function updCobrarTotalDinamico(base){
  const d=Number(document.getElementById('cob-desc')?.value)||0;
  const extra=_extraItems.reduce((s,i)=>s+i.precio,0);
  document.getElementById('cob-final').textContent=fmt((base+extra)*(1-d/100));
}

function selMetodo(idx){
  S._metodoIdx=idx;
  METODOS.forEach((_,i)=>{
    const b=document.getElementById(`mpbtn-${i}`);
    if(!b) return;
    b.style.borderColor=i===idx?'#3b82f6':'#e2e8f0';
    b.style.background=i===idx?'#eff6ff':'#fff';
    b.style.color=i===idx?'#3b82f6':'#475569';
  });
}

async function confirmarCobro(cmdId,totalOrig){
  const desc=Number(document.getElementById('cob-desc')?.value)||0;
  const metodo=METODOS[S._metodoIdx||0];
  const extra=_extraItems.reduce((s,i)=>s+i.precio,0);
  loading(true);
  try{
    // Si hay ítems extra, agregarlos a la comanda primero
    for(const it of _extraItems){
      await api('POST',`/api/restaurante/comandas/${cmdId}/items/extra`,{
        nombre:it.nombre, precio:it.precio
      });
    }
    await api('POST',`/api/restaurante/comandas/${cmdId}/cerrar`,{metodo_pago:metodo,descuento:desc});
    toast('Cobrado ✓','ok');
    _extraItems=[];
    closeModal('m-cobrar');
    await loadAll(); renderMain();
  }catch(e){toast(e.message,'err');}
  finally{loading(false);}
}

function imprimirArqueo(){
  const turno=S.turno;
  if(!turno) { toast('No hay turno activo','err'); return; }
  const cerradas=turno.cerradas||[];
  const totalNeto=cerradas.reduce((s,c)=>s+(Number(c.total_final)||0),0);
  const totalDesc=cerradas.reduce((s,c)=>s+(Number(c.total||0)-Number(c.total_final||c.total||0)),0);
  const totalBruto=totalNeto+totalDesc;
  const fondo=Number(turno.fondo_inicial)||0;
  const porMetodo=METODOS.reduce((acc,m)=>{
    acc[m]=cerradas.filter(c=>c.metodo_pago===m).reduce((s,c)=>s+(Number(c.total_final)||0),0);
    return acc;
  },{});
  const activos=METODOS.filter(m=>porMetodo[m]>0);

  const linea=(char='-',n=32)=>char.repeat(n);

  const html=`
    <div style="font-family:'Courier New',monospace;font-size:12px;width:280px;margin:0 auto;padding:8px;line-height:1.5">
      <div style="text-align:center;font-weight:700;font-size:14px">🏨 Hotel Takuá</div>
      <div style="text-align:center;font-size:11px">Restaurante — Arqueo de Caja</div>
      <div style="text-align:center;font-size:11px;color:#555">${nowFull()}</div>
      <div style="border-top:1px dashed #999;margin:6px 0"></div>

      <div style="display:flex;justify-content:space-between">
        <span>Cajero:</span><span>${turno.cajero_nombre||'—'}</span>
      </div>
      <div style="display:flex;justify-content:space-between">
        <span>Apertura:</span>
        <span>${turno.abierto_at?new Date(turno.abierto_at).toLocaleString('es-AR',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'}):'-'}</span>
      </div>
      <div style="display:flex;justify-content:space-between">
        <span>Cierre:</span><span>${nowFull()}</span>
      </div>

      <div style="border-top:1px dashed #999;margin:6px 0"></div>

      <div style="font-weight:700;margin-bottom:4px">RESUMEN</div>
      ${[
        ['Fondo inicial',    fmt(fondo)],
        ['Comandas cobradas',cerradas.length+''],
        ['Total bruto',      fmt(totalBruto)],
        ['Descuentos',       '- '+fmt(totalDesc)],
        ['Total neto',       fmt(totalNeto)],
        ['Total en caja',    fmt(fondo+totalNeto)],
      ].map(([l,v])=>`<div style="display:flex;justify-content:space-between">
        <span>${l}</span><span style="font-weight:600">${v}</span>
      </div>`).join('')}

      ${activos.length?`
      <div style="border-top:1px dashed #999;margin:6px 0"></div>
      <div style="font-weight:700;margin-bottom:4px">POR MÉTODO DE PAGO</div>
      ${activos.map(m=>`<div style="display:flex;justify-content:space-between">
        <span>${METODO_ICONS[m]} ${m}</span><span style="font-weight:600">${fmt(porMetodo[m])}</span>
      </div>`).join('')}`:''}

      ${cerradas.length?`
      <div style="border-top:1px dashed #999;margin:6px 0"></div>
      <div style="font-weight:700;margin-bottom:4px">COMANDAS CERRADAS</div>
      ${cerradas.map(c=>{
        const m=S.mesas.find(ms=>ms.id===c.mesa_id);
        return `<div style="display:flex;justify-content:space-between;border-bottom:1px dotted #eee;padding:2px 0">
          <span>${m?mesaLabel(m):'Mesa '+c.mesa_id} ${c.mozo_nombre?'('+c.mozo_nombre+')':''}</span>
          <span style="font-weight:600">${fmt(c.total_final||0)}</span>
        </div>`;
      }).join('')}`:''}

      <div style="border-top:1px dashed #999;margin:6px 0"></div>
      <div style="text-align:center;font-size:11px;margin-top:4px">— Fin del arqueo —</div>
    </div>`;

  // Usar el mismo mecanismo que imprimirComanda
  const iframe=document.createElement('iframe');
  iframe.style.cssText='position:fixed;top:-9999px;left:-9999px;width:320px;height:900px;border:none';
  document.body.appendChild(iframe);
  const doc=iframe.contentDocument||iframe.contentWindow.document;
  doc.open();
  doc.write(`<style>@media print{body{margin:0}}</style>${html}`);
  doc.close();
  setTimeout(()=>{
    iframe.contentWindow.focus();
    iframe.contentWindow.print();
    setTimeout(()=>document.body.removeChild(iframe),1500);
  },400);
}

// Categorías que NO van a cocina
const CATS_BEBIDAS = ['bebidas','bebida','drinks'];
function esBebida(cat){ return CATS_BEBIDAS.includes((cat||'').toLowerCase()); }

function imprimirTicket(tipo){
  const {mesa,cmd}=S.ticketData||{};
  if(!cmd) return;
  const todosItems=cmd.items||[];

  // Filtrar según destino
  const items = tipo==='cocina'
    ? todosItems.filter(it=>!esBebida(it.categoria||''))
    : todosItems;

  if(tipo==='cocina' && !items.length){
    toast('No hay ítems de cocina en esta comanda','info');
    return;
  }

  const esCocina = tipo==='cocina';

let _drag=null;
function abrirEditorSalon(){
  showScreen('screen-salon');
  // Esperar que el canvas esté visible antes de renderizar
  requestAnimationFrame(()=>{
    requestAnimationFrame(()=>{ renderEditorSalon(); });
  });
}

function renderEditorSalon(){
  const canvas=document.getElementById('salon-editor-canvas');
  if(!canvas) return;
  // Asignar posiciones iniciales escalonadas a mesas en 0,0
  let autoX=20, autoY=20;
  // Limpiar listeners anteriores clonando el canvas
  const newCanvas = canvas.cloneNode(false);
  canvas.parentNode.replaceChild(newCanvas, canvas);
  const c = newCanvas;

  // Eventos en el canvas (no en las mesas individuales)
  let _dblClickTimer = null;
  c.addEventListener('mousedown', (e) => {
    const mesaEl = e.target.closest('[data-mesa-id]');
    if (!mesaEl) return;
    const mesaId = parseInt(mesaEl.dataset.mesaId);
    const startX = e.clientX;
    const startY = e.clientY;
    const startLeft = parseFloat(mesaEl.style.left) || 0;
    const startTop  = parseFloat(mesaEl.style.top)  || 0;
    let moved = false;
    mesaEl.classList.add('dragging');

    const onMove = (ev) => {
      const dx = ev.clientX - startX;
      const dy = ev.clientY - startY;
      if (!moved && Math.abs(dx) < 3 && Math.abs(dy) < 3) return;
      moved = true;
      let nx = startLeft + dx;
      let ny = startTop  + dy;
      nx = Math.max(0, Math.min(nx, c.scrollWidth  - mesaEl.offsetWidth));
      ny = Math.max(0, Math.min(ny, c.scrollHeight - mesaEl.offsetHeight));
      mesaEl.style.left = nx + 'px';
      mesaEl.style.top  = ny + 'px';
    };
    const onUp = async (ev) => {
      document.removeEventListener('mousemove', onMove);
      document.removeEventListener('mouseup', onUp);
      mesaEl.classList.remove('dragging');
      if (!moved) {
        // Modo unir: clic simple selecciona la mesa
        if (S.modoUnir) {
          seleccionarParaUnir(mesaId);
          return;
        }
        // Modo normal: doble clic para editar
        if (_dblClickTimer) {
          clearTimeout(_dblClickTimer);
          _dblClickTimer = null;
          editarMesaSalon(mesaId);
        } else {
          _dblClickTimer = setTimeout(() => { _dblClickTimer = null; }, 300);
        }
        return;
      }
      const nx = Math.round(parseFloat(mesaEl.style.left) / 10) * 10;
      const ny = Math.round(parseFloat(mesaEl.style.top)  / 10) * 10;
      mesaEl.style.left = nx + 'px';
      mesaEl.style.top  = ny + 'px';
      try {
        const m = S.mesas.find(x => x.id === mesaId);
        await api('PUT', `/api/restaurante/mesas/${mesaId}`, {
          x: nx, y: ny, tipo: m?.tipo || 'cuadrada',
          alias: m?.alias || '', numero: m?.numero || null
        });
        S.mesas = S.mesas.map(x => x.id === mesaId ? {...x, x: nx, y: ny} : x);
        toast('Posición guardada ✓', 'ok');
      } catch(err) { toast('Error guardando posición', 'err'); }
    };
    document.addEventListener('mousemove', onMove);
    document.addEventListener('mouseup', onUp);
  });

  c.innerHTML=S.mesas.map((m,idx)=>{
    const st=MESA_STATUS[m.status]||MESA_STATUS.libre;
    const {w,h}=mesaDims(m.tipo);
    // Si está en 0,0 asignar posición automática (no se guarda hasta que el usuario la mueva)
    let x=m.x, y=m.y;
    if(!x && !y){
      x=autoX; y=autoY;
      autoX+=w+15;
      if(autoX>750){autoX=20; autoY+=h+15;}
    }
    const br=m.tipo==='redonda'?'50%':'10px';
    return `<div id="sm-${m.id}" class="s-mesa ${m.status}" data-mesa-id="${m.id}"
      style="left:${x}px;top:${y}px;width:${w}px;height:${h}px;border-radius:${br};
      background:${st.bg};border-color:${st.border};cursor:grab">
      <div class="s-mesa-num" style="color:${st.color};pointer-events:none;user-select:none">${mesaLabel(m)}</div>
      ${m.tipo==='rectangular'&&!m.alias?`<div class="s-mesa-sub" style="color:${st.color};pointer-events:none;user-select:none">2 mesas</div>`:''}
    </div>`;
  }).join('');
}

// ── DRAG & DROP ──────────────────────────────────────
// Usamos mousemove en document con posición relativa calculada manualmente
let _dragActive = false;

function startDrag(e, mesaId) {
  if (e.button !== undefined && e.button !== 0) return;
  if (e.detail > 1) return; // ignorar doble clic
  e.preventDefault();
  e.stopPropagation();

  const el = document.getElementById('sm-' + mesaId);
  if (!el) return;

  // Guardar posición inicial del mouse y del elemento
  _drag = {
    mesaId, el,
    startMouseX: e.clientX,
    startMouseY: e.clientY,
    startElX: parseFloat(el.style.left) || 0,
    startElY: parseFloat(el.style.top)  || 0,
    moved: false
  };
  _dragActive = true;
  el.classList.add('dragging');

  document.addEventListener('mousemove', onDrag);
  document.addEventListener('mouseup',   endDrag);
}

function onDrag(e) {
  if (!_drag || !_dragActive) return;
  const dx = e.clientX - _drag.startMouseX;
  const dy = e.clientY - _drag.startMouseY;
  if (Math.abs(dx) < 3 && Math.abs(dy) < 3) return; // ignorar micro-movimientos
  _drag.moved = true;
  const canvas = _drag.el.parentElement;
  let nx = _drag.startElX + dx;
  let ny = _drag.startElY + dy;
  nx = Math.max(0, Math.min(nx, canvas.scrollWidth  - _drag.el.offsetWidth));
  ny = Math.max(0, Math.min(ny, canvas.scrollHeight - _drag.el.offsetHeight));
  _drag.el.style.left = nx + 'px';
  _drag.el.style.top  = ny + 'px';
}

async function endDrag(e) {
  if (!_drag) return;
  document.removeEventListener('mousemove', onDrag);
  document.removeEventListener('mouseup',   endDrag);
  _dragActive = false;
  const el     = _drag.el;
  const mesaId = _drag.mesaId;
  const moved  = _drag.moved;
  el.classList.remove('dragging');
  _drag = null;
  if (!moved) return;
  const nx = Math.round(parseFloat(el.style.left) / 10) * 10;
  const ny = Math.round(parseFloat(el.style.top)  / 10) * 10;
  el.style.left = nx + 'px';
  el.style.top  = ny + 'px';
  try {
    const m = S.mesas.find(x => x.id === mesaId);
    await api('PUT', `/api/restaurante/mesas/${mesaId}`, {
      x: nx, y: ny,
      tipo:   m?.tipo   || 'cuadrada',
      alias:  m?.alias  || '',
      numero: m?.numero || null
    });
    S.mesas = S.mesas.map(x => x.id === mesaId ? {...x, x: nx, y: ny} : x);
    toast('Posición guardada ✓', 'ok');
  } catch(err) { toast('Error guardando posición', 'err'); }
}

function startDragTouch(e, mesaId) {
  e.preventDefault();
  const t = e.touches[0];
  const el = document.getElementById('sm-' + mesaId);
  if (!el) return;
  _drag = {
    mesaId, el,
    startMouseX: t.clientX,
    startMouseY: t.clientY,
    startElX: parseFloat(el.style.left) || 0,
    startElY: parseFloat(el.style.top)  || 0,
    moved: false
  };
  _dragActive = true;
  el.classList.add('dragging');
  document.addEventListener('touchmove', onDragT, {passive: false});
  document.addEventListener('touchend',  endDragT);
}

function onDragT(e) {
  e.preventDefault();
  if (!_drag || !_dragActive) return;
  const t  = e.touches[0];
  const dx = t.clientX - _drag.startMouseX;
  const dy = t.clientY - _drag.startMouseY;
  _drag.moved = true;
  const canvas = _drag.el.parentElement;
  let nx = _drag.startElX + dx;
  let ny = _drag.startElY + dy;
  nx = Math.max(0, Math.min(nx, canvas.scrollWidth  - _drag.el.offsetWidth));
  ny = Math.max(0, Math.min(ny, canvas.scrollHeight - _drag.el.offsetHeight));
  _drag.el.style.left = nx + 'px';
  _drag.el.style.top  = ny + 'px';
}

async function endDragT(e) {
  if (!_drag) return;
  document.removeEventListener('touchmove', onDragT);
  document.removeEventListener('touchend',  endDragT);
  _dragActive = false;
  const el     = _drag.el;
  const mesaId = _drag.mesaId;
  el.classList.remove('dragging');
  _drag = null;
  const nx = Math.round(parseFloat(el.style.left) / 10) * 10;
  const ny = Math.round(parseFloat(el.style.top)  / 10) * 10;
  el.style.left = nx + 'px';
  el.style.top  = ny + 'px';
  try {
    const m = S.mesas.find(x => x.id === mesaId);
    await api('PUT', `/api/restaurante/mesas/${mesaId}`, {
      x: nx, y: ny,
      tipo:   m?.tipo   || 'cuadrada',
      alias:  m?.alias  || '',
      numero: m?.numero || null
    });
    S.mesas = S.mesas.map(x => x.id === mesaId ? {...x, x: nx, y: ny} : x);
  } catch(err) { toast('Error guardando posición', 'err'); }
}

function abrirModalNuevaMesa(){

  document.getElementById('m-mesa-ed-body').innerHTML=`

      <input type="number" id="me-num" placeholder="Ej: 1"/></div>

          `<button onclick="selTipoMesa('${v}',this)" id="tipobtn-${v}"
            style="flex:1;padding:10px;border-radius:10px;border:1.5px solid ${i===0?'#3b82f6':'#e2e8f0'};
            background:${i===0?'#eff6ff':'#fff'};font-size:12px;font-weight:600;color:${i===0?'#3b82f6':'#475569'};cursor:pointer">${l}</button>`).join('')}

function selTipoMesa(tipo,btn){
  S._tipoNueva=tipo;
  ['cuadrada','rectangular','redonda'].forEach(t=>{
    const b=document.getElementById('tipobtn-'+t);
    if(!b) return;
    b.style.borderColor=t===tipo?'#3b82f6':'#e2e8f0';
    b.style.background=t===tipo?'#eff6ff':'#fff';
    b.style.color=t===tipo?'#3b82f6':'#475569';
  });
}
function editarMesaSalon(mesaId){
  if(S.modoUnir){seleccionarParaUnir(mesaId);return;}
  const m=S.mesas.find(x=>x.id===mesaId); if(!m) return;
  S.selMesaId=mesaId;
  document.getElementById('m-mesa-ed-title').textContent=`Editar ${mesaLabel(m)}`;
  document.getElementById('m-mesa-ed-body').innerHTML=`
    <div style="margin-bottom:12px"><label style="font-size:13px;font-weight:600;color:#475569;display:block;margin-bottom:6px">Número</label>
      <input type="number" id="me-num" value="${m.numero||''}"/></div>
    <div style="margin-bottom:16px"><label style="font-size:13px;font-weight:600;color:#475569;display:block;margin-bottom:6px">Alias</label>
      <input type="text" id="me-alias" value="${m.alias||''}"/></div>
    <div style="display:flex;gap:8px;margin-top:4px">
      <button class="btn-primary" style="flex:1" onclick="guardarMesaEditor(${mesaId})">Guardar</button>
      ${m.tipo==='rectangular'?`<button onclick="separarMesa(${mesaId})" style="flex:1;padding:12px;border-radius:12px;border:1.5px solid #fbbf24;background:#fffbeb;color:#92400e;font-weight:700;cursor:pointer">✂️ Separar</button>`:''}
      <button onclick="eliminarMesa(${mesaId})" style="padding:12px 16px;border-radius:12px;border:none;background:#fee2e2;color:#dc2626;font-weight:700;cursor:pointer">🗑️</button>
    </div>`;
  openModal('m-mesa-ed');
}
async function guardarMesaEditor(mesaId){
  const num=document.getElementById('me-num').value;
  const alias=document.getElementById('me-alias')?.value||'';
  const tipo=S._tipoNueva||'cuadrada';
  if(!num){toast('Ingresá un número de mesa','err');return;}
  loading(true);
  try{
    if(mesaId){
      await api('PUT',`/api/restaurante/mesas/${mesaId}`,{numero:Number(num),alias});
    } else {
      await api('POST','/api/restaurante/mesas',{numero:Number(num),tipo,alias,x:100,y:100});
    }
    toast(mesaId?'Mesa actualizada ✓':'Mesa agregada ✓','ok');
    closeModal('m-mesa-ed');
    await loadAll(); renderEditorSalon();
  }catch(e){toast(e.message,'err');}
  finally{loading(false);}
}
async function eliminarMesa(mesaId){
  if(!confirm('¿Eliminar esta mesa?')) return;
  loading(true);
  try{
    await api('DELETE',`/api/restaurante/mesas/${mesaId}`);
    toast('Mesa eliminada','ok');
    closeModal('m-mesa-ed');
    await loadAll(); renderEditorSalon();
  }catch(e){toast(e.message,'err');}
  finally{loading(false);}
}
async function separarMesa(mesaId){
  const m=S.mesas.find(x=>x.id===mesaId); if(!m) return;
  const n1=prompt('Número para la primera mesa:'); if(!n1) return;
  const n2=prompt('Número para la segunda mesa:'); if(!n2) return;
  loading(true);
  try{
    const x=m.x||80; const y=m.y||80;
    await api('POST','/api/restaurante/mesas',{numero:Number(n1),tipo:'cuadrada',alias:'',x,y});
    await api('POST','/api/restaurante/mesas',{numero:Number(n2),tipo:'cuadrada',alias:'',x:x+80,y});
    await api('DELETE',`/api/restaurante/mesas/${mesaId}`);
    toast('Mesa separada ✓','ok');
    closeModal('m-mesa-ed');
    await loadAll(); renderEditorSalon();
  }catch(e){toast(e.message,'err');}
  finally{loading(false);}
}

// ── UNIR MESAS ────────────────────────────────────────
let _unirSel=[];
function toggleModoUnir(){
  S.modoUnir=!S.modoUnir;
  _unirSel=[];
  const btn=document.getElementById('btn-unir-mesas');
  // Limpiar selección visual
  document.querySelectorAll('.s-mesa').forEach(el=>{
    el.style.boxShadow=''; el.style.borderColor='';
  });
  if(S.modoUnir){
    btn.style.background='#f59e0b'; btn.style.color='#1e293b';
    btn.textContent='✕ Cancelar';
    toast('Clic en 2 mesas para unirlas','info');
  } else {
    btn.style.background=''; btn.style.color='';
    btn.textContent='🔗 Unir';
  }
}
function seleccionarParaUnir(mesaId){
  const m=S.mesas.find(x=>x.id===mesaId);
  if(!m){return;}
  // Permitir unir cualquier tipo, no solo cuadradas
  const el=document.getElementById('sm-'+mesaId);
  if(!el) return;
  if(_unirSel.includes(mesaId)){
    _unirSel=_unirSel.filter(id=>id!==mesaId);
    el.style.boxShadow=''; el.style.borderColor='';
  } else {
    if(_unirSel.length>=2){toast('Ya seleccionaste 2 mesas','err');return;}
    _unirSel.push(mesaId);
    el.style.boxShadow='0 0 0 3px #f59e0b';
    el.style.borderColor='#f59e0b';
    toast(`Mesa ${mesaLabel(m)} seleccionada (${_unirSel.length}/2)`,'info');
    if(_unirSel.length===2) setTimeout(()=>confirmarUnion(),300);
  }
}
async function confirmarUnion(){
  const [idA,idB]=_unirSel;
  const mA=S.mesas.find(m=>m.id===idA); const mB=S.mesas.find(m=>m.id===idB);
  const num=prompt(`Número para la mesa unida (${mesaLabel(mA)} + ${mesaLabel(mB)}):`);
  if(!num){_unirSel=[];document.querySelectorAll('.s-mesa').forEach(el=>el.classList.remove('sel-unir'));return;}
  loading(true);
  try{
    const x=Math.min(mA.x||80,mB.x||80); const y=Math.min(mA.y||80,mB.y||80);
    await api('POST','/api/restaurante/mesas',{numero:Number(num),tipo:'rectangular',alias:'',x,y});
    await api('DELETE',`/api/restaurante/mesas/${idA}`);
    await api('DELETE',`/api/restaurante/mesas/${idB}`);
    toast('Mesas unidas ✓','ok');
    _unirSel=[]; S.modoUnir=false;
    const btn=document.getElementById('btn-unir-mesas');
    if(btn){btn.style.background='';btn.style.color='';}
    await loadAll(); renderEditorSalon();
  }catch(e){toast(e.message,'err');}
  finally{loading(false);}
}
