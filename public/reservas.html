<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover">
<title>Reservas — Hotel Takuá</title>
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#00c9b1">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--sidebar:#1a2035;--sw:72px;--accent:#00c9b1}
body{font-family:'Nunito',sans-serif;background:#f0f4f8;color:#1a2035;font-size:14px;overflow-x:hidden}
.main{margin-left:var(--sw);display:flex;flex-direction:column;min-height:100vh}
.topbar{background:#fff;padding:12px 22px;display:flex;align-items:center;gap:10px;border-bottom:1px solid #e8edf3;position:sticky;top:0;z-index:100}
.hamburger{display:none;align-items:center;justify-content:center;width:36px;height:36px;border-radius:8px;border:1.5px solid #e2e8f0;background:#f8fafc;font-size:18px;cursor:pointer;flex-shrink:0}
.tb-left{flex:1;min-width:0}
.tb-left h2{font-size:16px;font-weight:800;color:#1a2035;margin:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tb-left p{font-size:11px;color:#94a3b8;margin-top:1px}
.tb-right{display:flex;align-items:center;gap:8px;flex-shrink:0}
.user-av{width:36px;height:36px;border-radius:50%;background:var(--accent);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:14px;flex-shrink:0}
.btn-salir{background:none;border:1.5px solid #e2e8f0;border-radius:8px;padding:6px 14px;font-size:13px;font-weight:700;color:#dc2626;cursor:pointer;font-family:'Nunito',sans-serif}
.btn-primary{background:linear-gradient(135deg,var(--accent),#0094ff);border:none;border-radius:10px;padding:9px 16px;color:#fff;font-size:13px;font-weight:700;cursor:pointer;font-family:'Nunito',sans-serif}

/* ── CALENDARIO ── */
.cal-wrap{padding:16px 20px;overflow-x:auto}
.cal-nav{display:flex;align-items:center;gap:12px;margin-bottom:16px;flex-wrap:wrap}
.cal-nav h2{font-size:20px;font-weight:900;color:#1a2035;min-width:180px}
.cal-nav-btn{background:#fff;border:1.5px solid #e2e8f0;border-radius:9px;width:34px;height:34px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:16px;transition:all .15s}
.cal-nav-btn:hover{background:#f1f5f9;border-color:#cbd5e1}
.cal-today-btn{background:#1a2035;color:#fff;border:none;border-radius:9px;padding:6px 16px;font-size:13px;font-weight:700;cursor:pointer;font-family:'Nunito',sans-serif}

.gantt{border-radius:14px;overflow:hidden;box-shadow:0 2px 12px rgba(0,0,0,.08)}
.gantt-head{display:grid;background:#1a2035;position:sticky;top:0;z-index:10}
.gh-room{background:#0f1628;padding:10px 14px;font-size:11px;font-weight:700;color:#94a3b8;text-transform:uppercase;letter-spacing:.5px;border-right:1px solid rgba(255,255,255,.08);display:flex;align-items:center;width:130px;flex-shrink:0}
.gh-days{display:flex;flex:1}
.gh-day{flex:1;text-align:center;padding:6px 2px;border-right:1px solid rgba(255,255,255,.06);cursor:pointer}
.gh-day:hover{background:rgba(255,255,255,.05)}
.gh-day-num{font-size:13px;font-weight:800;color:#fff}
.gh-day-label{font-size:9px;color:#64748b;text-transform:uppercase;font-weight:600}
.gh-day.today{background:rgba(0,201,177,.25);border-left:2px solid var(--accent);border-right:2px solid var(--accent)}
.gh-day.today .gh-day-num{color:#fff;font-size:18px;font-weight:900;text-shadow:0 0 10px rgba(0,201,177,.7)}
.gh-day.today .gh-day-label{color:#fff;font-weight:800}

.gantt-row{display:flex;border-bottom:1px solid #f1f5f9;min-height:48px;background:#fff}
.gantt-row:hover{background:#fafbfc}
.gantt-row:last-child{border-bottom:none}
.gr-room{width:130px;flex-shrink:0;padding:8px 14px;border-right:1px solid #f1f5f9;display:flex;flex-direction:column;justify-content:center;background:#fff;position:sticky;left:0;z-index:5}
.gr-room-num{font-size:14px;font-weight:800;color:#1a2035}
.gr-room-ala{font-size:10px;color:#94a3b8;font-weight:600}
.gr-days{flex:1;display:grid;position:relative}
.gr-day-cell{border-right:1px solid #f1f5f9;position:relative}
.gr-day-cell.today{background:rgba(0,201,177,.13);border-left:2px solid rgba(0,201,177,.4);border-right:2px solid rgba(0,201,177,.4)}
.gr-day-cell.weekend{background:#fafbff}

/* Barras de reserva */
.res-bar{position:absolute;top:6px;bottom:6px;border-radius:20px;display:flex;align-items:center;padding:0 10px;cursor:pointer;transition:filter .15s;z-index:3;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.15)}
.res-bar:hover{filter:brightness(1.1);box-shadow:0 2px 8px rgba(0,0,0,.25)}
.res-bar span{font-size:11px;font-weight:700;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

/* Colores por estado */
.bar-activa{background:linear-gradient(135deg,#dc2626,#ef4444)}
.bar-futura{background:linear-gradient(135deg,#2563eb,#3b82f6)}
.bar-finalizada{background:linear-gradient(135deg,#6b7280,#9ca3af)}
.bar-noshow{background:linear-gradient(135deg,#b45309,#f59e0b)}

/* Modal */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:300;display:flex;align-items:center;justify-content:center;padding:20px}
.overlay.hidden{display:none}
.modal{background:#fff;border-radius:20px;padding:24px;width:100%;max-width:460px;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.3)}
.modal-hd{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px}
.modal-hd h3{font-size:17px;font-weight:800}
.modal-close{background:none;border:none;font-size:20px;cursor:pointer;color:#94a3b8;padding:2px 6px}
.info-row{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid #f1f5f9;font-size:13px}
.info-row:last-child{border-bottom:none}
.info-lbl{color:#64748b;font-weight:600}
.info-val{font-weight:700;color:#1a2035}
.confirm-btn{width:100%;padding:13px;border-radius:12px;border:none;background:linear-gradient(135deg,var(--accent),#0094ff);color:#fff;font-size:15px;font-weight:800;cursor:pointer;font-family:'Nunito',sans-serif;margin-top:16px}
.stitle{font-size:10px;font-weight:700;color:#94a3b8;text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px;margin-top:14px}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:2px}
.form-col{display:flex;flex-direction:column;gap:4px;margin-bottom:12px}
.form-col label{font-size:11px;font-weight:700;color:#64748b;text-transform:uppercase;letter-spacing:.3px}
.form-col input,.form-col select,.form-col textarea{border:1.5px solid #e0e6ef;border-radius:9px;padding:9px 11px;font-size:14px;font-family:'Nunito',sans-serif;background:#fff;transition:border .15s}
.form-col input:focus,.form-col select:focus{outline:none;border-color:var(--accent)}
.total-box{background:#f0fdf4;border:1.5px solid #86efac;border-radius:12px;padding:12px 16px;margin-bottom:14px}
.total-row{display:flex;justify-content:space-between;font-size:13px;margin-bottom:4px}
.total-row.big{font-size:15px;font-weight:800;color:#15803d}

/* Nav del mes */
.mes-nav{display:flex;align-items:center;gap:2px;background:#e2e8f0;border-radius:10px;padding:3px}
.mes-nav .cal-nav-btn{border-color:transparent;background:none}
.mes-nav .cal-nav-btn:hover{background:#fff;border-color:#cbd5e1}
.mes-nav h2{font-size:15px;font-weight:800;color:#1a2035;min-width:150px;text-align:center;padding:0 6px}

/* Botones de vista (Calendario / Lista) */
.vista-switcher{display:flex;gap:4px;background:#e2e8f0;border-radius:10px;padding:3px}
.btn-vista{padding:6px 14px;border-radius:8px;border:1.5px solid transparent;font-family:'Nunito',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:all .15s;background:none;color:#64748b}
.btn-vista.activo{background:#1a2035;color:#fff;border-color:#1a2035;box-shadow:0 1px 4px rgba(0,0,0,.15)}
.btn-vista:not(.activo):hover{background:#fff;border-color:#cbd5e1;color:#1a2035}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#1a2035;color:#fff;padding:12px 22px;border-radius:12px;font-weight:700;font-size:13px;z-index:9999;box-shadow:0 4px 20px rgba(0,0,0,.3);pointer-events:none}

/* ── LISTA (cards) ── */
.lista-tabs{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap}
.lista-tab{padding:8px 16px;border-radius:10px;border:1.5px solid #e2e8f0;background:#fff;font-family:'Nunito',sans-serif;font-weight:700;font-size:13px;color:#64748b;cursor:pointer;display:flex;align-items:center;gap:7px;transition:all .15s}
.lista-tab:hover{border-color:#cbd5e1}
.lista-tab .cnt{background:#f1f5f9;color:#64748b;border-radius:20px;padding:1px 9px;font-size:11px;font-weight:800}
.lista-tab.activo{background:#1a2035;border-color:#1a2035;color:#fff}
.lista-tab.activo .cnt{background:rgba(255,255,255,.18);color:#fff}

.lista-filtros{display:flex;gap:10px;margin-bottom:18px;flex-wrap:wrap;align-items:center}
.lista-search{flex:1;min-width:220px;position:relative}
.lista-search input{width:100%;padding:10px 14px 10px 34px;border-radius:10px;border:1.5px solid #e2e8f0;font-family:'Nunito',sans-serif;font-size:13px;box-sizing:border-box}
.lista-search input:focus{outline:none;border-color:var(--accent)}
.lista-search-ic{position:absolute;left:12px;top:50%;transform:translateY(-50%);font-size:13px;pointer-events:none}
.lista-select{padding:9px 12px;border-radius:10px;border:1.5px solid #e2e8f0;font-family:'Nunito',sans-serif;font-size:13px;font-weight:600;color:#374151;background:#fff;cursor:pointer}

.res-cards{display:flex;flex-direction:column;gap:12px}
.res-card{background:#fff;border-radius:16px;padding:18px 20px;box-shadow:0 1px 8px rgba(0,0,0,.06);border:1px solid #f1f5f9}
.rc-top{display:flex;justify-content:space-between;align-items:flex-start;gap:12px;flex-wrap:wrap;margin-bottom:12px}
.rc-nombre{font-size:16px;font-weight:800;color:#1a2035}
.rc-meta{display:flex;gap:6px;align-items:center;margin-top:6px;flex-wrap:wrap}
.rc-badge{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700;white-space:nowrap}
.rc-actions{display:flex;gap:6px;flex-wrap:wrap}
.rc-btn{border:1.5px solid transparent;border-radius:8px;padding:7px 11px;font-size:12px;cursor:pointer;display:flex;align-items:center;gap:4px;font-family:'Nunito',sans-serif;font-weight:700;transition:filter .15s}
.rc-btn:hover{filter:brightness(0.96)}
.rc-body{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:14px;padding-top:12px;border-top:1px solid #f8fafc}
.rc-field-lbl{font-size:10px;color:#94a3b8;font-weight:700;text-transform:uppercase;letter-spacing:.4px;margin-bottom:2px}
.rc-field-val{font-size:13px;font-weight:700;color:#1a2035}
.rc-total{font-size:17px;font-weight:900;color:#1a2035}
.res-cards-empty{text-align:center;padding:48px 20px;color:#94a3b8;background:#fff;border-radius:16px}

@media(max-width:640px){
  .lista-filtros{flex-direction:column;align-items:stretch}
  .rc-actions{width:100%}
  .rc-btn{flex:1;justify-content:center}
}

@media(max-width:900px){
  :root{--sw:0px}
  .main{margin-left:0!important}
  #hamburger{display:flex!important}
    .cal-wrap{padding:8px 10px}
  .gantt{}
  .gh-room,.gr-room{width:90px}
}
</style>
</head>
<body>


<div class="main">
  <div class="topbar">
    <button class="hamburger" id="hamburger">☰</button>
    <div class="tb-left">
      <h2>📅 Reservas</h2>
      <p id="tb-user">Cargando...</p>
    </div>
    <div class="tb-right">
      <div class="user-av" id="user-av">A</div>
      <button class="btn-salir" onclick="doLogout()">Salir</button>
    </div>
  </div>

  <div class="cal-wrap">
    <!-- Nav del mes -->
    <div class="cal-nav">
      <div class="vista-switcher">
        <button id="btn-vista-cal" class="btn-vista activo" onclick="setVista('calendario')">📅 Calendario</button>
        <button id="btn-vista-lista" class="btn-vista" onclick="setVista('lista')" style="display:none">📋 Lista</button>
      </div>
      <button class="cal-today-btn" id="btn-hoy" onclick="irHoy()">Hoy</button>
      <div class="mes-nav">
        <button class="cal-nav-btn" id="btn-prev" onclick="cambiarMes(-1)">‹</button>
        <h2 id="cal-titulo">—</h2>
        <button class="cal-nav-btn" id="btn-next" onclick="cambiarMes(1)">›</button>
      </div>
      <div style="margin-left:auto;display:flex;gap:8px;align-items:center;flex-wrap:wrap">
        <div id="leyenda-cal" style="display:flex;gap:6px;font-size:11px;font-weight:700">
          <span style="background:#3b82f6;color:#fff;padding:3px 10px;border-radius:20px">Futura</span>
          <span style="background:#ef4444;color:#fff;padding:3px 10px;border-radius:20px">Activa</span>
          <span style="background:#9ca3af;color:#fff;padding:3px 10px;border-radius:20px">Finalizada</span>
          <span style="background:#f59e0b;color:#fff;padding:3px 10px;border-radius:20px">⚠ Vencida</span>
        </div>
        <button id="btn-nueva-res" class="btn-primary" style="display:none" onclick="irANuevaReserva()">+ Nueva reserva</button>
      </div>
    </div>
    <div id="gantt-container"></div>
    <div id="lista-container" style="display:none"></div>
  </div>
</div>

<!-- Modal info reserva -->
<div class="overlay hidden" id="modal-info">
  <div class="modal">
    <div class="modal-hd">
      <h3 id="mi-titulo">Reserva</h3>
      <button class="modal-close" onclick="cerrarModal()">✕</button>
    </div>
    <div id="mi-body"></div>
    <div style="display:flex;gap:8px;margin-top:4px">
      <button class="confirm-btn" id="mi-editar" onclick="abrirEditar()" style="flex:1">✏️ Editar reserva</button>
      <button class="confirm-btn" id="mi-cambiar-hab" onclick="abrirCambioHab()"
        style="flex:1;background:linear-gradient(135deg,#7c3aed,#a855f7)">🔄 Cambiar hab.</button>
    </div>
  </div>
</div>

<!-- Modal cambiar habitación -->
<div class="overlay hidden" id="modal-cambio-hab">
  <div class="modal" style="max-width:520px">
    <div class="modal-hd">
      <h3 id="mch-titulo">🔄 Cambiar habitación</h3>
      <button class="modal-close" onclick="cerrarCambioHab()">✕</button>
    </div>
    <div id="mch-body"></div>
  </div>
</div>

<!-- Modal editar reserva -->
<div class="overlay hidden" id="modal-editar">
  <div class="modal">
    <div class="modal-hd">
      <h3>✏️ Editar Reserva</h3>
      <button class="modal-close" onclick="cerrarModalEditar()">✕</button>
    </div>
    <div id="me-body"></div>
  </div>
</div>

<script>
// ── AUTH ──────────────────────────────────────────────
const TOKEN = localStorage.getItem('takua_token');
const ME    = JSON.parse(localStorage.getItem('takua_user') || 'null');
if (!TOKEN || !ME) window.location.href = '/portal.html';

// Poblar topbar
document.getElementById('user-av').textContent = (ME?.nombre||'A')[0].toUpperCase();
const tbUser = document.getElementById('tb-user');
if (tbUser) tbUser.textContent = (ME?.nombre||'') + ' · ' + (ME?.rol||'');

// Mucamas y cajeros solo pueden ver el calendario, no la lista
const esMucama = ['mucama','cajero'].includes(ME?.rol);

// Sidebar según rol:
// mucama → Inicio + Habitaciones + Reservas
// cajero → Inicio + Restaurante + Reservas
// otros  → todo visible
(function setupSidebar() {
  const rol = ME?.rol;
  const hide = id => { const el=document.getElementById(id); if(el) el.style.display='none'; };
  if (rol === 'mucama') {
    ['sb-huespedes','sb-tienda','sb-inventario','sb-caja','sb-finanzas','sb-restaurante','sb-config'].forEach(hide);
  } else if (rol === 'cajero') {
    ['sb-habitaciones','sb-huespedes','sb-tienda','sb-inventario','sb-caja','sb-finanzas','sb-config'].forEach(hide);
    const ini = document.getElementById('sb-inicio');
    if (ini) ini.href = '/comandas.html';
  }
})();
document.getElementById('user-av').textContent = (ME?.nombre||'A')[0].toUpperCase();
function doLogout() {
  localStorage.removeItem('takua_token');
  localStorage.removeItem('takua_user');
  window.location.href = '/portal.html';
}


// ── API ───────────────────────────────────────────────
async function api(method, path, body) {
  try {
    const r = await fetch('/api'+path, {
      method,
      headers:{'Content-Type':'application/json','Authorization':'Bearer '+TOKEN},
      body: body ? JSON.stringify(body) : undefined
    });
    if (r.status===401) { doLogout(); return null; }
    return r.json();
  } catch(e) { return null; }
}

const fmt   = n => '$ '+(Math.round(n||0)).toLocaleString('es-AR');
const TIPOS = {twin:'🛏🛏 Twin', queen:'🛏 Queen', triple:'🛏🛏🛏 Triple', doble:'🛏+🛏 Doble', simple:'🛏🛏 Twin', suite:'🛏 Queen'};
const MESES = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
const DIAS  = ['Dom','Lun','Mar','Mié','Jue','Vie','Sáb'];

// Plataformas de origen de la reserva
const PLATAFORMAS = {
  'Directo':     { icon:'🏨', color:'#0f766e', bg:'#d7f7f0' },
  'Airbnb':      { icon:'🅰️', color:'#c2185b', bg:'#ffe1ea' },
  'Booking':     { icon:'🅱️', color:'#003580', bg:'#dbe6f7' },
  'Expedia':     { icon:'✈️', color:'#a15c00', bg:'#fff1d6' },
  'Hostelworld': { icon:'🎒', color:'#c2410c', bg:'#ffe4d5' },
  'Otro':        { icon:'🔗', color:'#4b5563', bg:'#eef1f5' },
};
function badgePlataforma(p) {
  const info = PLATAFORMAS[p] || PLATAFORMAS['Otro'];
  return `<span class="rc-badge" style="background:${info.bg};color:${info.color}">${info.icon} ${p||'Directo'}</span>`;
}
function infoPago(r) {
  const total = Number(r.precio_total||0);
  const saldo = Number(r.saldo_pendiente||0);
  const senia = Number(r.monto_senia||0);
  if (total > 0 && saldo <= 0) return { label:'✓ Pagado', bg:'#111827', color:'#fff' };
  if (senia > 0 && saldo > 0)  return { label:'◐ Seña cobrada', bg:'#fef3c7', color:'#92400e' };
  return { label:'○ Pendiente', bg:'#fee2e2', color:'#991b1b' };
}

function toast(msg, ok=true) {
  const t=document.createElement('div');
  t.className='toast';
  t.style.background=ok?'#1a2035':'#dc2626';
  t.textContent=msg;
  document.body.appendChild(t);
  setTimeout(()=>t.remove(),3000);
}

function parseMonto(val) {
  if (!val) return 0;
  const str = String(val).trim();
  if (str.includes(',')) return parseFloat(str.replace(/\./g,'').replace(',','.')) || 0;
  const puntoIdx = str.lastIndexOf('.');
  if (puntoIdx !== -1 && str.length - puntoIdx - 1 === 3) return parseFloat(str.replace(/\./g,'')) || 0;
  return parseFloat(str) || 0;
}

// ── ESTADO ────────────────────────────────────────────
const G = {
  anio: new Date().getFullYear(),
  mes:  new Date().getMonth(), // 0-11
  reservas: [],
  habitaciones: [],
  reservaActual: null,
  listaEstado: 'futura',
  listaSearch: '',
  listaPlataforma: '',
  listaPago: '',
  listaData: [],
  listaContadores: { futura:0, activa:0, finalizada:0, cancelada:0 },
};

// ── INIT ──────────────────────────────────────────────
async function init() {
  // Mostrar botón Lista solo si no es mucama
  if (!esMucama) {
    document.getElementById('btn-vista-lista').style.display = 'inline-block';
  }
  G.habitaciones = await api('GET', '/habitaciones') || [];
  await cargarYRenderizar();
}

async function cargarYRenderizar() {
  const desde = `${G.anio}-${String(G.mes+1).padStart(2,'0')}-01`;
  const ultimo = new Date(G.anio, G.mes+1, 0).getDate();
  const hasta  = `${G.anio}-${String(G.mes+1).padStart(2,'0')}-${String(ultimo).padStart(2,'0')}`;
  document.getElementById('cal-titulo').textContent = `${MESES[G.mes]} ${G.anio}`;
  G.reservas = await api('GET', `/reservas/calendario?desde=${desde}&hasta=${hasta}`) || [];
  renderGantt();
}

function irHoy() {
  const hoy = new Date();
  G.anio = hoy.getFullYear();
  G.mes  = hoy.getMonth();
  cargarYRenderizar();
}

function cambiarMes(delta) {
  G.mes += delta;
  if (G.mes < 0) { G.mes = 11; G.anio--; }
  if (G.mes > 11) { G.mes = 0; G.anio++; }
  cargarYRenderizar();
}

// ── RENDER GANTT ──────────────────────────────────────
function renderGantt() {
  const container = document.getElementById('gantt-container');
  const diasEnMes = new Date(G.anio, G.mes+1, 0).getDate();
  const hoy = new Date();
  const esHoy = (d) => hoy.getFullYear()===G.anio && hoy.getMonth()===G.mes && hoy.getDate()===d;

  // Cabecera de días
  const headDays = Array.from({length:diasEnMes},(_,i)=>{
    const fecha = new Date(G.anio, G.mes, i+1);
    const dow = fecha.getDay();
    const esWknd = dow===0||dow===6;
    return `<div class="gh-day${esHoy(i+1)?' today':''}${esWknd?' weekend':''}" style="min-width:32px">
      <div class="gh-day-num">${i+1}</div>
      <div class="gh-day-label">${DIAS[dow]}</div>
    </div>`;
  }).join('');

  // Agrupar habitaciones ordenadas
  const habs = [...G.habitaciones].sort((a,b)=>
    String(a.ala||'').localeCompare(String(b.ala||''))||String(a.numero||'').localeCompare(String(b.numero||''), undefined, {numeric:true})
  );

  if (habs.length === 0) {
    container.innerHTML = '<div style="text-align:center;padding:40px;color:#94a3b8">Sin habitaciones cargadas</div>';
    return;
  }

  // Filas por habitación
  const filas = habs.map(hab => {
    const resHab = G.reservas.filter(r=>String(r.habitacion_id)===String(hab.id));

    // Celdas de días (grid)
    const celdas = Array.from({length:diasEnMes},(_,i)=>{
      const dow = new Date(G.anio, G.mes, i+1).getDay();
      return `<div class="gr-day-cell${esHoy(i+1)?' today':''}${(dow===0||dow===6)?' weekend':''}" 
        style="min-width:32px"></div>`;
    }).join('');

    // Barras de reservas
    const barras = resHab.map(r => {
      const entFecha  = new Date(r.entrada);
      const salFecha  = new Date(r.salida);
      const primerDia = new Date(G.anio, G.mes, 1);
      const ultimoDia = new Date(G.anio, G.mes, diasEnMes, 23, 59, 59);
      const dStart = new Date(Math.max(entFecha.getTime(), primerDia.getTime()));
      const dEnd   = new Date(Math.min(salFecha.getTime(), ultimoDia.getTime()));
      const diaIni = dStart.getDate();
      const diaFin = dEnd.getDate();
      if (diaIni > diasEnMes || diaFin < 1) return '';
      // Posición y ancho en %
      const left  = ((diaIni-1) / diasEnMes) * 100;
      const width = ((diaFin - diaIni) / diasEnMes) * 100;
      if (width <= 0) return '';
      const ahora = new Date();
      const esNoShow = r.estado === 'futura' && new Date(r.entrada) < ahora;
      const clase = esNoShow ? 'bar-noshow' : `bar-${r.estado==='activa'?'activa':r.estado==='finalizada'?'finalizada':'futura'}`;
      // Nombre truncado
      const nombre = r.nombre_huesped || '—';
      const label = esNoShow ? `⚠ ${nombre}` : nombre;
      return `<div class="res-bar ${clase}"
        style="left:calc(${left}% + 2px);width:calc(${width}% - 4px)"
        onclick="verReserva(${r.id})"
        title="${nombre} · ${new Date(r.entrada).toLocaleDateString('es-AR')} → ${new Date(r.salida).toLocaleDateString('es-AR')}">
        <span>${label}</span>
      </div>`;
    }).join('');

    return `<div class="gantt-row">
      <div class="gr-room" title="Hab. ${hab.numero} · Ala ${hab.ala}">
        <div class="gr-room-num">${hab.numero}</div>
        <div class="gr-room-ala">${hab.ala} · ${hab.tipo||''}</div>
      </div>
      <div class="gr-days" style="display:grid;grid-template-columns:repeat(${diasEnMes},1fr);position:relative">
        ${celdas}
        ${barras}
      </div>
    </div>`;
  }).join('');

  const roomColW = window.innerWidth <= 900 ? 90 : 130;
  const ganttMinW = roomColW + diasEnMes * 32;
  container.innerHTML = `
    <div class="gantt" style="min-width:${ganttMinW}px">
      <div class="gantt-head" style="display:flex">
        <div class="gh-room">Hab.</div>
        <div class="gh-days" style="display:grid;grid-template-columns:repeat(${diasEnMes},1fr);flex:1">
          ${headDays}
        </div>
      </div>
      ${filas}
    </div>`;
}

function verReserva(id) {
  const r = G.reservas.find(x=>x.id===id);
  if (!r) return;
  G.reservaActual = r;
  const hab = G.habitaciones.find(h=>h.id===r.habitacion_id);
  const ent = new Date(r.entrada).toLocaleDateString('es-AR',{day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit'});
  const sal = new Date(r.salida).toLocaleDateString('es-AR',{day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit'});
  const esVencida = r.estado === 'futura' && new Date(r.entrada) < new Date();
  const estadoColor = r.estado==='activa'?'#dc2626':r.estado==='finalizada'?'#6b7280':esVencida?'#f59e0b':'#2563eb';
  const estadoLabel = esVencida ? '⚠ Vencida' : r.estado;
  document.getElementById('mi-titulo').textContent = `Hab. ${hab?.numero||r.habitacion_id} — ${r.nombre_huesped}`;
  document.getElementById('mi-body').innerHTML = `
    <div style="display:inline-block;background:${estadoColor};color:#fff;border-radius:20px;padding:3px 12px;font-size:11px;font-weight:700;margin-bottom:14px;text-transform:uppercase">${estadoLabel}</div>
    <div class="info-row"><span class="info-lbl">Plataforma</span><span class="info-val">${(PLATAFORMAS[r.plataforma]||PLATAFORMAS['Otro']).icon} ${r.plataforma||'Directo'}</span></div>
    <div class="info-row"><span class="info-lbl">Habitación</span><span class="info-val">Hab. ${hab?.numero||r.habitacion_id} · Ala ${hab?.ala||''}</span></div>
    ${hab?.tipo?`<div class="info-row"><span class="info-lbl">Tipo de cama</span><span class="info-val" style="font-weight:700">${TIPOS[hab.tipo]||hab.tipo}</span></div>`:''}
    <div class="info-row"><span class="info-lbl">Huésped</span><span class="info-val">${r.nombre_huesped}</span></div>
    ${r.documento?`<div class="info-row"><span class="info-lbl">Documento</span><span class="info-val">${r.documento}</span></div>`:''}
    <div class="info-row"><span class="info-lbl">Entrada</span><span class="info-val">${ent}</span></div>
    <div class="info-row"><span class="info-lbl">Salida</span><span class="info-val">${sal}</span></div>
    <div class="info-row"><span class="info-lbl">Noches</span><span class="info-val">${r.noches||'—'}</span></div>
    <div class="info-row"><span class="info-lbl">Total</span><span class="info-val">${fmt(r.precio_total)}</span></div>
    ${Number(r.monto_senia||0)>0?`<div class="info-row"><span class="info-lbl">Seña cobrada</span><span class="info-val" style="color:#16a34a">${fmt(r.monto_senia)}</span></div>`:''}
    ${Number(r.saldo_pendiente||0)>0?`<div class="info-row"><span class="info-lbl">Saldo pendiente</span><span class="info-val" style="color:#dc2626">${fmt(r.saldo_pendiente)}</span></div>`:''}
    <div class="info-row"><span class="info-lbl">Método</span><span class="info-val">${r.metodo_pago||'—'}</span></div>
    ${r.notas?`<div class="info-row"><span class="info-lbl">Notas</span><span class="info-val">${r.notas}</span></div>`:''}
  `;
  // Ocultar editar si es finalizada o no es admin/recep
  const canEdit = ['admin','recepcionista'].includes(ME?.rol) && r.estado !== 'finalizada';
  document.getElementById('mi-editar').style.display = canEdit ? 'flex' : 'none';
  const canCambiar = ['admin','recepcionista','mucama'].includes(ME?.rol) && ['futura','activa','confirmada'].includes(r.estado);
  document.getElementById('mi-cambiar-hab').style.display = canCambiar ? 'flex' : 'none';
  document.getElementById('modal-info').classList.remove('hidden');
}

  document.getElementById('mch-body').innerHTML = `
    <div style="background:#dbeafe;border:1.5px solid #93c5fd;border-radius:10px;padding:10px 14px;margin-bottom:14px;font-size:13px">

      </div>
    </div>
    <div style="margin-bottom:12px">
      <label style="font-size:11px;font-weight:700;color:#94a3b8;text-transform:uppercase;letter-spacing:.05em">Habitación destino</label>
      <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(90px,1fr));gap:8px;margin-top:8px" id="mch-grid">
        ${disponibles.length === 0
          ? '<div style="color:#94a3b8;font-size:13px;grid-column:1/-1;text-align:center;padding:16px">No hay habitaciones disponibles</div>'
          : disponibles.map(h=>`
          <button data-hid="${h.id}"
            style="padding:12px 8px;border-radius:10px;border:2px solid #e2e8f0;background:#f8fafc;cursor:pointer;font-size:13px;font-weight:700;text-align:center;transition:all .15s">
            <div style="font-size:16px;font-weight:800">${h.numero}</div>
            <div style="font-size:10px;color:#94a3b8">${h.ala} · ${h.tipo||''}</div>
          </button>`).join('')}
      </div>
    </div>
    <div style="margin-bottom:12px">
      <label style="font-size:11px;font-weight:700;color:#94a3b8;text-transform:uppercase;letter-spacing:.05em">¿Qué pasa con Hab. ${hab?.numero} al liberar?</label>
      <div style="display:flex;gap:8px;margin-top:8px">
        <button id="mch-libre" style="flex:1;padding:10px;border-radius:10px;border:2px solid #16a34a;background:#dcfce7;color:#166534;font-weight:700;font-size:13px;cursor:pointer">🟢 Pasa a Libre</button>
        <button id="mch-mant"  style="flex:1;padding:10px;border-radius:10px;border:2px solid #e2e8f0;background:#f8fafc;color:#4b5563;font-weight:700;font-size:13px;cursor:pointer">🔧 Mantenimiento</button>
      </div>
    </div>
    <div style="margin-bottom:14px">
      <label style="font-size:11px;font-weight:700;color:#94a3b8;text-transform:uppercase;letter-spacing:.05em">Motivo (opcional)</label>
      <input type="text" id="mch-motivo" placeholder="Ej: Solicitud del huésped..." style="width:100%;margin-top:6px;padding:10px;border-radius:8px;border:1.5px solid #e2e8f0;font-size:13px;box-sizing:border-box">
    </div>
    <button id="mch-confirm" disabled
      style="width:100%;padding:14px;border-radius:12px;border:none;background:#7c3aed;opacity:.4;color:#fff;font-size:15px;font-weight:800;cursor:not-allowed">
      🔄 Confirmar traslado
    </button>
  `;

  document.getElementById('modal-cambio-hab').classList.remove('hidden');

  let habDestinoId = null;
  let estadoOrigen = 'libre';

  document.querySelectorAll('#mch-grid button[data-hid]').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('#mch-grid button[data-hid]').forEach(b => {
        b.style.borderColor = '#e2e8f0'; b.style.background = '#f8fafc';
      });
      btn.style.borderColor = '#7c3aed'; btn.style.background = '#faf5ff';
      habDestinoId = btn.dataset.hid;
      const c = document.getElementById('mch-confirm');
      c.disabled = false; c.style.opacity = '1'; c.style.cursor = 'pointer';
    });
  });

  const selEstado = (e) => {
    estadoOrigen = e;
    document.getElementById('mch-libre').style.borderColor = e==='libre' ? '#16a34a' : '#e2e8f0';
    document.getElementById('mch-libre').style.background  = e==='libre' ? '#dcfce7' : '#f8fafc';
    document.getElementById('mch-mant').style.borderColor  = e==='mantenimiento' ? '#6b7280' : '#e2e8f0';
    document.getElementById('mch-mant').style.background   = e==='mantenimiento' ? '#f3f4f6' : '#f8fafc';
  };
  document.getElementById('mch-libre').addEventListener('click', () => selEstado('libre'));
  document.getElementById('mch-mant').addEventListener('click',  () => selEstado('mantenimiento'));

  document.getElementById('mch-confirm').addEventListener('click', async () => {
    if (!habDestinoId) return;
    const res = await fetch(`/api/reservas/${r.id}/cambiar-habitacion`, {
      method: 'POST',
      headers: { 'Content-Type':'application/json', 'Authorization':'Bearer '+localStorage.getItem('takua_token') },
      body: JSON.stringify({ nueva_habitacion_id: habDestinoId, motivo: document.getElementById('mch-motivo').value, estado_origen: estadoOrigen })
    });
    const data = await res.json();
    if (data.ok) {
      const dest = G.habitaciones.find(h=>String(h.id)===String(habDestinoId));
      cerrarCambioHab();
      alert(`✅ ${data.nombre_huesped} movido/a a Hab. ${dest?.numero || habDestinoId}`);
      location.reload();
    } else {
      alert('❌ ' + (data.error || 'Error al cambiar habitación'));
    }
  });
}

      <div class="form-col"><label>Método</label>
        <select id="er-metodo">
          ${['Efectivo','Tarjeta','Transferencia','Débito','Otro'].map(m=>`<option ${r.metodo_pago===m?'selected':''}>${m}</option>`).join('')}
        </select>

    <div class="form-row" style="margin-bottom:4px">

        <select id="er-pago-senia">${['Efectivo','Tarjeta','Transferencia'].map(m=>`<option>${m}</option>`).join('')}</select>

    </div>
    <div class="form-col"><label>Notas</label>
      <textarea id="er-notas" rows="2">${r.notas||''}</textarea>
    </div>
    <button class="confirm-btn" id="er-save" onclick="guardarReserva(${r.id})">💾 Guardar cambios</button>
  `;

function erRecalc() {
  const total = parseMonto(document.getElementById('er-total')?.value)||0;
  const senia = parseMonto(document.getElementById('er-senia')?.value)||0;
  const el = document.getElementById('er-saldo');
  if (el) el.textContent = fmt(Math.max(0, total-senia));
}

function cerrarModalEditar() {
  document.getElementById('modal-editar').classList.add('hidden');
}

async function guardarReserva(id) {
  const entrada = document.getElementById('er-entrada')?.value;
  const salida  = document.getElementById('er-salida')?.value;
  if (!entrada||!salida) { toast('Completá las fechas', false); return; }
  const precio_total = parseMonto(document.getElementById('er-total')?.value)||0;
  const monto_senia  = parseMonto(document.getElementById('er-senia')?.value)||0;
  const btn = document.getElementById('er-save');
  btn.disabled=true; btn.textContent='Guardando...';
  const r = await api('PUT', `/reservas/${id}`, {
    nombre_huesped: document.getElementById('er-nombre')?.value.trim(),
    documento:      document.getElementById('er-doc')?.value.trim(),
    entrada, salida,
    noches: Math.max(1,Math.round((new Date(salida)-new Date(entrada))/86400000)),
    precio_total, monto_senia,
    saldo_pendiente: Math.max(0, precio_total-monto_senia),
    metodo_pago: document.getElementById('er-metodo')?.value,
    plataforma: document.getElementById('er-plataforma')?.value,
    notas: document.getElementById('er-notas')?.value.trim(),
  });
  if (r?.ok) {
    toast('Reserva actualizada ✓');
    cerrarModalEditar();
    cargarYRenderizar();
  } else {
    toast(r?.error||'Error al guardar', false);
    btn.disabled=false; btn.textContent='💾 Guardar cambios';
  }
}

      </div>
      <div class="res-cards" id="res-cards"></div>`;
    document.getElementById('lista-buscar').addEventListener('input', e => {
      clearTimeout(_listaSearchTimer);
      const val = e.target.value;
      _listaSearchTimer = setTimeout(() => { G.listaSearch = val.trim(); cargarLista(); }, 350);
    });
    document.getElementById('lista-filtro-plataforma').addEventListener('change', e => {
      G.listaPlataforma = e.target.value; pintarCards();
    });
    document.getElementById('lista-filtro-pago').addEventListener('change', e => {
      G.listaPago = e.target.value; pintarCards();
    });
  }
  await cargarContadores();
  pintarTabs();
  await cargarLista();
}

async function cargarContadores() {
  G.listaContadores = await api('GET', '/reservas/contadores') || G.listaContadores;
}

function pintarTabs() {
  document.getElementById('lista-tabs').innerHTML = TABS_LISTA.map(t => `
    <button class="lista-tab${G.listaEstado===t.id?' activo':''}" onclick="cambiarTabLista('${t.id}')">
      ${t.label} <span class="cnt">${G.listaContadores[t.id]||0}</span>
    </button>`).join('');
}

function cambiarTabLista(estado) {
  G.listaEstado = estado;
  pintarTabs();
  cargarLista();
}

async function cargarLista() {
  const cont = document.getElementById('res-cards');
  cont.innerHTML = '<div style="text-align:center;padding:32px;color:#94a3b8">Cargando...</div>';
  const qs = new URLSearchParams({ estado: G.listaEstado });
  if (G.listaSearch) qs.set('search', G.listaSearch);
  G.listaData = await api('GET', `/reservas/lista?${qs.toString()}`) || [];
  // Mantener disponibles para el modal de detalle / cambio de hab.
  G.listaData.forEach(r => { if (!G.reservas.find(x=>x.id===r.id)) G.reservas.push(r); });
  pintarCards();
}

function pintarCards() {
  const cont = document.getElementById('res-cards');
  let datos = G.listaData;
  if (G.listaPlataforma) datos = datos.filter(r => (r.plataforma||'Directo') === G.listaPlataforma);
  if (G.listaPago) {
    datos = datos.filter(r => {
      const info = infoPago(r);
      if (G.listaPago==='pagado')    return info.label.includes('Pagado');
      if (G.listaPago==='senia')     return info.label.includes('Seña');
      if (G.listaPago==='pendiente') return info.label.includes('Pendiente');
      return true;
    });
  }
  if (!datos.length) {
    cont.innerHTML = `<div class="res-cards-empty">Sin reservas en esta categoría</div>`;
    return;
  }
  const isAdminOrRecep = ['admin','recepcionista'].includes(ME?.rol);
  cont.innerHTML = datos.map(r => cardReservaHTML(r, isAdminOrRecep)).join('');
}

function cardReservaHTML(r, isAdminOrRecep) {
  const hab = G.habitaciones.find(h=>String(h.id)===String(r.habitacion_id)) || {};
  const pago = infoPago(r);
  const esVencida = r.estado==='futura' && new Date(r.entrada) < new Date();
  const acciones = [];
  if (isAdminOrRecep) {
    acciones.push(`<button class="rc-btn" style="background:#eff6ff;color:#2563eb" onclick="verReservaLista(${r.id})" title="Ver / editar">✏️ Editar</button>`);
    if (['futura','activa'].includes(r.estado)) {
      acciones.push(`<button class="rc-btn" style="background:#f5f3ff;color:#7c3aed" onclick="abrirCambioHabDirecto(${r.id})" title="Cambiar habitación">🔄</button>`);
    }
    if (r.estado === 'futura') {
      acciones.push(`<button class="rc-btn" style="background:#111827;color:#fff" onclick="entradaDesdeCard('${r.habitacion_id}')" title="Hacer check-in">✓ Entrada</button>`);
      acciones.push(`<button class="rc-btn" style="background:#fff1f2;color:#be123c" onclick="cancelarReserva(${r.id},'${(r.nombre_huesped||'').replace(/'/g,"\\'")}')" title="Cancelar reserva">✕</button>`);
    }
    if (r.estado === 'cancelada') {
      acciones.push(`<button class="rc-btn" style="background:#dcfce7;color:#166534" onclick="reactivarReserva(${r.id},'${(r.nombre_huesped||'').replace(/'/g,"\\'")}')" title="Reactivar reserva">↺ Reactivar</button>`);
      acciones.push(`<button class="rc-btn" style="background:#fff1f2;color:#be123c" onclick="eliminarReserva(${r.id},'${(r.nombre_huesped||'').replace(/'/g,"\\'")}')" title="Eliminar definitivamente">🗑️</button>`);
    }
  } else {
    acciones.push(`<button class="rc-btn" style="background:#eff6ff;color:#2563eb" onclick="verReservaLista(${r.id})" title="Ver detalle">👁 Ver</button>`);
  }

  return `<div class="res-card">
    <div class="rc-top">
      <div>
        <div class="rc-nombre">${r.nombre_huesped}</div>
        <div class="rc-meta">
          ${badgePlataforma(r.plataforma)}
          <span class="rc-badge" style="background:${pago.bg};color:${pago.color}">${pago.label}</span>
          ${esVencida?'<span class="rc-badge" style="background:#fef3c7;color:#b45309">⚠ Vencida</span>':''}
        </div>
      </div>
      <div class="rc-actions">${acciones.join('')}</div>
    </div>
    <div class="rc-body">
      <div><div class="rc-field-lbl">Habitación</div><div class="rc-field-val">${r.hab_numero||hab.numero||r.habitacion_id} · ${r.ala||hab.ala||''}</div></div>
      <div><div class="rc-field-lbl">Entrada</div><div class="rc-field-val">${fmtDate(r.entrada)}</div></div>
      <div><div class="rc-field-lbl">Salida</div><div class="rc-field-val">${fmtDate(r.salida)}</div></div>
      <div><div class="rc-field-lbl">Total</div><div class="rc-total">${fmt(r.precio_total)}</div></div>
      <div><div class="rc-field-lbl">Método</div><div class="rc-field-val">${r.metodo_pago||'—'}</div></div>
    </div>
  </div>`;
}

function fmtDate(iso) {
  if (!iso) return '—';
  return new Date(iso).toLocaleString('es-AR',{day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit'});
}

function verReservaLista(id) {
  const r = G.listaData.find(x=>x.id===id) || G.reservas.find(x=>x.id===id);
  if (!r) return;
  if (!G.reservas.find(x=>x.id===id)) G.reservas.push(r);
  G.reservaActual = r;
  verReserva(id);
}

// Check-in directo desde la card: abre Habitaciones con el modal de la habitación ya abierto
function entradaDesdeCard(habitacionId) {
  sessionStorage.setItem('takua_open_hab', habitacionId);
  window.location.href = '/index.html#habitaciones';
}

async function cancelarReserva(id, nombre) {
  if (!confirm(`¿Cancelar la reserva de ${nombre}? La habitación quedará libre si no tiene otra reserva vigente.`)) return;
  const r = await api('POST', `/reservas/${id}/cancelar`);
  if (r?.ok) { toast('Reserva cancelada'); await cargarContadores(); pintarTabs(); cargarLista(); }
  else toast(r?.error||'Error', false);
}

async function reactivarReserva(id, nombre) {
  if (!confirm(`¿Reactivar la reserva de ${nombre}?`)) return;
  const r = await api('POST', `/reservas/${id}/reactivar`);
  if (r?.ok) { toast('Reserva reactivada'); await cargarContadores(); pintarTabs(); cargarLista(); }
  else toast(r?.error||'Error', false);
}

async function eliminarReserva(id, nombre) {
  if (!confirm(`¿Eliminar definitivamente la reserva de ${nombre}? Esta acción no se puede deshacer.`)) return;
  const r = await api('DELETE', `/reservas/${id}`);
  if (r?.ok) { toast('Reserva eliminada'); await cargarContadores(); pintarTabs(); cargarLista(); }
  else toast(r?.error||'Error', false);
}

// ── INICIO ────────────────────────────────────────────
init();
</script>
<script src="/sidebar.js"></script>
</body>
</html>
