<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover">
<title>Caja Global — Hotel Takuá</title>
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#00c9b1">
<link rel="apple-touch-icon" href="/icon-192.png">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--sidebar:#1a2035;--sw:72px;--accent:#00c9b1}
body{font-family:'Nunito',sans-serif;background:#f0f4f8;color:#1a2035;font-size:14px;overflow-x:hidden}

.main{margin-left:var(--sw);display:flex;flex-direction:column;min-height:100vh}
.topbar{background:#fff;padding:12px 22px;display:flex;align-items:center;gap:10px;border-bottom:1px solid #e8edf3;position:sticky;top:0;z-index:100}
.hamburger{display:none;align-items:center;justify-content:center;width:36px;height:36px;border-radius:8px;border:1.5px solid #e2e8f0;background:#f8fafc;font-size:18px;cursor:pointer;flex-shrink:0}
.tb-left{flex:1;min-width:0}
.tb-left h2{font-size:16px;font-weight:800;color:#1a2035;margin:0}
.tb-left p{font-size:11px;color:#94a3b8;margin-top:1px}
.tb-right{display:flex;align-items:center;gap:8px;flex-shrink:0}
.content{padding:20px 24px;max-width:1400px;margin:0 auto;width:100%}
.user-av{width:36px;height:36px;border-radius:50%;background:var(--accent);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:14px;flex-shrink:0}
.btn-salir{background:none;border:1.5px solid #e2e8f0;border-radius:8px;padding:6px 14px;font-size:13px;font-weight:700;color:#dc2626;cursor:pointer;font-family:'Nunito',sans-serif}
.section-card{background:#fff;border-radius:18px;padding:22px 24px;box-shadow:0 1px 8px rgba(0,0,0,.07);margin-bottom:20px}
.sc-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;flex-wrap:wrap;gap:10px}
.card-title{font-size:16px;font-weight:800;color:#1a2035}
.tabs{display:flex;gap:6px;background:transparent;border-radius:12px;padding:0;margin-bottom:20px;flex-wrap:wrap}
.tab{flex:1;min-width:80px;padding:10px 14px;border-radius:10px;border:1.5px solid #e2e8f0;background:#fff;font-family:'Nunito',sans-serif;font-size:13px;font-weight:700;color:#64748b;cursor:pointer;transition:all .15s;white-space:nowrap;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.tab:hover{background:#f8fafc;color:#1a2035;border-color:#cbd5e1}
.tab.active{background:linear-gradient(135deg,#1a2035,#2d3a5c);color:#fff;border-color:transparent;box-shadow:0 2px 8px rgba(26,32,53,.25)}
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:20px}
.stat-card{border-radius:14px;padding:16px 18px;color:#fff;position:relative;overflow:hidden}
.stat-card::after{content:'';position:absolute;right:-10px;bottom:-10px;width:70px;height:70px;border-radius:50%;background:rgba(255,255,255,.08)}
.stat-lbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;opacity:.8;margin-bottom:4px}
.stat-val{font-size:22px;font-weight:900;line-height:1}
.stat-sub{font-size:11px;opacity:.7;margin-top:4px}
.data-table{width:100%;border-collapse:collapse}
.data-table th{text-align:left;padding:10px 12px;font-size:11px;font-weight:800;color:#94a3b8;text-transform:uppercase;letter-spacing:.5px;border-bottom:2px solid #f1f5f9}
.data-table td{padding:10px 12px;border-bottom:1px solid #f8fafc;font-size:13px;vertical-align:middle}
.data-table tbody tr:hover{background:#f8fafc}
.pill{display:inline-block;border-radius:20px;padding:2px 10px;font-size:11px;font-weight:700}
.pg{background:#dcfce7;color:#16a34a}.pr{background:#fee2e2;color:#dc2626}
.pb{background:#dbeafe;color:#1d4ed8}.pgr{background:#f3f4f6;color:#374151}
.po{background:#ffedd5;color:#c2410c}
.btn-primary{background:linear-gradient(135deg,var(--accent),#0094ff);border:none;border-radius:10px;padding:10px 18px;color:#fff;font-size:13px;font-weight:700;cursor:pointer;font-family:'Nunito',sans-serif}
.btn-secondary{background:#f1f5f9;border:1.5px solid #e2e8f0;border-radius:10px;padding:9px 16px;color:#475569;font-size:13px;font-weight:700;cursor:pointer;font-family:'Nunito',sans-serif}
/* MOV ROW — billetera */
.mov-item{display:flex;align-items:center;gap:12px;padding:12px 16px;border-radius:12px;margin-bottom:8px;background:#fff;box-shadow:0 1px 4px rgba(0,0,0,.05)}
.mov-icon{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.mov-icon.ing{background:#dcfce7}
.mov-icon.egr{background:#fee2e2}
.mov-body{flex:1;min-width:0}
.mov-concepto{font-weight:700;font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.mov-meta{font-size:11px;color:#94a3b8;margin-top:2px}
.mov-monto{font-size:16px;font-weight:900;text-align:right;flex-shrink:0}
/* FUENTE BADGE */
.fuente-rest{background:#dbeafe;color:#1d4ed8;border-radius:6px;padding:2px 8px;font-size:10px;font-weight:700}
.fuente-hab{background:#dcfce7;color:#15803d;border-radius:6px;padding:2px 8px;font-size:10px;font-weight:700}
/* METODO */
.metodo-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid #f1f5f9;font-size:13px}
/* DATE INPUT */
.date-row{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-bottom:16px}
.date-row input[type=date]{border:1.5px solid #e2e8f0;border-radius:9px;padding:8px 12px;font-size:13px;font-family:'Nunito',sans-serif}
/* POR DIA */
.dia-row{display:flex;justify-content:space-between;align-items:center;padding:8px 12px;border-radius:8px;margin-bottom:6px;font-size:13px}
.dia-row:nth-child(even){background:#f8fafc}
/* RESUMEN BLOQUES */
.resumen-bloque{border-radius:14px;padding:16px 18px;border:1.5px solid #e2e8f0;margin-bottom:12px}
@media(max-width:900px){
  :root{--sw:0px}
  .main{margin-left:0!important}
  .stats-grid{grid-template-columns:1fr 1fr;gap:8px}
  .content{padding:12px 10px}
  .panel-grid{grid-template-columns:1fr!important}
  #hamburger{display:flex!important}
  .tabs-row{overflow-x:auto;-webkit-overflow-scrolling:touch;flex-wrap:nowrap}
  .tab{white-space:nowrap;font-size:12px;padding:8px 12px}
}
@media(max-width:600px){
  .stats-grid{grid-template-columns:1fr 1fr;gap:8px}
  .stat-val{font-size:17px}
  input[type=date]{font-size:16px!important}
  .date-row{flex-wrap:wrap;gap:8px}
  .date-row input[type=date]{flex:1;min-width:130px}
}
</style>
</head>
<body>


<div class="main">
  <div class="topbar">
    <button class="hamburger" id="hamburger">☰</button>
    <div class="tb-left">
      <h2>💰 Caja Global — Hotel Takuá</h2>
      <p id="tb-fecha">Cargando...</p>
    </div>
    <div class="tb-right">
      <div class="user-av" id="user-av">A</div>
      <button class="btn-salir" onclick="doLogout()">Salir</button>
    </div>
  </div>
  <div class="content" id="main-content">
    <div style="text-align:center;padding:60px;color:#94a3b8;font-size:16px">⏳ Cargando caja...</div>
  </div>
</div>

<script>
// ── AUTH ──────────────────────────────────────────────
const TOKEN = localStorage.getItem('takua_token');
const ME    = JSON.parse(localStorage.getItem('takua_user') || 'null');
if (!TOKEN || !ME) window.location.href = '/portal.html';
if (ME && ME.rol !== 'admin') window.location.href = '/index.html';

document.getElementById('user-av').textContent = (ME?.nombre||'A')[0].toUpperCase();
document.getElementById('tb-fecha').textContent = new Date().toLocaleDateString('es-AR',{weekday:'long',day:'numeric',month:'long',year:'numeric'});

function doLogout() {
  localStorage.removeItem('takua_token');
  localStorage.removeItem('takua_user');
  window.location.href = '/portal.html';
}



// ── API ───────────────────────────────────────────────
async function api(method, path, body) {
  try {
    const r = await fetch('/api'+path, {
      method,
      headers:{'Content-Type':'application/json','Authorization':'Bearer '+TOKEN},
      body: body ? JSON.stringify(body) : undefined
    });
    return r.json();
  } catch(e) { return {error:e.message}; }
}

// ── UTILS ─────────────────────────────────────────────
const fmt = n => n==null?'—':new Intl.NumberFormat('es-AR',{style:'currency',currency:'ARS',minimumFractionDigits:0,maximumFractionDigits:0}).format(n);
const fmtDate = iso => iso?new Date(iso).toLocaleString('es-AR',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'}):'—';
const fmtDay  = iso => {
  if (!iso) return '—';
  // Asegurarse de que sea string y tomar solo la parte de fecha
  const str = String(iso).split('T')[0].split(' ')[0];
  const [y,m,d] = str.split('-');
  if (!y||!m||!d) return str;
  const dt = new Date(parseInt(y), parseInt(m)-1, parseInt(d));
  return dt.toLocaleDateString('es-AR',{weekday:'short',day:'2-digit',month:'2-digit'});
};
const hoy = () => new Date().toISOString().split('T')[0];

function toast(msg, ok=true) {
  const t=document.createElement('div');
  t.style.cssText='position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:'+(ok?'#1a2035':'#dc2626')+';color:#fff;padding:12px 22px;border-radius:12px;font-weight:700;font-size:13px;z-index:9999;box-shadow:0 4px 20px rgba(0,0,0,.3);font-family:Nunito,sans-serif';
  t.textContent=msg;
  document.body.appendChild(t);
  setTimeout(()=>t.remove(),3000);
}

const METODO_ICONS = {Efectivo:'💵','Tarjeta débito':'💳','Tarjeta crédito':'💳',Transferencia:'🏦',QR:'📱','Pago Mixto':'🔀',Otro:'📋'};

// ── ESTADO ────────────────────────────────────────────
const G = { tab:'hoy', desdePeriodo:'', hastaPeriodo:'' };

// ── RENDER ────────────────────────────────────────────
async function render() {
  const el = document.getElementById('main-content');
  el.innerHTML = `
    <div class="tabs">
      <button class="tab ${G.tab==='hoy'?'active':''}" onclick="setTab('hoy')">📅 Hoy</button>
      <button class="tab ${G.tab==='turnos'?'active':''}" onclick="setTab('turnos')">🕐 Turnos</button>
      <button class="tab ${G.tab==='historial'?'active':''}" onclick="setTab('historial')">📋 Historial</button>
      <button class="tab ${G.tab==='periodo'?'active':''}" onclick="setTab('periodo')">📊 Por período</button>
      <button class="tab ${G.tab==='mensual'?'active':''}" onclick="setTab('mensual')">🗓️ Mensual</button>
    </div>
    <div id="tab-content"></div>`;
  renderTab();
}

function setTab(tab) {
  G.tab = tab;
  document.querySelectorAll('.tab').forEach((t,i)=>{
    t.classList.toggle('active', ['hoy','turnos','historial','periodo','mensual'][i]===tab);
  });
  renderTab();
}

async function renderTab() {
  const el = document.getElementById('tab-content');
  if (!el) return;
  if (G.tab==='hoy')           await renderHoy(el);
  else if (G.tab==='turnos')   await renderTurnos(el);
  else if (G.tab==='historial') await renderHistorial(el);
  else if (G.tab==='periodo')   await renderPeriodo(el);
  else await renderMensual(el);
}

// ── TAB HOY ──────────────────────────────────────────
async function renderHoy(el) {
  el.innerHTML='<div style="text-align:center;padding:24px;color:#94a3b8">Cargando...</div>';

  const [data, turnoRest, turnoHab] = await Promise.all([
    api('GET', '/caja-global/resumen-dia?fecha='+hoy()),
    api('GET', '/restaurante/turno/ultimo').catch(()=>null),
    api('GET', '/caja-hab/turno/activo').catch(()=>null),
  ]);

  // Totales globales
  const rest = data?.restaurante || {};
  const restPorMetodo = rest.por_metodo || [];
  const restTotal   = restPorMetodo.reduce((s,m)=>s+Number(m.total||0),0);
  const restRetiros = Number(rest.retiros||0);
  const restNeto    = restTotal - restRetiros;
  const hab = data?.habitaciones || {};
  const habMovs     = hab.movimientos || [];
  const habIngresos = habMovs.filter(m=>m.tipo==='ingreso').reduce((s,m)=>s+Number(m.total||0),0);
  const habEgresos  = habMovs.filter(m=>m.tipo==='egreso').reduce((s,m)=>s+Number(m.total||0),0);
  const habNeto     = habIngresos - habEgresos;
  const totalDia    = restNeto + habNeto;

  // Caja restaurante — detalle del turno activo
  const cerradasRest  = turnoRest?.cerradas || [];
  const retirosRest   = turnoRest?.retiros  || [];
  const restTotalTurno= cerradasRest.reduce((s,c)=>s+Number(c.total_final||0),0);
  const restRetTurno  = retirosRest.reduce((s,r)=>s+Number(r.monto||0),0);
  const restFondo     = Number(turnoRest?.fondo_inicial||0);
  const restEnCaja    = restFondo + restTotalTurno - restRetTurno;
  const restPorMet    = {};
  cerradasRest.forEach(c=>{ restPorMet[c.metodo_pago]=(restPorMet[c.metodo_pago]||0)+Number(c.total_final||0); });

  // Caja habitaciones — detalle del turno activo
  const movsHab      = turnoHab?.movimientos || [];
  const habIngTurno  = movsHab.filter(m=>m.tipo==='ingreso').reduce((s,m)=>s+Number(m.monto||0),0);
  const habEgrTurno  = movsHab.filter(m=>m.tipo==='egreso').reduce((s,m)=>s+Number(m.monto||0),0);
  const habFondo     = Number(turnoHab?.fondo_inicial||0);
  const habEnCaja    = habFondo + habIngTurno - habEgrTurno;
  const habPorMet    = {};
  movsHab.filter(m=>m.tipo==='ingreso').forEach(m=>{ habPorMet[m.metodo_pago]=(habPorMet[m.metodo_pago]||0)+Number(m.monto||0); });

  const panelRest = turnoRest ? `
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;flex-wrap:wrap;gap:8px">
      <div>
        <div style="font-weight:800;font-size:15px;color:#1d4ed8">🍽️ Caja Restaurante</div>
        <div style="font-size:11px;color:#64748b">${turnoRest.cajero_nombre||'—'} · ${turnoRest.estado==='abierto'?'<span style="color:#16a34a;font-weight:700">● Abierta</span>':'<span style="color:#94a3b8">Cerrada</span>'}</div>
      </div>
      <div style="text-align:right">
        <div style="font-size:22px;font-weight:900;color:#1d4ed8">${fmt(restEnCaja)}</div>
        <div style="font-size:11px;color:#64748b">en caja</div>
      </div>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:12px">
      <div style="background:#eff6ff;border-radius:10px;padding:10px;text-align:center">
        <div style="font-size:18px;font-weight:800;color:#1d4ed8">${cerradasRest.length}</div>
        <div style="font-size:11px;color:#64748b">Comandas</div>
      </div>
      <div style="background:#f0fdf4;border-radius:10px;padding:10px;text-align:center">
        <div style="font-size:18px;font-weight:800;color:#16a34a">${fmt(restTotalTurno)}</div>
        <div style="font-size:11px;color:#64748b">Cobrado</div>
      </div>
      <div style="background:#fff5f5;border-radius:10px;padding:10px;text-align:center">
        <div style="font-size:18px;font-weight:800;color:#dc2626">${fmt(restRetTurno)}</div>
        <div style="font-size:11px;color:#64748b">Retiros</div>
      </div>
    </div>
    ${Object.entries(restPorMet).map(([m,v])=>`
      <div class="metodo-row"><span>${METODO_ICONS[m]||'💰'} ${m}</span><strong>${fmt(v)}</strong></div>`).join('')}
    <div class="metodo-row" style="border-top:2px solid #dbeafe;margin-top:6px;padding-top:8px">
      <span style="font-weight:700">Fondo inicial</span>
      <span style="display:flex;align-items:center;gap:8px">${fmt(restFondo)}
        ${turnoRest?.estado==='abierto'?`<button onclick="modalEditarFondo(${turnoRest.id},'restaurante',${restFondo})"
          style="background:#eff6ff;border:1px solid #bfdbfe;border-radius:6px;padding:2px 8px;font-size:11px;cursor:pointer;font-family:Nunito,sans-serif;color:#1d4ed8;font-weight:700">✏️ Editar</button>`:''}
      </span>
    </div>
    <div class="metodo-row">
      <span style="font-weight:700">Total en caja</span><strong style="color:#1d4ed8;font-size:15px">${fmt(restEnCaja)}</strong>
    </div>
    ${retirosRest.length?`<div style="margin-top:10px">
      <div style="font-size:11px;font-weight:700;color:#94a3b8;margin-bottom:6px">RETIROS</div>
      ${retirosRest.map(r=>`<div class="metodo-row" style="font-size:12px">
        <span>${r.motivo||'—'} · ${r.usuario_nombre||''}</span>
        <span style="color:#dc2626">- ${fmt(r.monto)}</span>
      </div>`).join('')}
    </div>`:''}
  ` : `<div style="text-align:center;padding:20px;color:#94a3b8">Sin turno activo en restaurante</div>`;

  const panelHab = turnoHab ? `
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;flex-wrap:wrap;gap:8px">
      <div>
        <div style="font-weight:800;font-size:15px;color:#0f766e">🛏️ Caja Habitaciones</div>
        <div style="font-size:11px;color:#64748b">${turnoHab.cajero_nombre||'—'} · <span style="color:#16a34a;font-weight:700">● Abierta</span></div>
      </div>
      <div style="text-align:right">
        <div style="font-size:22px;font-weight:900;color:#0f766e">${fmt(habEnCaja)}</div>
        <div style="font-size:11px;color:#64748b">en caja</div>
      </div>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:12px">
      <div style="background:#f0fdf9;border-radius:10px;padding:10px;text-align:center">
        <div style="font-size:18px;font-weight:800;color:#0f766e">${movsHab.filter(m=>m.tipo==='ingreso').length}</div>
        <div style="font-size:11px;color:#64748b">Ingresos</div>
      </div>
      <div style="background:#f0fdf4;border-radius:10px;padding:10px;text-align:center">
        <div style="font-size:18px;font-weight:800;color:#16a34a">${fmt(habIngTurno)}</div>
        <div style="font-size:11px;color:#64748b">Cobrado</div>
      </div>
      <div style="background:#fff5f5;border-radius:10px;padding:10px;text-align:center">
        <div style="font-size:18px;font-weight:800;color:#dc2626">${fmt(habEgrTurno)}</div>
        <div style="font-size:11px;color:#64748b">Egresos</div>
      </div>
    </div>
    ${Object.entries(habPorMet).map(([m,v])=>`
      <div class="metodo-row"><span>${METODO_ICONS[m]||'💰'} ${m}</span><strong>${fmt(v)}</strong></div>`).join('')}
    <div class="metodo-row" style="border-top:2px solid #a7f3d0;margin-top:6px;padding-top:8px">
      <span style="font-weight:700">Fondo inicial</span>
      <span style="display:flex;align-items:center;gap:8px">${fmt(habFondo)}
        <button onclick="modalEditarFondo(${turnoHab.id},'hab',${habFondo})"
          style="background:#f0fdf9;border:1px solid #a7f3d0;border-radius:6px;padding:2px 8px;font-size:11px;cursor:pointer;font-family:Nunito,sans-serif;color:#0f766e;font-weight:700">✏️ Editar</button>
      </span>
    </div>
    <div class="metodo-row">
      <span style="font-weight:700">Total en caja</span><strong style="color:#0f766e;font-size:15px">${fmt(habEnCaja)}</strong>
    </div>
    ${movsHab.filter(m=>m.tipo==='egreso').length?`<div style="margin-top:10px">
      <div style="font-size:11px;font-weight:700;color:#94a3b8;margin-bottom:6px">EGRESOS</div>
      ${movsHab.filter(m=>m.tipo==='egreso').map(m=>`<div class="metodo-row" style="font-size:12px">
        <span>${m.concepto||'—'} · ${m.usuario_nombre||''}</span>
        <span style="color:#dc2626">- ${fmt(m.monto)}</span>
      </div>`).join('')}
    </div>`:''}
    <div style="margin-top:14px;display:flex;gap:8px;flex-wrap:wrap"><button onclick="modalEgresoHab()" style="flex:1;background:#fff5f5;border:1.5px solid #fecaca;color:#dc2626;border-radius:8px;padding:8px;font-size:12px;font-weight:700;cursor:pointer;font-family:Nunito,sans-serif">💸 Egreso</button><button onclick="modalCerrarTurnoHab(${turnoHab.id},${habEnCaja})" style="flex:1;background:#fef9ec;border:1.5px solid #fde68a;color:#92400e;border-radius:8px;padding:8px;font-size:12px;font-weight:700;cursor:pointer;font-family:Nunito,sans-serif">🔒 Cerrar turno</button></div>

async function renderTurnos(el) {
  el.innerHTML='<div style="text-align:center;padding:24px;color:#94a3b8">Cargando historial de turnos...</div>';
  const [turnosRest, turnosHab] = await Promise.all([
    api('GET', '/caja-global/turnos?fuente=restaurante'),
    api('GET', '/caja-global/turnos?fuente=habitaciones'),
  ]);

  const fmtTurno = (t, fuente) => {
    const color = fuente==='restaurante' ? '#1d4ed8' : '#0f766e';
    const bg    = fuente==='restaurante' ? '#eff6ff'  : '#f0fdf9';
    const icon  = fuente==='restaurante' ? '🍽️' : '🛏️';
    const abierto = fmtDate(t.abierto_at);
    const cerrado = t.cerrado_at ? fmtDate(t.cerrado_at) : '—';
    const totalFinal = t.total_final ?? (Number(t.fondo_inicial||0) + Number(t.total_cobrado||0) - Number(t.total_retiros||0));
    return `<tr>
      <td style="padding:10px 12px">
        <span style="background:${bg};color:${color};border-radius:6px;padding:2px 8px;font-size:11px;font-weight:700">${icon} ${fuente==='restaurante'?'Restaurante':'Habitaciones'}</span>
      </td>
      <td style="padding:10px 12px;font-size:13px">${t.cajero_nombre||'—'}</td>
      <td style="padding:10px 12px;font-size:13px">${fmt(t.fondo_inicial||0)}
        ${t.estado==='abierto'?`<button onclick="modalEditarFondo(${t.id},'${fuente}',${t.fondo_inicial||0})"
          style="margin-left:6px;background:#f1f5f9;border:1px solid #e2e8f0;border-radius:6px;padding:2px 8px;font-size:11px;cursor:pointer;font-family:Nunito,sans-serif;font-weight:700">✏️</button>`:''}
      </td>
      <td style="padding:10px 12px;font-size:12px;color:#64748b">${abierto}</td>
      <td style="padding:10px 12px;font-size:12px;color:#64748b">${cerrado}</td>
      <td style="padding:10px 12px;font-weight:700;color:${color}">${t.estado==='cerrado'?fmt(totalFinal):'—'}</td>
      <td style="padding:10px 12px">
        <span class="pill ${t.estado==='abierto'?'pg':'pgr'}">${t.estado==='abierto'?'● Abierto':'Cerrado'}</span>
      </td>
      <td style="padding:10px 12px">
        ${t.estado==='cerrado'?`
          <div style="display:flex;gap:6px">
            <button onclick="reimprimirArqueo(${t.id},'${fuente}')"
              style="background:#1e293b;color:#fff;border:none;border-radius:7px;padding:5px 10px;font-size:12px;font-weight:700;cursor:pointer;font-family:Nunito,sans-serif">
              🖨️ Arqueo
            </button>
            ${fuente==='restaurante'?`<button onclick="imprimirResumenVentas(${t.id})"
              style="background:#0f766e;color:#fff;border:none;border-radius:7px;padding:5px 10px;font-size:12px;font-weight:700;cursor:pointer;font-family:Nunito,sans-serif">
              📊 Ventas
            </button>`:''}
          </div>`:'—'}
      </td>
    </tr>`;
  };

  // Intercalar ambas listas por fecha
  const todos = [
    ...(turnosRest||[]).map(t=>({...t,fuente:'restaurante'})),
    ...(turnosHab||[]).map(t=>({...t,fuente:'habitaciones'})),
  ].sort((a,b)=>new Date(b.abierto_at)-new Date(a.abierto_at));

  el.innerHTML = `
    <div class="section-card">
      <div class="sc-head"><span class="card-title">🕐 Historial de turnos (${todos.length})</span></div>
      <div style="overflow-x:auto">
        <table class="data-table">
          <thead><tr>
            <th>Caja</th><th>Usuario</th><th>Fondo inicial</th>
            <th>Apertura</th><th>Cierre</th><th>Total final</th><th>Estado</th><th>Acciones</th>
          </tr></thead>
          <tbody>
            ${todos.length ? todos.map(t=>fmtTurno(t,t.fuente)).join('') :
              '<tr><td colspan="6" style="text-align:center;color:#94a3b8;padding:32px">Sin turnos registrados</td></tr>'}
          </tbody>
        </table>
      </div>
    </div>`;
}

// ── RESUMEN DE VENTAS POR ÍTEM ────────────────────────
async function imprimirResumenVentas(turnoId) {
  const data = await api('GET', `/caja-global/turno-detalle?id=${turnoId}&fuente=restaurante`);
  if (data?.error) { toast(data.error, false); return; }

  const items    = data.itemsVendidos || [];
  const cerradas = data.cerradas || [];
  const apertura = data.abierto_at ? new Date(data.abierto_at).toLocaleString('es-AR',{day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit'}) : '—';
  const cierre   = data.cerrado_at  ? new Date(data.cerrado_at).toLocaleString('es-AR',{day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit'}) : '—';
  const totalVentas = items.reduce((s,i)=>s+Number(i.total||0),0);
  const totalCmds   = cerradas.reduce((s,c)=>s+Number(c.total_final||0),0);

  // Agrupar por categoría
  const cats = {};
  items.forEach(i => {
    const cat = i.categoria || 'Sin categoría';
    if (!cats[cat]) cats[cat] = [];
    cats[cat].push(i);
  });

  const html = `<!DOCTYPE html><html lang="es"><head><meta charset="UTF-8">
  <title>Resumen de Ventas — Hotel Takuá</title>
  <style>
    @page { size: 80mm auto; margin: 0mm; }
    @media print { html, body { margin: 0; padding: 0; } }
    body { font-family: 'Courier New', Courier, monospace; font-size: 13px;
           width: 280px; margin: 0 auto; padding: 8px; line-height: 1.4; color: #000; font-weight: 500; }
  </style></head><body>
  <div style="text-align:center;font-weight:bold;font-size:18px">🏨 Hotel Takuá</div>
  <div style="text-align:center;font-size:13px">🍽️ Restaurante — Resumen de Ventas</div>
  <div style="text-align:center;font-size:11px">${apertura} → ${cierre}</div>
  <div style="text-align:center;font-size:11px">Cajero: ${data.cajero_nombre||'—'}</div>
  <div style="border-top:2px solid #000;margin:8px 0"></div>

  <div style="display:flex;justify-content:space-between;margin-bottom:2px">
    <span style="font-size:11px;font-weight:bold">ÍTEM</span>
    <span style="font-size:11px;font-weight:bold">CANT&nbsp;&nbsp;&nbsp;TOTAL</span>
  </div>
  <div style="border-top:1px solid #000;margin-bottom:6px"></div>

  ${Object.entries(cats).map(([cat, its]) => `
    <div style="font-weight:bold;font-size:12px;margin:6px 0 3px;text-transform:uppercase;letter-spacing:.3px">▸ ${cat}</div>
    ${its.map(i => {
      const nombre = i.nombre.length > 20 ? i.nombre.substring(0,19)+'.' : i.nombre;
      const cant   = String(Math.round(i.cantidad)).padStart(3,' ');
      const total  = fmt(i.total).padStart(10,' ');
      return `<div style="display:flex;justify-content:space-between;font-size:12px;padding:1px 0">
        <span>${nombre}</span>
        <span>${cant}&nbsp;&nbsp;${fmt(i.total)}</span>
      </div>`;
    }).join('')}
  `).join('')}

  <div style="border-top:2px solid #000;margin:8px 0"></div>
  <div style="display:flex;justify-content:space-between;font-size:14px;font-weight:bold">
    <span>TOTAL VENDIDO</span><span>${fmt(totalVentas)}</span>
  </div>
  <div style="display:flex;justify-content:space-between;font-size:12px;margin-top:2px">
    <span>Comandas cerradas</span><span>${cerradas.length}</span>
  </div>
  <div style="border-top:1px solid #000;margin:8px 0"></div>
  <div style="text-align:center;font-size:11px">Hotel Takuá · ${new Date().toLocaleString('es-AR',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'})}</div>
  </body></html>`;

  const frameId = 'ventas-print-frame';
  let frame = document.getElementById(frameId);
  if (!frame) {
    frame = document.createElement('iframe');
    frame.id = frameId;
    frame.style.cssText = 'position:fixed;top:-9999px;left:-9999px;width:0;height:0;border:none';
    document.body.appendChild(frame);
  }
  frame.srcdoc = html;
  frame.onload = () => {
    try { frame.contentWindow.focus(); frame.contentWindow.print(); }
    catch(e) { console.error('Error imprimiendo:', e); }
  };
}

async function reimprimirArqueo(turnoId, fuente) {
  const data = await api('GET', `/caja-global/turno-detalle?id=${turnoId}&fuente=${fuente}`);
  if (data?.error) { toast(data.error, false); return; }

  const fondo      = Number(data.fondo_inicial||0);
  const apertura   = data.abierto_at ? new Date(data.abierto_at).toLocaleString('es-AR',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'}) : '—';
  const cierre     = data.cerrado_at ? new Date(data.cerrado_at).toLocaleString('es-AR',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'}) : '—';
  const METODO_ICONS = {Efectivo:'💵',Tarjeta:'💳',Transferencia:'🏦','Tarjeta débito':'💳','Tarjeta crédito':'💳',Débito:'💳',Otro:'📋'};
  const icono = fuente==='restaurante' ? '🍽️ Restaurante' : '🛏️ Habitaciones';

  let cuerpo = '';

  if (fuente === 'restaurante') {
    const cerradas    = data.cerradas || [];
    const retiros     = data.retiros  || [];
    const porMetodo   = data.porMetodo || {};
    const totalNeto   = cerradas.reduce((s,c)=>s+Number(c.total_final||0),0);
    const totalDesc   = cerradas.reduce((s,c)=>s+(Number(c.total||0)-Number(c.total_final||c.total||0)),0);
    const totalBruto  = totalNeto + totalDesc;
    const totalRet    = retiros.reduce((s,r)=>s+Number(r.monto||0),0);
    const totalVueltos= cerradas.reduce((s,c)=>s+Number(c.vuelto||0),0);
    const totalCaja   = fondo + totalNeto - totalRet;

    cuerpo = `
      <div style="display:flex;justify-content:space-between"><span>Cajero:</span><span style="font-weight:bold">${data.cajero_nombre||'—'}</span></div>
      <div style="display:flex;justify-content:space-between"><span>Apertura:</span><span style="font-weight:bold">${apertura}</span></div>
      <div style="display:flex;justify-content:space-between"><span>Cierre:</span><span style="font-weight:bold">${cierre}</span></div>
      <div style="border-top:2px solid #000;margin:8px 0"></div>
      <div style="font-weight:bold;margin-bottom:6px;font-size:15px">RESUMEN</div>
      ${[
        ['Fondo inicial',     fmt(fondo)],
        ['Comandas cobradas', cerradas.length+''],
        ['Total bruto',       fmt(totalBruto)],
        ...(totalDesc>0?[['Descuentos','- '+fmt(totalDesc)]]:[] ),
        ['Total neto cobrado',fmt(totalNeto)],
        ...(totalRet>0?[['Retiros de caja','- '+fmt(totalRet)]]:[] ),
        ...(totalVueltos>0?[['Vuelto entregado',fmt(totalVueltos)]]:[] ),
        ['TOTAL EN CAJA',     fmt(totalCaja)],
      ].map(([l,v],i,arr)=>`<div style="display:flex;justify-content:space-between${i===arr.length-1?';font-weight:bold;font-size:15px;border-top:2px solid #000;padding-top:4px;margin-top:4px':''}"><span>${l}</span><span>${v}</span></div>`).join('')}
      ${Object.keys(porMetodo).length?`
      <div style="border-top:2px solid #000;margin:8px 0"></div>
      <div style="font-weight:bold;margin-bottom:6px;font-size:15px">POR MÉTODO DE PAGO</div>
      ${Object.entries(porMetodo).map(([m,v])=>`<div style="display:flex;justify-content:space-between"><span>${METODO_ICONS[m]||''} ${m}:</span><span>${fmt(v)}</span></div>`).join('')}`:''}
      ${retiros.length?`
      <div style="border-top:2px solid #000;margin:8px 0"></div>
      <div style="font-weight:bold;margin-bottom:6px;font-size:15px">RETIROS DE CAJA</div>
      ${retiros.map(r=>`<div style="display:flex;justify-content:space-between;border-bottom:1px solid #000;padding:4px 0"><span>${r.motivo||'—'}</span><span style="font-weight:bold">- ${fmt(r.monto)}</span></div>`).join('')}`:''}
      ${cerradas.length?`
      <div style="border-top:2px solid #000;margin:8px 0"></div>
      <div style="font-weight:bold;margin-bottom:6px;font-size:15px">COMANDAS CERRADAS (${cerradas.length})</div>
      ${cerradas.map(c=>`<div style="display:flex;justify-content:space-between;border-bottom:1px solid #000;padding:4px 0"><span>Mesa ${c.mesa_id}${c.cajero_nombre?' · '+c.cajero_nombre:''}</span><span style="font-weight:bold">${fmt(c.total_final||0)}</span></div>`).join('')}`:''}`;

  } else {
    const movs       = data.movimientos || [];
    const porMetodo  = data.porMetodo || {};
    const ingresos   = movs.filter(m=>m.tipo==='ingreso').reduce((s,m)=>s+Number(m.monto||0),0);
    const egresos    = movs.filter(m=>m.tipo==='egreso').reduce((s,m)=>s+Number(m.monto||0),0);
    const totalCaja  = fondo + ingresos - egresos;

    cuerpo = `
      <div style="display:flex;justify-content:space-between"><span>Cajero:</span><span style="font-weight:bold">${data.cajero_nombre||'—'}</span></div>
      <div style="display:flex;justify-content:space-between"><span>Apertura:</span><span style="font-weight:bold">${apertura}</span></div>
      <div style="display:flex;justify-content:space-between"><span>Cierre:</span><span style="font-weight:bold">${cierre}</span></div>
      <div style="border-top:2px solid #000;margin:8px 0"></div>
      <div style="font-weight:bold;margin-bottom:6px;font-size:15px">RESUMEN</div>
      ${[
        ['Fondo inicial',  fmt(fondo)],
        ['Total ingresos', fmt(ingresos)],
        ...(egresos>0?[['Total egresos','- '+fmt(egresos)]]:[] ),
        ['TOTAL EN CAJA',  fmt(totalCaja)],
      ].map(([l,v],i,arr)=>`<div style="display:flex;justify-content:space-between${i===arr.length-1?';font-weight:bold;font-size:15px;border-top:2px solid #000;padding-top:4px;margin-top:4px':''}"><span>${l}</span><span>${v}</span></div>`).join('')}
      ${Object.keys(porMetodo).length?`
      <div style="border-top:2px solid #000;margin:8px 0"></div>
      <div style="font-weight:bold;margin-bottom:6px;font-size:15px">POR MÉTODO DE PAGO</div>
      ${Object.entries(porMetodo).map(([m,v])=>`<div style="display:flex;justify-content:space-between"><span>${METODO_ICONS[m]||''} ${m}:</span><span>${fmt(v)}</span></div>`).join('')}`:''}
      ${movs.length?`
      <div style="border-top:2px solid #000;margin:8px 0"></div>
      <div style="font-weight:bold;margin-bottom:6px;font-size:15px">MOVIMIENTOS (${movs.length})</div>
      ${movs.map(m=>`<div style="display:flex;justify-content:space-between;border-bottom:1px solid #000;padding:4px 0"><span>${m.concepto||'—'} (${m.tipo})</span><span style="font-weight:bold${m.tipo==='egreso'?';color:red':''}">${m.tipo==='egreso'?'- ':''}${fmt(m.monto)}</span></div>`).join('')}`:''}`;
  }

  const html = `<!DOCTYPE html><html lang="es"><head><meta charset="UTF-8">
  <title>Arqueo — Hotel Takuá</title>
  <style>
    @page { size: 80mm auto; margin: 0mm; }
    @media print { html, body { margin: 0; padding: 0; } }
    body { margin: 0; padding: 0; background: #fff; }
  </style></head><body>
  <div style="font-family:monospace;font-size:14px;width:280px;margin:0 auto;padding:8px;line-height:1.4;color:#000;font-weight:500">
    <div style="text-align:center;font-weight:bold;font-size:18px">🏨 Hotel Takuá</div>
    <div style="text-align:center;font-size:13px">${icono} — Arqueo de Caja</div>
    <div style="text-align:center;font-size:12px;color:#000">⚠️ REIMPRESIÓN</div>
    <div style="border-top:2px solid #000;margin:8px 0"></div>
    ${cuerpo}
    <div style="border-top:2px solid #000;margin:8px 0"></div>
    <div style="text-align:center;font-size:13px;margin-top:6px">— Fin del arqueo —</div>
    <div style="text-align:center;font-size:11px;margin-top:4px">Impreso: ${new Date().toLocaleString('es-AR',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'})}</div>
  </div>
  </body></html>`;

  const frameId = 'caja-arqueo-frame';
  let frame = document.getElementById(frameId);
  if (!frame) {
    frame = document.createElement('iframe');
    frame.id = frameId;
    frame.style.cssText = 'position:fixed;top:-9999px;left:-9999px;width:0;height:0;border:none';
    document.body.appendChild(frame);
  }
  frame.srcdoc = html;
  frame.onload = () => {
    try { frame.contentWindow.focus(); frame.contentWindow.print(); }
    catch(e) { console.error('Error imprimiendo:', e); }
  };
}

// ── TAB HISTORIAL ─────────────────────────────────────
// Estado del filtro del historial
let _histFuente = 'todos'; // 'todos' | 'restaurante' | 'habitaciones'
let _histMovs   = [];      // cache de movimientos

async function renderHistorial(el) {
  el.innerHTML='<div style="text-align:center;padding:24px;color:#94a3b8">Cargando historial...</div>';
  const data = await api('GET', '/caja-global/historial?limit=100');
  _histMovs = data?.movimientos || [];
  renderHistorialFiltrado(el);
}

function renderHistorialFiltrado(el) {
  const movs = _histMovs;

  // Aplicar filtro de fuente
  const filtrados = _histFuente === 'todos' ? movs
    : movs.filter(m => m.fuente === _histFuente);

  el.innerHTML = `
    <div class="section-card">
      <div class="sc-head" style="flex-direction:column;align-items:stretch;gap:12px">
        <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px">
          <span class="card-title">Últimos 30 días (${filtrados.length} de ${movs.length})</span>
          <div style="display:flex;gap:8px">
            <button onclick="imprimirHistorial()"
              style="padding:7px 12px;border-radius:8px;border:1.5px solid #e2e8f0;background:#fff;
              color:#475569;font-family:Nunito,sans-serif;font-size:12px;font-weight:700;cursor:pointer;
              display:flex;align-items:center;gap:5px">🖨️ Imprimir</button>
            <button onclick="descargarHistorialCSV()"
              style="padding:7px 12px;border-radius:8px;border:1.5px solid #e2e8f0;background:#fff;
              color:#475569;font-family:Nunito,sans-serif;font-size:12px;font-weight:700;cursor:pointer;
              display:flex;align-items:center;gap:5px">⬇️ CSV</button>
          </div>
        </div>
        <span style="font-size:12px;color:#94a3b8">Tocá una comanda para ver el detalle</span>
        <!-- Filtros -->
        <div style="display:flex;gap:8px;flex-wrap:wrap">
          <button onclick="setHistFuente('todos', this.closest('.section-card').parentElement)"
            style="flex:1;min-width:80px;padding:8px 12px;border-radius:8px;border:1.5px solid ${_histFuente==='todos'?'transparent':'#e2e8f0'};
            background:${_histFuente==='todos'?'linear-gradient(135deg,#1a2035,#2d3a5c)':'#fff'};
            color:${_histFuente==='todos'?'#fff':'#64748b'};font-family:Nunito,sans-serif;font-size:13px;font-weight:700;cursor:pointer">
            Todos (${movs.length})
          </button>
          <button onclick="setHistFuente('habitaciones', this.closest('.section-card').parentElement)"
            style="flex:1;min-width:80px;padding:8px 12px;border-radius:8px;border:1.5px solid ${_histFuente==='habitaciones'?'transparent':'#e2e8f0'};
            background:${_histFuente==='habitaciones'?'linear-gradient(135deg,#1a2035,#2d3a5c)':'#fff'};
            color:${_histFuente==='habitaciones'?'#fff':'#64748b'};font-family:Nunito,sans-serif;font-size:13px;font-weight:700;cursor:pointer">
            🛏️ Habitaciones (${movs.filter(m=>m.fuente!=='restaurante').length})
          </button>
          <button onclick="setHistFuente('restaurante', this.closest('.section-card').parentElement)"
            style="flex:1;min-width:80px;padding:8px 12px;border-radius:8px;border:1.5px solid ${_histFuente==='restaurante'?'transparent':'#e2e8f0'};
            background:${_histFuente==='restaurante'?'linear-gradient(135deg,#1a2035,#2d3a5c)':'#fff'};
            color:${_histFuente==='restaurante'?'#fff':'#64748b'};font-family:Nunito,sans-serif;font-size:13px;font-weight:700;cursor:pointer">
            🍽️ Restaurante (${movs.filter(m=>m.fuente==='restaurante').length})
          </button>
        </div>
      </div>
      ${filtrados.length ? filtrados.map((m,idx) => {
        const esEgreso = m.tipo==='egreso';
        const esComanda = m.fuente==='restaurante' && m.comanda_id;
        const esEditable = m.origen==='habitacion' || m.origen==='retiro';
        return `<div class="mov-item" id="mov-${idx}"
          ${esComanda ? `onclick="toggleDetalleComanda(${m.comanda_id}, ${idx})"` : ''}
          style="cursor:${esComanda?'pointer':'default'};transition:background .15s">
          <div class="mov-icon ${esEgreso?'egr':'ing'}">${esEgreso?'⬇️':'⬆️'}</div>
          <div class="mov-body">
            <div class="mov-concepto">${m.concepto||'—'} ${esComanda?'<span style="font-size:10px;color:#94a3b8">▼</span>':''}</div>
            <div class="mov-meta">
              ${m.fuente==='restaurante'?'<span class="fuente-rest">Restaurante</span>':'<span class="fuente-hab">Habitaciones</span>'}
              &nbsp;${METODO_ICONS[m.metodo_pago]||''} ${m.metodo_pago||''}
              &nbsp;· ${fmtDate(m.fecha)}
              ${m.usuario?'· '+m.usuario:''}
            </div>
            <div id="detalle-${idx}" style="display:none;margin-top:10px;border-top:1px solid #f1f5f9;padding-top:8px"></div>
          </div>
          <div style="display:flex;flex-direction:column;align-items:flex-end;gap:6px">
            <div class="mov-monto" style="color:${esEgreso?'#dc2626':'#16a34a'}">
              ${esEgreso?'-':'+'} ${fmt(Math.abs(Number(m.monto||0)))}
            </div>
            ${esEditable ? `
            <div style="display:flex;gap:4px">
              <button onclick="event.stopPropagation();modalEditarMovimiento('${m.origen}', ${m.reg_id})"
                title="Editar" style="border:none;background:#f1f5f9;color:#475569;border-radius:6px;
                width:26px;height:26px;font-size:12px;cursor:pointer;display:flex;align-items:center;justify-content:center">✏️</button>
              <button onclick="event.stopPropagation();confirmarEliminarMovimiento('${m.origen}', ${m.reg_id})"
                title="Eliminar" style="border:none;background:#fef2f2;color:#dc2626;border-radius:6px;
                width:26px;height:26px;font-size:12px;cursor:pointer;display:flex;align-items:center;justify-content:center">🗑️</button>
            </div>` : ''}
          </div>
        </div>`;
      }).join('') : '<div style="text-align:center;color:#94a3b8;padding:32px">Sin movimientos para este filtro</div>'}
    </div>`;
}

// ── Editar / eliminar movimiento del historial (solo admin) ──────────
function _buscarMovHist(origen, regId) {
  return _histMovs.find(x => x.origen === origen && Number(x.reg_id) === Number(regId));
}

function modalEditarMovimiento(origen, regId) {
  const m = _buscarMovHist(origen, regId);
  if (!m) { toast('No se encontró el movimiento', false); return; }
  const esHab = m.origen === 'habitacion';
  const METODOS_BASE = ['Efectivo','Transferencia','Tarjeta débito','Tarjeta crédito','QR','Otro'];
  const metodoActual = m.metodo_pago || '';
  const esMixtoActual = /^Pago Mixto/i.test(metodoActual);
  // Si es un pago mixto ya cargado, intentamos recuperar los montos Efectivo/Tarjeta del texto compuesto
  let mixtoEfPre = '', mixtoTgPre = '';
  if (esMixtoActual) {
    const mm = metodoActual.match(/Ef:\s*\$?\s*([\d.,]+)\s*\/\s*Tg:\s*\$?\s*([\d.,]+)/i);
    if (mm) { mixtoEfPre = mm[1].replace(/[.,]/g,''); mixtoTgPre = mm[2].replace(/[.,]/g,''); }
  }
  // Si el valor guardado no es uno de los canónicos ni un mixto, lo agregamos como primera opción
  // para que quede visible y seleccionado — nunca lo pisamos en silencio.
  const metodosOpts = (!metodoActual || esMixtoActual || METODOS_BASE.includes(metodoActual))
    ? METODOS_BASE
    : [metodoActual, ...METODOS_BASE];
  const overlay = document.createElement('div');
  overlay.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:500;display:flex;align-items:center;justify-content:center;padding:16px';
  overlay.innerHTML = `
    <div style="background:#fff;border-radius:18px;padding:24px;width:340px;max-width:100%;box-shadow:0 20px 60px rgba(0,0,0,.3)">
      <div style="font-weight:800;font-size:17px;color:#1a2035;margin-bottom:4px">✏️ Editar movimiento</div>
      <div style="font-size:12px;color:#94a3b8;margin-bottom:16px">${esHab?'Caja habitaciones':'Retiro restaurante'} · Solo admin</div>

      <label style="font-size:11px;font-weight:700;color:#64748b;text-transform:uppercase;letter-spacing:.3px;display:block;margin-bottom:6px">Concepto</label>
      <input type="text" id="em-concepto" value="${(m.concepto||'').replace(/"/g,'&quot;')}"
        style="width:100%;padding:10px 14px;border-radius:10px;border:1.5px solid #e2e8f0;font-size:14px;margin-bottom:12px;box-sizing:border-box"/>

      <label style="font-size:11px;font-weight:700;color:#64748b;text-transform:uppercase;letter-spacing:.3px;display:block;margin-bottom:6px">Monto</label>
      <input type="number" id="em-monto" value="${Number(m.monto||0)}" min="0"
        style="width:100%;padding:10px 14px;border-radius:10px;border:1.5px solid #e2e8f0;font-size:16px;font-weight:700;margin-bottom:12px;box-sizing:border-box"/>

      ${esHab ? `
      <label style="font-size:11px;font-weight:700;color:#64748b;text-transform:uppercase;letter-spacing:.3px;display:block;margin-bottom:6px">Tipo</label>
      <select id="em-tipo" style="width:100%;padding:10px 14px;border-radius:10px;border:1.5px solid #e2e8f0;font-size:14px;margin-bottom:12px">
        <option value="ingreso" ${m.tipo==='ingreso'?'selected':''}>Ingreso</option>
        <option value="egreso" ${m.tipo==='egreso'?'selected':''}>Egreso</option>
      </select>
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:6px">
        <label style="font-size:11px;font-weight:700;color:#64748b;text-transform:uppercase;letter-spacing:.3px;margin:0">Método de pago</label>
        <label style="display:flex;align-items:center;gap:6px;font-size:12px;font-weight:600;color:#64748b;cursor:pointer">
          <input type="checkbox" id="em-mixto" ${esMixtoActual?'checked':''} style="width:15px;height:15px;cursor:pointer;accent-color:#3b82f6">
          Pago Mixto
        </label>
      </div>
      <select id="em-metodo" style="width:100%;padding:10px 14px;border-radius:10px;border:1.5px solid #e2e8f0;font-size:14px;margin-bottom:8px">
        ${metodosOpts.map(op=>
          `<option ${metodoActual===op?'selected':''}>${op.replace(/"/g,'&quot;')}</option>`).join('')}
      </select>
      <div id="em-mixto-wrap" style="display:${esMixtoActual?'block':'none'};margin-bottom:16px;background:#f0f9ff;border-radius:8px;padding:10px;font-size:12px">
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
          <div>
            <label style="font-size:11px">Monto en Efectivo</label>
            <input type="number" id="em-mixto-ef" placeholder="$ 0" value="${mixtoEfPre}"
              style="width:100%;padding:6px 10px;border-radius:8px;border:1.5px solid #e2e8f0;font-size:13px;box-sizing:border-box">
          </div>
          <div>
            <label style="font-size:11px">Monto en Tarjeta/Transf.</label>
            <input type="number" id="em-mixto-tg" placeholder="$ 0" value="${mixtoTgPre}"
              style="width:100%;padding:6px 10px;border-radius:8px;border:1.5px solid #e2e8f0;font-size:13px;box-sizing:border-box">
          </div>
        </div>
      </div>` : '<div style="margin-bottom:4px"></div>'}

      <div style="display:flex;gap:8px;margin-top:4px">
        <button onclick="this.closest('div[style*=fixed]').remove()"
          style="flex:1;padding:11px;border-radius:10px;border:1.5px solid #e2e8f0;background:#f1f5f9;font-weight:700;cursor:pointer;font-family:Nunito,sans-serif;color:#475569">Cancelar</button>
        <button id="em-confirm"
          style="flex:1;padding:11px;border-radius:10px;border:none;background:#1a2035;color:#fff;font-weight:700;cursor:pointer;font-family:Nunito,sans-serif">Guardar</button>
      </div>
    </div>`;
  document.body.appendChild(overlay);
  overlay.querySelector('#em-mixto')?.addEventListener('change', function() {
    overlay.querySelector('#em-mixto-wrap').style.display = this.checked ? 'block' : 'none';
  });
  overlay.querySelector('#em-confirm').addEventListener('click', async () => {
    const concepto = overlay.querySelector('#em-concepto').value.trim();
    const monto = parseFloat(overlay.querySelector('#em-monto').value) || 0;
    if (!concepto) { toast('Ingresá un concepto', false); return; }
    if (!monto)    { toast('Ingresá un monto', false); return; }
    const esMixto = overlay.querySelector('#em-mixto')?.checked;
    const metodoPago = esMixto
      ? `Pago Mixto (Ef: ${fmt(Number(overlay.querySelector('#em-mixto-ef')?.value)||0)} / Tg: ${fmt(Number(overlay.querySelector('#em-mixto-tg')?.value)||0)})`
      : (overlay.querySelector('#em-metodo')?.value || 'Efectivo');
    const body = esHab
      ? { tipo: overlay.querySelector('#em-tipo').value, concepto, monto, metodo_pago: metodoPago }
      : { concepto, monto };
    const endpoint = esHab ? `/caja-global/movimiento-habitacion/${m.reg_id}` : `/caja-global/retiro/${m.reg_id}`;
    const r = await api('PUT', endpoint, body);
    if (r?.ok) { toast('Movimiento actualizado ✓'); overlay.remove(); renderHistorial(document.getElementById('tab-content')); }
    else toast(r?.error||'Error', false);
  });
  overlay.addEventListener('click', e => { if(e.target===overlay) overlay.remove(); });
}

async function confirmarEliminarMovimiento(origen, regId) {
  const m = _buscarMovHist(origen, regId);
  if (!m) { toast('No se encontró el movimiento', false); return; }
  const esHab = m.origen === 'habitacion';
  if (!confirm(`¿Eliminar este movimiento?\n\n${m.concepto||'—'}\n${fmt(Number(m.monto||0))}\n\nEsta acción no se puede deshacer.`)) return;
  const endpoint = esHab ? `/caja-global/movimiento-habitacion/${m.reg_id}` : `/caja-global/retiro/${m.reg_id}`;
  const r = await api('DELETE', endpoint);
  if (r?.ok) { toast('Movimiento eliminado ✓'); renderHistorial(document.getElementById('tab-content')); }
  else toast(r?.error||'Error', false);
}

// Imprimir ticket de una comanda desde el historial
async function imprimirTicketComanda(comandaId) {

  const items   = data.items || [];
  const total   = Number(data.total_final||data.total||0);
  const fecha   = data.cerrada_at ? new Date(data.cerrada_at).toLocaleString('es-AR',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'}) : '—';
  const descuento = Number(data.total||0) - total;

  const html = `<!DOCTYPE html><html lang="es"><head><meta charset="UTF-8">
  <title>Ticket — Hotel Takuá</title>
  <style>
    @page { size: 80mm auto; margin: 0mm; }
    @media print { html, body { margin: 0; padding: 0; } }
    body { font-family: 'Courier New', Courier, monospace; font-size: 13px;
           width: 280px; margin: 0 auto; padding: 8px; line-height: 1.5; color: #000; font-weight: 500; }
  </style></head><body>
  <div style="text-align:center;font-weight:bold;font-size:18px">🏨 Hotel Takuá</div>
  <div style="text-align:center;font-size:13px">Restaurante</div>

  <div style="border-top:2px solid #000;margin:8px 0"></div>
  <div style="display:flex;justify-content:space-between;font-size:12px">
    <span>Mesa ${data.mesa_id||'—'}</span>
    <span>${data.cajero_nombre||''}</span>
  </div>
  <div style="border-top:1px solid #000;margin:6px 0"></div>
  ${items.map(i=>`
    <div style="display:flex;justify-content:space-between;margin-bottom:2px">
      <span>${i.cantidad}x ${i.nombre}</span>
      <span>${fmt(i.total)}</span>
    </div>
    `).join('')}
  <div style="border-top:2px solid #000;margin:8px 0"></div>
  ${descuento>0?`<div style="display:flex;justify-content:space-between;font-size:13px">
    <span>Subtotal</span><span>${fmt(Number(data.total||0))}</span>
  </div>
  <div style="display:flex;justify-content:space-between;font-size:13px">
    <span>Descuento</span><span>- ${fmt(descuento)}</span>
  </div>`:''}
  <div style="display:flex;justify-content:space-between;font-size:16px;font-weight:bold">
    <span>TOTAL</span><span>${fmt(total)}</span>
  </div>
  <div style="display:flex;justify-content:space-between;font-size:12px;margin-top:4px">
    <span>Método</span><span>${data.metodo_pago||'—'}</span>
  </div>
  ${Number(data.vuelto||0)>0?`<div style="display:flex;justify-content:space-between;font-size:12px">
    <span>Vuelto</span><span>${fmt(data.vuelto)}</span>
  </div>`:''}
  <div style="border-top:1px solid #000;margin:8px 0"></div>
  <div style="text-align:center;font-size:11px">¡Gracias por su visita!</div>
  <div style="text-align:center;font-size:10px;margin-top:4px">Hotel Takuá</div>
  </body></html>`;

  const frameId = 'ticket-print-frame';
  let frame = document.getElementById(frameId);
  if (!frame) {
    frame = document.createElement('iframe');
    frame.id = frameId;
    frame.style.cssText = 'position:fixed;top:-9999px;left:-9999px;width:0;height:0;border:none';
    document.body.appendChild(frame);
  }
  frame.srcdoc = html;
  frame.onload = () => {
    try { frame.contentWindow.focus(); frame.contentWindow.print(); }
    catch(e) { console.error('Error:', e); }
  };
}

async function guardarMovimientoManual() {
  const fecha    = document.getElementById('mm-fecha')?.value;
  const concepto = document.getElementById('mm-concepto')?.value.trim();
  const monto    = parseFloat(document.getElementById('mm-monto')?.value||'0');
  const tipo     = document.getElementById('mm-tipo')?.value;
  const metodo   = document.getElementById('mm-metodo')?.value;
  const rubro    = document.getElementById('mm-rubro')?.value;

  if (!fecha)    { toast('Ingresá la fecha', false); return; }
  if (!concepto) { toast('Ingresá el concepto', false); return; }
  if (!monto)    { toast('Ingresá el monto', false); return; }

  const r = await api('POST', '/movimientos-manuales', { fecha, concepto, monto, tipo, metodo_pago: metodo, rubro });
  if (r?.id) {
    toast('Movimiento registrado ✓');
    // Limpiar campos
    document.getElementById('mm-concepto').value = '';
    document.getElementById('mm-monto').value = '';
    // Recargar el período
    buscarPeriodo();
  } else {
    toast(r?.error || 'Error al guardar', false);
  }
}

async function eliminarMovimientoManual(id) {
  if (!confirm('¿Eliminar este movimiento?')) return;
  const r = await api('DELETE', `/movimientos-manuales/${id}`);
  if (r?.ok) { toast('Eliminado'); buscarPeriodo(); }
  else toast(r?.error || 'Error', false);
}

  <span>Total con movimientos manuales</span><span style="color:#7c3aed">${fmt(totalConMan)}</span>
</div>` : ''}

<div class="footer">
  <span>Hotel TK Serrano — Sistema de Gestión Hotel Takuá</span>
  <span>Reporte generado: ${ahora}</span>
</div>
</body></html>`;
}

// ── IMPRIMIR / DESCARGAR HISTORIAL (respeta el filtro activo: todos/hab/rest) ──
function _histFiltradosActuales() {
  return _histFuente === 'todos' ? _histMovs : _histMovs.filter(m => m.fuente === _histFuente);
}
function _histFuenteLabel() {
  return _histFuente === 'restaurante' ? 'Restaurante' : _histFuente === 'habitaciones' ? 'Habitaciones' : 'Todos';
}

function generarHTMLHistorial() {
  const filtrados = _histFiltradosActuales();
  if (!filtrados.length) return null;
  const ingresos = filtrados.filter(m=>m.tipo!=='egreso').reduce((s,m)=>s+Number(m.monto||0),0);
  const egresos  = filtrados.filter(m=>m.tipo==='egreso').reduce((s,m)=>s+Number(m.monto||0),0);
  const neto     = ingresos - egresos;
  const ahora    = new Date().toLocaleString('es-AR',{day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit'});

  const filas = filtrados.map(m => {
    const esEgreso = m.tipo === 'egreso';
    return `<tr>
      <td>${fmtDate(m.fecha)}</td>
      <td>${m.fuente==='restaurante'?'🍽️ Restaurante':'🛏️ Habitaciones'}</td>
      <td>${(m.concepto||'—').replace(/</g,'&lt;')}</td>
      <td>${METODO_ICONS[m.metodo_pago]||''} ${m.metodo_pago||''}</td>
      <td>${m.usuario||'—'}</td>
      <td style="text-align:right" class="${esEgreso?'neg':''}">${esEgreso?'-':'+'} ${fmt(Math.abs(Number(m.monto||0)))}</td>
    </tr>`;
  }).join('');

  return `<!DOCTYPE html><html lang="es"><head><meta charset="UTF-8">
<style>
  @page{size:A4;margin:15mm 12mm}
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Segoe UI',Arial,sans-serif;font-size:12px;color:#111;background:#fff}
  .header{background:#1a2035;color:#fff;padding:16px 20px;border-radius:8px;margin-bottom:16px}
  .header h1{font-size:20px;font-weight:800}
  .header p{font-size:11px;opacity:.7;margin-top:3px}
  .badge-total{background:#7c3aed;color:#fff;border-radius:8px;padding:12px 16px;
    display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;gap:16px}
  .badge-total .lbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;opacity:.8}
  .badge-total .val{font-size:22px;font-weight:900}
  table.movs{width:100%;border-collapse:collapse;font-size:10.5px;margin-top:6px}
  table.movs th{background:#f8fafc;padding:6px 7px;text-align:left;font-weight:700;border-bottom:2px solid #e5e7eb}
  table.movs td{padding:5px 7px;border-bottom:1px solid #f1f5f9}
  .neg{color:#dc2626}
  .footer{margin-top:20px;padding-top:10px;border-top:1px solid #e5e7eb;font-size:10px;color:#9ca3af;
    display:flex;justify-content:space-between}
  ${BRAND_HEADER_CSS}
  @media print{.no-print{display:none}}
</style></head><body>

${brandHeaderHTML(`Historial de Caja &nbsp;·&nbsp; Filtro: ${_histFuenteLabel()} &nbsp;·&nbsp; ${filtrados.length} movimientos &nbsp;·&nbsp; Generado: ${ahora}`)}

<div class="badge-total">
  <div><div class="lbl">Ingresos</div><div class="val">${fmt(ingresos)}</div></div>
  <div><div class="lbl">Egresos</div><div class="val">${fmt(egresos)}</div></div>
  <div><div class="lbl">Neto</div><div class="val">${fmt(neto)}</div></div>
</div>

<table class="movs">
  <thead><tr><th>Fecha</th><th>Fuente</th><th>Concepto</th><th>Método</th><th>Usuario</th><th style="text-align:right">Monto</th></tr></thead>
  <tbody>${filas}</tbody>
</table>

<div class="footer">
  <span>Hotel TK Serrano — Sistema de Gestión Hotel Takuá</span>
  <span>Historial generado: ${ahora}</span>
</div>
</body></html>`;
}

function imprimirHistorial() {
  const html = generarHTMLHistorial();
  if (!html) { toast('No hay movimientos para imprimir', false); return; }
  const id = 'historial-print-frame';
  let frame = document.getElementById(id);
  if (!frame) {
    frame = document.createElement('iframe');
    frame.id = id;
    frame.style.cssText = 'position:fixed;top:-9999px;left:-9999px;width:0;height:0;border:none';
    document.body.appendChild(frame);
  }
  frame.srcdoc = html;
  frame.onload = () => { esperarFuentesYImprimir(frame); };
}

function descargarHistorialCSV() {
  const filtrados = _histFiltradosActuales();
  if (!filtrados.length) { toast('No hay movimientos para descargar', false); return; }
  const esc = (v) => `"${String(v??'').replace(/"/g,'""')}"`;
  const header = ['Fecha','Fuente','Concepto','Método de pago','Usuario','Tipo','Monto'];
  const filas = filtrados.map(m => [
    fmtDate(m.fecha),
    m.fuente==='restaurante' ? 'Restaurante' : 'Habitaciones',
    m.concepto||'',
    m.metodo_pago||'',
    m.usuario||'',
    m.tipo==='egreso' ? 'Egreso' : 'Ingreso',
    (m.tipo==='egreso'?-1:1) * Number(m.monto||0)
  ].map(esc).join(','));
  const csv = '\uFEFF' + [header.map(esc).join(','), ...filas].join('\r\n');
  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  const fecha = new Date().toISOString().split('T')[0];
  a.href = url;
  a.download = `historial-caja_${_histFuente}_${fecha}.csv`;
  document.body.appendChild(a);
  a.click();
  a.remove();
  URL.revokeObjectURL(url);
}

function imprimirReporte(tipo, desde, hasta) {
  const html = generarHTMLReporte(tipo, desde, hasta);
  if (!html) { toast('No hay datos para imprimir', false); return; }
  const id = 'reporte-frame';
  let frame = document.getElementById(id);
  if (!frame) {
    frame = document.createElement('iframe');
    frame.id = id;
    frame.style.cssText = 'position:fixed;top:-9999px;left:-9999px;width:0;height:0;border:none';
    document.body.appendChild(frame);
  }
  frame.srcdoc = html;
  frame.onload = () => { esperarFuentesYImprimir(frame); };
}

// Espera a que carguen las fuentes de Google Fonts (Montserrat/Dancing Script) antes
// de disparar la impresión — si se imprime antes de tiempo, el navegador usa la
// tipografía de reemplazo y "Serrano" sale en sans-serif en vez de manuscrita.
function esperarFuentesYImprimir(frameOrWin, isWindow=false) {
  try {
    const win = isWindow ? frameOrWin : frameOrWin.contentWindow;
    const doc = win.document;
    const disparar = () => { try { win.focus(); win.print(); } catch(e) {} };
    if (doc.fonts && doc.fonts.ready) {
      doc.fonts.ready.then(disparar).catch(disparar);
      // Red de seguridad por si "ready" nunca resuelve
      setTimeout(disparar, 1200);
    } else {
      setTimeout(disparar, 400);
    }
  } catch(e) {}
}

function exportarPDFReporte(tipo, desde, hasta) {
  const html = generarHTMLReporte(tipo, desde, hasta);
  if (!html) { toast('No hay datos para exportar', false); return; }
  // Abrir en nueva ventana para imprimir como PDF
  const win = window.open('', '_blank');
  if (!win) { toast('Permitir popups para exportar PDF', false); return; }
  win.document.write(html);
  win.document.close();
  win.onload = () => {
    esperarFuentesYImprimir(win, true);
    // El usuario elige "Guardar como PDF" en el diálogo de impresión
  };
}

// ── INIT ──────────────────────────────────────────────
render();
</script>
