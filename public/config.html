<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover">
<title>Configuración — Hotel Takuá</title>
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#00c9b1">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --sidebar:#1a2035;--sw:72px;--accent:#00c9b1;--accent2:#0094ff;
  --ink:#1a2035;--muted:#64748b;--faint:#94a3b8;--line:#e8edf3;--bg:#f0f4f8;
  --ok:#16a34a;--warn:#d97706;--danger:#dc2626;
}
body{font-family:'Nunito',sans-serif;background:var(--bg);color:var(--ink);font-size:14px;overflow-x:hidden}
.main{margin-left:var(--sw);display:flex;flex-direction:column;min-height:100vh}

/* ── Topbar ───────────────────────────────────────────────── */
.topbar{background:#fff;padding:12px 22px;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--line);position:sticky;top:0;z-index:100}
.hamburger{display:none;align-items:center;justify-content:center;width:36px;height:36px;border-radius:8px;border:1.5px solid #e2e8f0;background:#f8fafc;font-size:18px;cursor:pointer;flex-shrink:0}
.tb-left{flex:1;min-width:0}
.tb-left h2{font-size:16px;font-weight:800;color:var(--ink);margin:0;display:flex;align-items:center;gap:8px}
.tb-left p{font-size:11px;color:var(--faint);margin-top:1px}
.tb-right{display:flex;align-items:center;gap:8px;flex-shrink:0}
.user-av{width:36px;height:36px;border-radius:50%;background:var(--accent);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:14px;flex-shrink:0}
.btn-salir{background:none;border:1.5px solid #e2e8f0;border-radius:8px;padding:6px 14px;font-size:13px;font-weight:700;color:var(--danger);cursor:pointer;font-family:inherit}
.btn-primary{background:linear-gradient(135deg,var(--accent),var(--accent2));border:none;border-radius:10px;padding:9px 16px;color:#fff;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;display:inline-flex;align-items:center;gap:6px}
.btn-primary:hover{filter:brightness(1.05)}

.content{padding:20px 24px;max-width:980px}

/* ── Section tabs (mismo lenguaje visual que reservas.html) ── */
.cfg-tabs{display:inline-flex;gap:2px;margin-bottom:18px;background:#eef1f5;border-radius:12px;padding:4px;flex-wrap:wrap}
.cfg-tab{padding:9px 18px;border-radius:9px;border:1.5px solid transparent;background:rgba(255,255,255,.55);font-family:inherit;font-weight:700;font-size:13px;color:var(--muted);cursor:pointer;display:flex;align-items:center;gap:7px;transition:all .15s}
.cfg-tab:hover{color:var(--ink);background:rgba(255,255,255,.9);border-color:#e2e8f0}
.cfg-tab.activo{background:#fff;color:var(--ink);border-color:#fff;box-shadow:0 1px 4px rgba(0,0,0,.1)}
.cfg-pane{display:none}
.cfg-pane.activo{display:block;animation:fadein .15s ease}
@keyframes fadein{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}

/* ── Cards & KPIs ─────────────────────────────────────────── */
.section-card{background:#fff;border-radius:16px;padding:20px;margin-bottom:16px;box-shadow:0 2px 8px rgba(0,0,0,.06)}
.sc-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;gap:10px;flex-wrap:wrap}
.sc-head h2{font-size:16px;font-weight:800;color:var(--ink);display:flex;align-items:center;gap:8px}
.sc-sub{font-size:12px;color:var(--faint);margin-top:2px}

.stat-cards{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:16px}
.stat-card{background:#fff;border-radius:14px;padding:14px 16px;box-shadow:0 2px 8px rgba(0,0,0,.06)}
.stat-card .lbl{font-size:11px;font-weight:700;color:var(--faint);text-transform:uppercase;letter-spacing:.03em;margin-bottom:6px}
.stat-card .val{font-size:22px;font-weight:800;color:var(--ink)}
.stat-card.accent .val{color:var(--accent2)}

/* ── Tabla usuarios ───────────────────────────────────────── */
.data-table{width:100%;border-collapse:collapse;font-size:13px}
.data-table th{text-align:left;padding:8px 12px;color:var(--faint);font-size:11px;font-weight:700;text-transform:uppercase;border-bottom:1.5px solid #f1f5f9}
.data-table td{padding:10px 12px;border-bottom:1px solid #f8fafc;vertical-align:middle}
.data-table tr:last-child td{border-bottom:none}
.data-table tr:hover td{background:#fafcff}
.cell-sub{color:var(--muted);font-size:12px}
.cell-faint{color:var(--faint);font-size:12px}

.pill{display:inline-flex;align-items:center;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700;white-space:nowrap}
.pb{background:#dbeafe;color:#1d4ed8}
.pg{background:#dcfce7;color:#166534}
.py{background:#fef9c3;color:#a16207}
.pr{background:#fee2e2;color:#b91c1c}
.pp{background:#ede9fe;color:#6d28d9}
.po{background:#ffedd5;color:#c2410c}
.pgr{background:#f3f4f6;color:#374151}

.row-actions{white-space:nowrap;display:flex;gap:6px}
.icon-btn{border-radius:7px;padding:5px 11px;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;border:1px solid transparent}
.icon-btn.edit{background:#f0f9ff;border-color:#bae6fd;color:#0369a1}
.icon-btn.edit:hover{background:#e0f2fe}
.icon-btn.del{background:#fff1f2;border-color:#fecdd3;color:#be123c}
.icon-btn.del:hover{background:#ffe4e6}

/* ── Formularios ──────────────────────────────────────────── */
label{display:block;font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.04em;margin-bottom:5px}
input,select,textarea{width:100%;padding:10px 14px;border:1.5px solid #e2e8f0;border-radius:10px;font-size:14px;font-family:inherit;color:var(--ink);outline:none;transition:border-color .15s;background:#fff}
input:focus,select:focus,textarea:focus{border-color:var(--accent)}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
.form-col{display:flex;flex-direction:column}
.confirm-btn{width:100%;padding:13px;border-radius:12px;border:none;background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;font-size:15px;font-weight:800;cursor:pointer;font-family:inherit;margin-top:16px}
.confirm-btn:disabled{opacity:.6;cursor:default}

/* ── Tarifas generales (Noche/Día/Hora — usadas en check-in) ─ */
.tarifas-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:6px}
.tarifa-card{background:#f8fafc;border-radius:10px;padding:14px;border:1.5px solid #e2e8f0}
.tarifa-card .lbl{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;margin-bottom:8px}
.tarifa-card .amount{display:flex;align-items:center;gap:6px}
.tarifa-card .amount span{font-size:14px;color:var(--faint)}
.tarifa-card input{padding:8px;border-radius:8px;font-size:15px;font-weight:700}

/* ── Tarifas: layout de dos columnas ─────────────────────── */
.tarifas-layout{display:grid;grid-template-columns:1fr 1fr;gap:16px;align-items:start}
.info-box{background:#f0f9ff;border:1.5px solid #bae6fd;border-radius:10px;padding:12px 16px;margin-bottom:16px;font-size:13px;color:#0369a1;line-height:1.7}
.list-hint{font-size:11.5px;color:var(--faint);margin:-6px 0 12px}
.list-count{font-size:12px;font-weight:700;color:var(--muted)}

/* Filas reordenables (tipos de habitación / plataformas) */
.reorder-row{display:flex;align-items:center;gap:10px;background:#f8fafc;border:1.5px solid #eef1f5;border-radius:12px;padding:10px 12px;margin-bottom:8px}
.reorder-arrows{display:flex;flex-direction:column;gap:1px}
.reorder-arrows button{width:20px;height:16px;border:none;background:none;color:var(--faint);cursor:pointer;font-size:10px;line-height:1;display:flex;align-items:center;justify-content:center;border-radius:4px}
.reorder-arrows button:hover{background:#e2e8f0;color:var(--ink)}
.reorder-arrows button:disabled{opacity:.3;cursor:default}
.reorder-arrows button:disabled:hover{background:none}

.tipo-info{flex:1;min-width:0;display:flex;align-items:center;justify-content:space-between;gap:10px}
.tipo-info .nombre{font-weight:800;font-size:13.5px;color:var(--ink)}
.tipo-info .precio{font-weight:800;font-size:13.5px;color:var(--accent2);white-space:nowrap}

.plat-avatar{width:34px;height:34px;border-radius:10px;flex-shrink:0;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;font-size:14px;overflow:hidden}
.plat-avatar img{width:100%;height:100%;object-fit:cover}
.plat-info{flex:1;min-width:0}
.plat-info .nombre{font-weight:800;font-size:13.5px;color:var(--ink);display:block}
.plat-info .comision{font-size:11.5px;color:var(--faint)}

/* Formulario "Nueva plataforma" */
.plat-form-row{margin-bottom:14px}
.plat-color-logo{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px}
.color-swatch-wrap input[type=color]{-webkit-appearance:none;appearance:none;width:100%;height:41px;border:1.5px solid #e2e8f0;border-radius:10px;padding:3px;cursor:pointer;background:#fff}
.color-swatch-wrap input[type=color]::-webkit-color-swatch-wrapper{padding:0}
.color-swatch-wrap input[type=color]::-webkit-color-swatch{border:none;border-radius:7px}
.logo-upload-row{display:flex;align-items:center;gap:10px}
.logo-preview{width:41px;height:41px;border-radius:10px;border:1.5px dashed #cbd5e1;display:flex;align-items:center;justify-content:center;flex-shrink:0;overflow:hidden;color:#fff;font-weight:800;font-size:14px}
.logo-preview img{width:100%;height:100%;object-fit:cover}
.btn-upload{border:1.5px solid #e2e8f0;background:#f8fafc;border-radius:9px;padding:9px 12px;font-size:12.5px;font-weight:700;color:var(--muted);cursor:pointer;font-family:inherit;display:flex;align-items:center;gap:6px;white-space:nowrap}
.btn-upload:hover{background:#f1f5f9;color:var(--ink)}
.upload-hint{font-size:10.5px;color:var(--faint);margin-top:4px}
.comision-row{display:flex;align-items:center;gap:6px}
.comision-row input{max-width:100px}
.comision-row span{font-size:14px;color:var(--faint);font-weight:700}

/* ── Notificaciones broadcast ─────────────────────────────── */
.notif-card{border:1.5px solid #fcd34d;background:#fffbeb}
.notif-card .sc-head h2{color:#92400e}
.notif-card p.hint{font-size:12px;color:#78350f;margin-bottom:14px;line-height:1.5}
.notif-card textarea{resize:vertical;border-color:#fcd34d;background:#fffbeb}
.notif-card select{border-color:#fcd34d;background:#fffbeb}
.btn-broadcast{background:var(--warn);color:#fff;border:none;border-radius:12px;padding:12px 24px;font-size:14px;font-weight:800;font-family:inherit;cursor:pointer;display:inline-flex;align-items:center;gap:8px}
.btn-broadcast:hover{filter:brightness(1.05)}
.btn-broadcast:disabled{opacity:.65;cursor:default}

/* ── Info del sistema ─────────────────────────────────────── */
.info-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;font-size:13px}
.info-grid div span{color:var(--faint)}

/* ── Modal ────────────────────────────────────────────────── */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:300;display:flex;align-items:center;justify-content:center;padding:16px}
.overlay.hidden{display:none}
.modal{background:#fff;border-radius:18px;padding:22px;width:100%;max-width:520px;max-height:90vh;overflow-y:auto;box-shadow:0 8px 40px rgba(0,0,0,.18)}
.modal-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px}
.modal-hd h3{font-size:17px;font-weight:800;color:var(--ink)}
.modal-close{background:none;border:none;font-size:20px;cursor:pointer;color:var(--faint);line-height:1;padding:4px}

/* ── Toast ────────────────────────────────────────────────── */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--ink);color:#fff;padding:12px 22px;border-radius:12px;font-size:14px;font-weight:700;z-index:9999;opacity:0;transition:all .3s;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.toast.err{background:var(--danger)}

.empty-state{text-align:center;padding:60px;color:var(--faint)}

@media(max-width:700px){
  .main{margin-left:0}
  .hamburger{display:flex}
  .form-row{grid-template-columns:1fr}
  .stat-cards{grid-template-columns:1fr 1fr}
  .tarifas-grid{grid-template-columns:1fr}
  .tarifas-layout{grid-template-columns:1fr}
  .plat-color-logo{grid-template-columns:1fr}
  .info-grid{grid-template-columns:1fr}
  .cfg-tabs{overflow-x:auto;max-width:100%}
  .content{padding:16px}
}
</style>
</head>
<body>
<div id="sidebar-container"></div>
<div class="main">
  <div class="topbar">
    <button class="hamburger" id="hamburger">☰</button>
    <div class="tb-left">
      <h2>⚙️ Configuración</h2>
      <p id="tb-sub">Solo administradores</p>
    </div>
    <div class="tb-right">
      <div class="user-av" id="user-av">?</div>
      <button class="btn-salir" id="btn-salir">Salir</button>
    </div>
  </div>
  <div class="content" id="content">
    <div class="empty-state">Cargando...</div>
  </div>
</div>

<!-- Modal genérico -->
<div class="overlay hidden" id="modal-overlay">
  <div class="modal" id="modal-box"></div>
</div>
<div class="toast" id="toast"></div>

<script src="/sidebar.js"></script>
<script>
const TOKEN_KEY = 'takua_token';
let currentUser = null;

// ── Auth ──────────────────────────────────────────────────────────────
function init() {
  const token = localStorage.getItem(TOKEN_KEY);
  currentUser = JSON.parse(localStorage.getItem('takua_user') || 'null');
  if (!token || !currentUser) { location.href = '/portal.html'; return; }
  if (currentUser.rol !== 'admin') { location.href = '/index.html'; return; }
  document.getElementById('user-av').textContent = (currentUser.nombre?.[0] || 'A').toUpperCase();
  document.getElementById('tb-sub').textContent = currentUser.nombre + ' · ' + currentUser.rol;
  renderConfig();
}

async function apiFetch(method, path, body) {
  const token = localStorage.getItem(TOKEN_KEY);
  const opts = { method, headers: { 'Content-Type':'application/json', Authorization:'Bearer '+token } };
  if (body) opts.body = JSON.stringify(body);
  try {
    const r = await fetch('/api' + path, opts);
    return await r.json();
  } catch(e) { return null; }
}

function toast(msg, ok=true) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'toast show' + (ok ? '' : ' err');
  setTimeout(() => el.className = 'toast', 2800);
}

function openModal(html) {
  document.getElementById('modal-box').innerHTML = html;
  document.getElementById('modal-overlay').classList.remove('hidden');
}
function closeModal() {
  document.getElementById('modal-overlay').classList.add('hidden');
}
document.getElementById('modal-overlay').addEventListener('click', e => {
  if (e.target === document.getElementById('modal-overlay')) closeModal();
});

document.getElementById('btn-salir').addEventListener('click', () => {
  localStorage.removeItem(TOKEN_KEY);
  location.href = '/portal.html';
});

document.getElementById('hamburger').addEventListener('click', () => {
  document.getElementById('sidebar-container').classList.toggle('open');
});

// ── Tabs de configuración ────────────────────────────────────────────
const CFG_TABS = [
  { id:'usuarios',      label:'Usuarios',      icon:'👤' },
  { id:'tarifas',       label:'Tarifas',       icon:'💰' },
  { id:'notificaciones',label:'Notificaciones',icon:'📢' },
  { id:'sistema',       label:'Sistema',       icon:'🏨' },
];
let cfgTabActiva = 'usuarios';

function cambiarCfgTab(id) {
  cfgTabActiva = id;
  document.querySelectorAll('.cfg-tab').forEach(b => b.classList.toggle('activo', b.dataset.tab === id));
  document.querySelectorAll('.cfg-pane').forEach(p => p.classList.toggle('activo', p.id === 'pane-' + id));
}

const ROL_COLOR = { admin:'pb', recepcionista:'pg', mucama:'py', mantenimiento:'pgr', mozo:'pp', cajero:'po' };
const ROL_LABEL = { admin:'Admin', recepcionista:'Recepción', mucama:'Mucama', mantenimiento:'Mantenimiento', mozo:'Mozo', cajero:'Cajero' };
let TIPOS = [];
let PLATAFORMAS = [];

function renderTiposRows(tipos) {
  if (!tipos.length) return `<p class="empty-state" style="padding:24px 0">No hay tipos cargados</p>`;
  return tipos.map((t,i) => `
    <div class="reorder-row">
      <div class="reorder-arrows">
        <button onclick="moverTipo(${t.id},'up')" ${i===0?'disabled':''}>▲</button>
        <button onclick="moverTipo(${t.id},'down')" ${i===tipos.length-1?'disabled':''}>▼</button>
      </div>
      <div class="tipo-info">
        <span class="nombre">${t.nombre}</span>
        <span class="precio">$${Number(t.tarifa_base).toLocaleString('es-AR')}</span>
      </div>
      <div class="row-actions">
        <button class="icon-btn edit" onclick="abrirModalTipo(${t.id})">✏️</button>
        <button class="icon-btn del" onclick="eliminarTipo(${t.id},'${t.nombre.replace(/'/g,"\\'")}')">🗑️</button>
      </div>
    </div>`).join('');
}

function renderPlataformasRows(plats) {
  if (!plats.length) return `<p class="empty-state" style="padding:24px 0">No hay plataformas cargadas</p>`;
  return plats.map((p,i) => `
    <div class="reorder-row">
      <div class="reorder-arrows">
        <button onclick="moverPlataforma(${p.id},'up')" ${i===0?'disabled':''}>▲</button>
        <button onclick="moverPlataforma(${p.id},'down')" ${i===plats.length-1?'disabled':''}>▼</button>
      </div>
      <div class="plat-avatar" style="background:${p.color}">${p.logo_url ? `<img src="${p.logo_url}" alt="${p.nombre}">` : (p.nombre[0]||'?').toUpperCase()}</div>
      <div class="plat-info">
        <span class="nombre">${p.nombre}</span>
        <span class="comision">Comisión: ${Number(p.comision_pct)}%</span>
      </div>
      <div class="row-actions">
        <button class="icon-btn edit" onclick="abrirModalPlataforma(${p.id})">✏️</button>
        <button class="icon-btn del" onclick="eliminarPlataforma(${p.id},'${p.nombre.replace(/'/g,"\\'")}')">🗑️</button>
      </div>
    </div>`).join('');
}

// ── RENDER CONFIG ─────────────────────────────────────────────────────
async function renderConfig() {
  let usuarios = await apiFetch('GET', '/portal/usuarios');
  if (!usuarios) usuarios = await apiFetch('GET', '/usuarios') || [];

  const totalUsuarios  = usuarios.length;
  const activos        = usuarios.filter(u => u.activo).length;
  const inactivos      = totalUsuarios - activos;
  const admins         = usuarios.filter(u => u.rol === 'admin').length;

  const rows = usuarios.map(u => `<tr>
    <td><strong>${u.nombre}</strong></td>
    <td class="cell-sub">${u.usuario || '—'}</td>
    <td class="cell-faint">${u.email || '—'}</td>
    <td><span class="pill ${ROL_COLOR[u.rol] || 'pgr'}">${ROL_LABEL[u.rol] || u.rol}</span></td>
    <td><span class="pill ${u.activo ? 'pg' : 'pr'}">${u.activo ? 'Activo' : 'Inactivo'}</span></td>
    <td>
      <div class="row-actions">
        <button class="icon-btn edit" onclick="editarUsuario(${u.id})">✏️ Editar</button>
        <button class="icon-btn del" onclick="eliminarUsuario(${u.id},'${u.nombre.replace(/'/g,"\\'")}')">🗑️</button>
      </div>
    </td>
  </tr>`).join('');

  // Tarifas
  const tarifas = await apiFetch('GET', '/config/tarifas') || {};
  const tfNoche = tarifas.precio_noche || 50000;
  const tfHora  = tarifas.precio_hora  || 20000;
  const tfDia   = tarifas.precio_dia   || 75000;

  TIPOS = await apiFetch('GET', '/config/tipos-habitacion') || [];
  PLATAFORMAS = await apiFetch('GET', '/config/plataformas') || [];

  document.getElementById('content').innerHTML = `
    <div class="cfg-tabs" id="cfg-tabs">
      ${CFG_TABS.map(t => `<button class="cfg-tab${t.id===cfgTabActiva?' activo':''}" data-tab="${t.id}" onclick="cambiarCfgTab('${t.id}')">${t.icon} ${t.label}</button>`).join('')}
    </div>

    <!-- ═══ USUARIOS ═══ -->
    <div class="cfg-pane${cfgTabActiva==='usuarios'?' activo':''}" id="pane-usuarios">
      <div class="stat-cards">
        <div class="stat-card"><div class="lbl">Total usuarios</div><div class="val">${totalUsuarios}</div></div>
        <div class="stat-card accent"><div class="lbl">Activos</div><div class="val">${activos}</div></div>
        <div class="stat-card"><div class="lbl">Inactivos</div><div class="val">${inactivos}</div></div>
        <div class="stat-card"><div class="lbl">Administradores</div><div class="val">${admins}</div></div>
      </div>
      <div class="section-card">
        <div class="sc-head">
          <h2>👤 Usuarios del sistema</h2>
          <button class="btn-primary" id="btn-nuser">+ Nuevo usuario</button>
        </div>
        <table class="data-table">
          <thead><tr><th>Nombre</th><th>Usuario</th><th>Email</th><th>Rol</th><th>Estado</th><th>Acciones</th></tr></thead>

async function guardarClave(habId, inputId) {
  const input = document.getElementById(inputId);
  if (!input) return;
  const password = input.value.trim();
  if (!password) { toast('Ingresá una clave', false); input.focus(); return; }
  const r = await apiFetch('PUT', `/habitaciones/${habId}/password`, { password });
  if (r?.ok) {
    toast(`Clave guardada ✓`);
    input.style.borderColor = '#00c9b1';
    setTimeout(() => input.style.borderColor = '#e2e8f0', 2000);
  } else toast(r?.error || 'Error al guardar', false);
}

const ROL_OPTS = ['admin','recepcionista','mucama','mantenimiento','cajero','mozo']
  .map(r => `<option value="${r}">${ROL_LABEL[r]}</option>`).join('');

function abrirModalUsuario(u) {
  const esEdicion = !!u;
  openModal(`
    <div class="modal-hd">
      <h3>${esEdicion ? '✏️ Editar usuario' : '➕ Nuevo usuario'}</h3>
      <button class="modal-close" id="mu-c">✕</button>
    </div>
    <div class="form-row">
      <div class="form-col"><label>Nombre completo</label>
        <input type="text" id="mu-nom" value="${u?.nombre||''}" placeholder="María García"></div>
      <div class="form-col"><label>Usuario</label>
        <input type="text" id="mu-usuario" value="${u?.usuario||''}" placeholder="maria.garcia"></div>
    </div>
    <div class="form-row">
      <div class="form-col"><label>Email (opcional)</label>
        <input type="email" id="mu-email" value="${u?.email||''}" placeholder="maria@hotel.com"></div>
      <div class="form-col"><label>${esEdicion ? 'Nueva contraseña (dejar vacío para no cambiar)' : 'Contraseña'}</label>
        <input type="password" id="mu-pass" placeholder="${esEdicion ? 'Nueva contraseña...' : 'min. 6 caracteres'}" autocapitalize="none" autocorrect="off" autocomplete="new-password"></div>
    </div>
    <div class="form-row">
      <div class="form-col"><label>Rol</label>
        <select id="mu-rol">${ROL_OPTS}</select>
      </div>
      ${esEdicion ? `<div class="form-col"><label>Estado</label>
        <select id="mu-activo">
          <option value="1" ${u.activo?'selected':''}>Activo</option>
          <option value="0" ${!u.activo?'selected':''}>Inactivo</option>
        </select></div>` : ''}
    </div>
    <button class="confirm-btn" id="mu-ok">${esEdicion ? '💾 Guardar cambios' : '✅ Crear usuario'}</button>
  `);

  if (u?.rol) setTimeout(() => {
    const sel = document.getElementById('mu-rol');
    if (sel) sel.value = u.rol;
  }, 0);

  document.getElementById('mu-c').addEventListener('click', closeModal);
  document.getElementById('mu-ok').addEventListener('click', async () => {
    const nombre   = document.getElementById('mu-nom').value.trim();
    const usuario  = document.getElementById('mu-usuario').value.trim();
    const email    = document.getElementById('mu-email').value.trim();
    const password = document.getElementById('mu-pass').value;
    const rol      = document.getElementById('mu-rol').value;
    const activo   = document.getElementById('mu-activo')?.value ?? '1';

    if (!nombre || !usuario) { toast('Completá nombre y usuario', false); return; }
    if (!esEdicion && !password) { toast('La contraseña es obligatoria', false); return; }

    let r;
    if (esEdicion) {
      const body = { nombre, usuario, email: email||null, rol, activo: Number(activo) };
      if (password) body.password = password;
      r = await apiFetch('PUT', `/portal/usuarios/${u.id}`, body);
      if (r?.ok) { toast('Usuario actualizado ✓'); closeModal(); renderConfig(); }
      else toast(r?.error || 'Error al actualizar', false);
    } else {
      r = await apiFetch('POST', '/portal/usuarios', { nombre, usuario, email: email||null, password, rol });
      if (r?.id) { toast('Usuario creado ✓'); closeModal(); renderConfig(); }
      else toast(r?.error || 'Error al crear', false);
    }
  });
}

async function editarUsuario(id) {
  const usuarios = await apiFetch('GET', '/portal/usuarios') || [];
  const u = usuarios.find(x => x.id === id);
  if (!u) return;
  abrirModalUsuario(u);
}

async function eliminarUsuario(id, nombre) {
  if (!confirm(`¿Eliminar al usuario "${nombre}"? Esta acción no se puede deshacer.`)) return;
  const r = await apiFetch('DELETE', `/portal/usuarios/${id}`);

  else toast(r?.error || 'Error al eliminar', false);
}

async function moverTipo(id, dir) {
  const idx = TIPOS.findIndex(t => t.id === id);
  if (idx === -1) return;
  const swapIdx = dir === 'up' ? idx - 1 : idx + 1;
  if (swapIdx < 0 || swapIdx >= TIPOS.length) return;
  [TIPOS[idx], TIPOS[swapIdx]] = [TIPOS[swapIdx], TIPOS[idx]];
  document.getElementById('tipos-list').innerHTML = renderTiposRows(TIPOS);
  await apiFetch('POST', '/config/tipos-habitacion/reordenar', { ids: TIPOS.map(t => t.id) });
}

async function eliminarPlataforma(id, nombre) {
  if (!confirm(`¿Eliminar la plataforma "${nombre}"? Esta acción no se puede deshacer.`)) return;
  const r = await apiFetch('DELETE', `/config/plataformas/${id}`);
  if (r?.ok) { toast('Plataforma eliminada'); renderConfig(); }
  else toast(r?.error || 'Error al eliminar', false);
}

async function moverPlataforma(id, dir) {
  const idx = PLATAFORMAS.findIndex(p => p.id === id);
  if (idx === -1) return;
  const swapIdx = dir === 'up' ? idx - 1 : idx + 1;
  if (swapIdx < 0 || swapIdx >= PLATAFORMAS.length) return;
  [PLATAFORMAS[idx], PLATAFORMAS[swapIdx]] = [PLATAFORMAS[swapIdx], PLATAFORMAS[idx]];
  document.getElementById('plataformas-list').innerHTML = renderPlataformasRows(PLATAFORMAS);
  await apiFetch('POST', '/config/plataformas/reordenar', { ids: PLATAFORMAS.map(p => p.id) });
}

init();
</script>
