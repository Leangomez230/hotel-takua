<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Hotel Takua — Acceso</title>
<style>
  :root {
    --bg:      #0a0f1e;
    --surface: #111827;
    --border:  #1f2937;
    --text:    #f9fafb;
    --muted:   #6b7280;
    --accent:  #14b8a6;
    --accent2: #0891b2;
    --red:     #ef4444;
    --radius:  16px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Segoe UI', system-ui, sans-serif;
    background: var(--bg);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
    position: relative;
    overflow: hidden;
  }

  /* fondo decorativo */
  body::before {
    content: '';
    position: fixed;
    top: -200px; left: -200px;
    width: 600px; height: 600px;
    background: radial-gradient(circle, #14b8a620 0%, transparent 70%);
    pointer-events: none;
  }
  body::after {
    content: '';
    position: fixed;
    bottom: -200px; right: -200px;
    width: 500px; height: 500px;
    background: radial-gradient(circle, #0891b215 0%, transparent 70%);
    pointer-events: none;
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 24px;
    padding: 48px 40px;
    width: 100%;
    max-width: 400px;
    box-shadow: 0 24px 64px rgba(0,0,0,.5);
    position: relative;
    z-index: 1;
  }

  .logo {
    text-align: center;
    margin-bottom: 40px;
  }
  .logo-icon {
    width: 64px; height: 64px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border-radius: 18px;
    display: flex; align-items: center; justify-content: center;
    font-size: 28px;
    margin: 0 auto 16px;
    box-shadow: 0 8px 24px #14b8a630;
  }
  .logo-hotel {
    font-size: 11px;
    letter-spacing: .2em;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 4px;
  }
  .logo-name {
    font-size: 24px;
    font-weight: 700;
    color: var(--text);
    letter-spacing: -.02em;
  }
  .logo-sub {
    font-size: 12px;
    color: var(--accent);
    margin-top: 4px;
  }

  .form-group { margin-bottom: 18px; }
  label {
    display: block;
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: .08em;
    color: var(--muted);
    margin-bottom: 8px;
  }
  input {
    width: 100%;
    padding: 13px 16px;
    background: #0a0f1e;
    border: 1.5px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    font-size: 15px;
    font-family: inherit;
    outline: none;
    transition: border-color .2s, box-shadow .2s;
  }
  input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px #14b8a615;
  }
  input::placeholder { color: var(--muted); }

  .btn {
    width: 100%;
    padding: 14px;
    border: none;
    border-radius: 10px;
    font-size: 15px;
    font-weight: 700;
    font-family: inherit;
    cursor: pointer;
    transition: all .2s;
    margin-top: 4px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: #fff;
    letter-spacing: .02em;
  }
  .btn:hover { filter: brightness(1.1); transform: translateY(-1px); box-shadow: 0 8px 24px #14b8a630; }
  .btn:active { transform: translateY(0); }
  .btn:disabled { opacity: .6; cursor: not-allowed; transform: none; }

  .error {
    background: #450a0a;
    border: 1px solid #7f1d1d;
    color: #fca5a5;
    border-radius: 10px;
    padding: 12px 16px;
    font-size: 13px;
    margin-top: 14px;
    display: none;
    align-items: center;
    gap: 8px;
  }
  .error.show { display: flex; }

  .loading-dots {
    display: none;
    align-items: center;
    justify-content: center;
    gap: 6px;
    height: 20px;
  }
  .loading-dots span {
    width: 6px; height: 6px;
    background: #fff;
    border-radius: 50%;
    animation: bounce .8s infinite;
  }
  .loading-dots span:nth-child(2) { animation-delay: .15s; }
  .loading-dots span:nth-child(3) { animation-delay: .3s; }
  @keyframes bounce {
    0%,80%,100% { transform: scale(.8); opacity:.5; }
    40% { transform: scale(1.2); opacity:1; }
  }

  .version {
    text-align: center;
    margin-top: 28px;
    font-size: 11px;
    color: #374151;
  }
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <div class="logo-icon">🏨</div>
    <div class="logo-hotel">Sistema de Gestión</div>
    <div class="logo-name">Hotel Takuá</div>
    <div class="logo-sub">Acceso al sistema</div>
  </div>

  <div class="form-group">
    <label>Usuario</label>
    <input type="text" id="inp-usuario" placeholder="Tu usuario o email" autocomplete="username" autofocus/>
  </div>
  <div class="form-group">
    <label>Contraseña</label>
    <input type="password" id="inp-clave" placeholder="••••••••" autocomplete="current-password"/>
  </div>

  <button class="btn" id="btn-login" onclick="doLogin()">
    <span id="btn-text">Ingresar</span>
    <div class="loading-dots" id="btn-dots">
      <span></span><span></span><span></span>
    </div>
  </button>

  <div class="error" id="error-msg">
    <span>⚠️</span>
    <span id="error-text">Error</span>
  </div>

  <div class="version">Hotel Takuá © 2026</div>
</div>

<script>
// ── RUTAS POR ROL ────────────────────────────────────
const RUTAS = {
  admin:         '/index.html',     // ve todo, entra al sistema principal
  recepcionista: '/index.html',
  mucama:        '/index.html',
  mozo:          '/comandas.html',
  cajero:        '/comandas.html',
};

// ── LOGIN ────────────────────────────────────────────
async function doLogin() {
  const usuario = document.getElementById('inp-usuario').value.trim();
  const clave   = document.getElementById('inp-clave').value;
  const errEl   = document.getElementById('error-msg');
  const errTxt  = document.getElementById('error-text');

  errEl.classList.remove('show');

  if (!usuario || !clave) {
    errTxt.textContent = 'Completá usuario y contraseña';
    errEl.classList.add('show');
    return;
  }

  setLoading(true);

  try {
    const res = await fetch('/api/portal/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ usuario, clave })
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'Error de acceso');

    // Guardar token y usuario
    localStorage.setItem('takua_token', data.token);
    localStorage.setItem('takua_user',  JSON.stringify(data.user));

    // Redirigir según rol
    const ruta = RUTAS[data.user.rol] || '/index.html';
    window.location.href = ruta;

  } catch(e) {
    errTxt.textContent = e.message;
    errEl.classList.add('show');
    setLoading(false);
  }
}

function setLoading(on) {
  document.getElementById('btn-login').disabled = on;
  document.getElementById('btn-text').style.display  = on ? 'none' : 'inline';
  document.getElementById('btn-dots').style.display  = on ? 'flex'  : 'none';
}

// Enter para loguear
document.getElementById('inp-clave').addEventListener('keydown', e => {
  if (e.key === 'Enter') doLogin();
});
document.getElementById('inp-usuario').addEventListener('keydown', e => {
  if (e.key === 'Enter') document.getElementById('inp-clave').focus();
});

// Si ya tiene token válido, redirigir
(function() {
  const user = JSON.parse(localStorage.getItem('takua_user') || 'null');
  const token = localStorage.getItem('takua_token');
  if (token && user) {
    const ruta = RUTAS[user.rol] || '/index.html';
    window.location.href = ruta;
  }
})();
</script>
</body>
</html>
