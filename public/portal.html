<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>TK Serrano — Acceso</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{
    font-family:'Segoe UI',system-ui,sans-serif;
    min-height:100vh;
    display:flex;align-items:center;justify-content:center;
    padding:20px;
    background:radial-gradient(ellipse at 60% 30%, #7a2510 0%, #3d1005 40%, #1a0803 100%);
    position:relative;overflow:hidden;
  }
  body::before{content:'';position:fixed;top:-200px;left:-200px;width:500px;height:500px;
    border-radius:50%;background:radial-gradient(circle,rgba(196,149,106,.12) 0%,transparent 70%);pointer-events:none}
  body::after{content:'';position:fixed;bottom:-200px;right:-200px;width:400px;height:400px;
    border-radius:50%;background:radial-gradient(circle,rgba(139,69,19,.15) 0%,transparent 70%);pointer-events:none}

  .card{
    background:rgba(10,4,2,.6);
    backdrop-filter:blur(12px);
    border:1px solid rgba(196,149,106,.2);
    border-radius:24px;
    padding:44px 36px;
    width:100%;max-width:380px;
    box-shadow:0 24px 64px rgba(0,0,0,.6);
    position:relative;z-index:1;
  }

  .logo-wrap{text-align:center;margin-bottom:32px}
  .logo-img{width:130px;height:auto;margin-bottom:14px;filter:drop-shadow(0 4px 16px rgba(196,149,106,.3))}
  .logo-tag{font-size:10px;letter-spacing:.2em;color:rgba(196,149,106,.7);text-transform:uppercase;margin-bottom:2px}

  .lf{margin-bottom:16px}
  .lf label{display:block;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;
    color:rgba(196,149,106,.7);margin-bottom:7px}
  .lf input{width:100%;padding:13px 16px;background:rgba(0,0,0,.4);border:1.5px solid rgba(196,149,106,.2);
    border-radius:10px;color:#f5e6d3;font-size:14px;font-family:inherit;outline:none;transition:border-color .2s}
  .lf input:focus{border-color:#c4956a;box-shadow:0 0 0 3px rgba(196,149,106,.1)}
  .lf input::placeholder{color:rgba(196,149,106,.35)}

  .btn{width:100%;padding:14px;border:none;border-radius:11px;font-size:15px;font-weight:700;
    font-family:inherit;cursor:pointer;transition:all .2s;margin-top:6px;
    background:linear-gradient(135deg,#c4956a,#8b4513);color:#fff;letter-spacing:.03em}
  .btn:hover{filter:brightness(1.1);transform:translateY(-1px);box-shadow:0 8px 24px rgba(196,149,106,.35)}
  .btn:disabled{opacity:.6;cursor:not-allowed;transform:none}

  .err{background:rgba(127,29,29,.5);border:1px solid rgba(239,68,68,.4);color:#fca5a5;
    border-radius:10px;padding:11px 14px;font-size:13px;margin-top:12px;display:none}

  .dots{display:none;align-items:center;justify-content:center;gap:5px;height:20px}
  .dots span{width:6px;height:6px;background:#fff;border-radius:50%;animation:bounce .8s infinite}
  .dots span:nth-child(2){animation-delay:.15s}
  .dots span:nth-child(3){animation-delay:.3s}
  @keyframes bounce{0%,80%,100%{transform:scale(.8);opacity:.5}40%{transform:scale(1.2);opacity:1}}

  .version{text-align:center;margin-top:24px;font-size:11px;color:rgba(196,149,106,.3)}
</style>
</head>

    <span id="btn-text">Ingresar</span>

<script>
const RUTAS = {
  admin:'/',recepcionista:'/',mucama:'/',
  mozo:'/comandas.html',cajero:'/comandas.html'
};

async function doLogin(){
  const usuario=document.getElementById('inp-usuario').value.trim();
  const clave  =document.getElementById('inp-clave').value;
  const errEl  =document.getElementById('err-msg');
  errEl.style.display='none';
  if(!usuario||!clave){errEl.textContent='Completá usuario y contraseña';errEl.style.display='block';return;}
  setLoading(true);
  try{
    const res=await fetch('/api/portal/login',{method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({usuario,clave})});
    const data=await res.json();
    if(!res.ok) throw new Error(data.error||'Error de acceso');
    localStorage.setItem('takua_token',data.token);
    localStorage.setItem('takua_user',JSON.stringify(data.user));
    window.location.href=RUTAS[data.user.rol]||'/';
  }catch(e){errEl.textContent=e.message;errEl.style.display='block';setLoading(false);}
}

function setLoading(on){
  document.getElementById('btn-login').disabled=on;
  document.getElementById('btn-text').style.display=on?'none':'inline';
  document.getElementById('btn-dots').style.display=on?'flex':'none';
}

document.getElementById('inp-clave').addEventListener('keydown',e=>{if(e.key==='Enter')doLogin();});

function togglePass(){
  const inp=document.getElementById('inp-clave');
  const btn=document.getElementById('btn-ojo');
  if(inp.type==='password'){
    inp.type='text';
    btn.style.color='rgba(196,149,106,1)';
  } else {
    inp.type='password';
    btn.style.color='rgba(196,149,106,.6)';
  }
}
document.getElementById('inp-usuario').addEventListener('keydown',e=>{if(e.key==='Enter')document.getElementById('inp-clave').focus();});

// Auto-redirigir si ya hay sesión
(function(){
  const user=JSON.parse(localStorage.getItem('takua_user')||'null');
  const token=localStorage.getItem('takua_token');
  if(token&&user) window.location.href=RUTAS[user.rol]||'/';
})();
</script>
</body>
</html>
