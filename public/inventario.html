<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover">
<title>Inventario — Hotel Takuá</title>
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#00c9b1">
<link rel="apple-touch-icon" href="/icon-192.png">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--sidebar:#1a2035;--sw:72px;--accent:#00c9b1}
body{font-family:'Nunito',sans-serif;background:#f0f4f8;color:#1a2035;font-size:14px;overflow-x:hidden}
.sb-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:199}
.sb-overlay.open{display:block}
.sidebar{width:var(--sw);background:var(--sidebar);position:fixed;top:0;left:0;bottom:0;z-index:200;display:flex;flex-direction:column;align-items:center;padding:14px 0;gap:2px;transition:transform .25s ease}
.s-logo{width:50px;height:50px;border-radius:50%;overflow:hidden;margin-bottom:18px;flex-shrink:0;border:2px solid rgba(196,149,106,.4);background:#1a2035;display:flex;align-items:center;justify-content:center}
.nav-btn{width:58px;height:52px;border-radius:12px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;cursor:pointer;color:#64748b;border:none;background:none;font-family:'Nunito',sans-serif;transition:all .15s;flex-shrink:0;text-decoration:none}
.nav-btn:hover{background:rgba(255,255,255,.07);color:#fff}
.nav-btn.active{background:rgba(0,201,177,.18);color:var(--accent)}
.nav-btn .ni{font-size:18px;line-height:1}
.nav-btn .nl{font-size:8px;font-weight:700;letter-spacing:.3px;text-transform:uppercase;color:inherit}
.hamburger{display:none;background:none;border:none;cursor:pointer;font-size:22px;color:#1a2035;padding:2px 6px;flex-shrink:0}
.main{margin-left:var(--sw);display:flex;flex-direction:column;min-height:100vh}
.topbar{background:#fff;padding:12px 22px;display:flex;align-items:center;gap:10px;border-bottom:1px solid #e8edf3;position:sticky;top:0;z-index:100}
.tb-left{flex:1;min-width:0}
.tb-left h2{font-size:16px;font-weight:800;color:#1a2035;margin:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tb-left p{font-size:11px;color:#94a3b8;margin-top:1px}
.tb-right{display:flex;align-items:center;gap:8px;flex-shrink:0}
.content{padding:20px 24px;max-width:1400px;margin:0 auto;width:100%}
.user-av{width:36px;height:36px;border-radius:50%;background:var(--accent);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:14px;flex-shrink:0}
.btn-salir{background:none;border:1.5px solid #e2e8f0;border-radius:8px;padding:6px 14px;font-size:13px;font-weight:700;color:#dc2626;cursor:pointer;font-family:'Nunito',sans-serif}
.section-card{background:#fff;border-radius:18px;padding:22px 24px;box-shadow:0 1px 8px rgba(0,0,0,.07);margin-bottom:20px}
.sc-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;flex-wrap:wrap;gap:10px}
.card-title{font-size:16px;font-weight:800;color:#1a2035}
.tabs{display:flex;gap:4px;background:#f1f5f9;border-radius:12px;padding:4px;margin-bottom:20px;flex-wrap:wrap}
.tab{flex:1;min-width:80px;padding:8px 14px;border-radius:9px;border:none;background:none;font-family:'Nunito',sans-serif;font-size:13px;font-weight:700;color:#64748b;cursor:pointer;transition:all .15s;white-space:nowrap}
.tab.active{background:#fff;color:#1a2035;box-shadow:0 1px 4px rgba(0,0,0,.1)}
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:20px}
.stat-card{border-radius:14px;padding:16px 18px;color:#fff;position:relative;overflow:hidden}
.stat-card::after{content:'';position:absolute;right:-10px;bottom:-10px;width:70px;height:70px;border-radius:50%;background:rgba(255,255,255,.08)}
.stat-lbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;opacity:.8;margin-bottom:4px}
.stat-val{font-size:24px;font-weight:900;line-height:1}
.stat-sub{font-size:11px;opacity:.7;margin-top:4px}
.data-table{width:100%;border-collapse:collapse}
.data-table th{text-align:left;padding:10px 12px;font-size:11px;font-weight:800;color:#94a3b8;text-transform:uppercase;letter-spacing:.5px;border-bottom:2px solid #f1f5f9}
.data-table td{padding:10px 12px;border-bottom:1px solid #f8fafc;font-size:13px;vertical-align:middle}
.data-table tbody tr:hover{background:#f8fafc}
.pill{display:inline-block;border-radius:20px;padding:2px 10px;font-size:11px;font-weight:700}
.pg{background:#dcfce7;color:#16a34a}.pr{background:#fee2e2;color:#dc2626}
.py{background:#fef9c3;color:#b45309}.pb{background:#dbeafe;color:#1d4ed8}
.pgr{background:#f3f4f6;color:#374151}.po{background:#ffedd5;color:#c2410c}
.form-row{display:flex;gap:12px;margin-bottom:14px;flex-wrap:wrap}
.form-col{flex:1;min-width:140px;display:flex;flex-direction:column;gap:5px}
.form-col label{font-size:11px;font-weight:700;color:#64748b;text-transform:uppercase;letter-spacing:.3px}
.form-col input,.form-col select{border:1.5px solid #e0e6ef;border-radius:9px;padding:9px 11px;font-size:13px;font-family:'Nunito',sans-serif;width:100%;transition:border .15s}
.form-col input:focus,.form-col select:focus{outline:none;border-color:var(--accent)}
.stitle{font-size:11px;font-weight:700;color:#94a3b8;text-transform:uppercase;letter-spacing:.5px;margin:14px 0 8px}
.btn-primary{background:linear-gradient(135deg,var(--accent),#0094ff);border:none;border-radius:10px;padding:10px 18px;color:#fff;font-size:13px;font-weight:700;cursor:pointer;font-family:'Nunito',sans-serif}
.btn-secondary{background:#f1f5f9;border:1.5px solid #e2e8f0;border-radius:10px;padding:9px 16px;color:#475569;font-size:13px;font-weight:700;cursor:pointer;font-family:'Nunito',sans-serif}
.btn-danger{background:#fee2e2;border:1.5px solid #fecdd3;border-radius:10px;padding:9px 14px;color:#dc2626;font-size:13px;font-weight:700;cursor:pointer;font-family:'Nunito',sans-serif}
.btn-sm{border:none;border-radius:7px;padding:5px 10px;font-size:12px;font-weight:700;cursor:pointer;font-family:'Nunito',sans-serif}
.confirm-btn{width:100%;background:linear-gradient(135deg,var(--accent),#0094ff);border:none;border-radius:12px;padding:14px;color:#fff;font-size:15px;font-weight:800;cursor:pointer;font-family:'Nunito',sans-serif;margin-top:6px}
.alert-stock{background:#fff5f5;border:1.5px solid #fca5a5;border-radius:12px;padding:14px 16px;margin-bottom:16px}
.alert-row{display:flex;justify-content:space-between;align-items:center;padding:4px 0;font-size:13px}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:500;display:none;align-items:flex-end;justify-content:center}
.overlay.open{display:flex}
.modal{background:#fff;border-radius:22px 22px 0 0;width:100%;max-width:560px;padding:22px 20px;max-height:90vh;overflow-y:auto;-webkit-overflow-scrolling:touch;overscroll-behavior:contain;animation:slideUp .22s ease}
@keyframes slideUp{from{transform:translateY(30px);opacity:0}to{transform:translateY(0);opacity:1}}
.modal-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px}
.modal-hd h3{font-size:17px;font-weight:800;color:#1a2035}
.modal-close{background:#f1f5f9;border:none;border-radius:8px;padding:6px 12px;cursor:pointer;font-size:18px;color:#64748b}
.stock-badge{display:inline-flex;align-items:center;gap:4px;border-radius:8px;padding:3px 9px;font-size:12px;font-weight:700}
.stock-ok{background:#dcfce7;color:#16a34a}
.stock-low{background:#fef9c3;color:#b45309}
.stock-zero{background:#fee2e2;color:#dc2626}
.mod-badge{display:inline-block;border-radius:6px;padding:2px 8px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.3px}
.mod-bebidas{background:#dbeafe;color:#1d4ed8}
.mod-frigobar{background:#fce7f3;color:#be185d}
.mod-cocina{background:#dcfce7;color:#15803d}
.mod-general{background:#f3f4f6;color:#374151}
.mod-limpieza{background:#e0e7ff;color:#4338ca}
.mov-row{display:flex;justify-content:space-between;align-items:flex-start;padding:10px 0;border-bottom:1px solid #f1f5f9;font-size:13px;gap:8px}
.filtro-pill{padding:5px 12px;border-radius:20px;font-size:12px;font-weight:700;cursor:pointer;font-family:'Nunito',sans-serif;border:1.5px solid #e2e8f0;background:#fff;color:#475569;transition:all .15s}
.filtro-pill.active{border-color:var(--accent);background:#f0fdf9;color:#0f766e}
@media(max-width:900px){
  :root{--sw:0px}
  .sidebar{transform:translateX(-100%);width:220px;align-items:flex-start;padding:14px 10px}
  .sidebar .nav-btn{width:100%;justify-content:flex-start;gap:10px;padding:0 10px;height:48px}
  .sidebar .nav-btn .nl{font-size:13px;letter-spacing:0;text-transform:none}
  .sidebar.open{transform:translateX(0)}
  .sb-overlay.open{display:block}
  .main{margin-left:0!important}
  .hamburger{display:flex!important;align-items:center;justify-content:center}
  .stats-grid{grid-template-columns:1fr 1fr;gap:8px}
  .content{padding:12px 10px}
}
@media(max-width:600px){
  .form-row{flex-direction:column;gap:8px}
  input,select{font-size:16px!important}
  .tab{font-size:11px;padding:7px 8px}
  .stat-val{font-size:18px}
  .stats-grid{gap:8px}
}
</style>
</head>
<body>

<div class="sb-overlay" id="sb-overlay"></div>
<nav class="sidebar" id="sidebar">
  <div class="s-logo" id="s-logo-inv">
    <span style="font-size:18px;font-weight:900;color:var(--accent)">TK</span>
  </div>
  <a href="/index.html" style="text-decoration:none">
    <button class="nav-btn" title="Inicio"><span class="ni">🏠</span><span class="nl">Inicio</span></button>
  </a>
  <a href="/index.html#habitaciones" style="text-decoration:none">
    <button class="nav-btn" title="Habitaciones"><span class="ni">🛏️</span><span class="nl">Hab.</span></button>
  </a>
  <button class="nav-btn active" title="Inventario" onclick="render()">
    <span class="ni">📦</span><span class="nl">Inventario</span>
  </button>
  <a href="/index.html#caja" style="text-decoration:none">
    <button class="nav-btn" title="Caja"><span class="ni">💰</span><span class="nl">Caja</span></button>
  </a>
  <a href="/index.html#finanzas" style="text-decoration:none">
    <button class="nav-btn" title="Finanzas"><span class="ni">📊</span><span class="nl">Finanzas</span></button>
  </a>
</nav>

<div class="main">
  <div class="topbar">
    <button class="hamburger" id="hamburger">☰</button>
    <div class="tb-left">
      <h2>📦 Inventario — Hotel Takuá</h2>
      <p id="tb-user">Administrador</p>
    </div>
    <div class="tb-right">
      <div class="user-av" id="user-av">A</div>
      <button class="btn-salir" onclick="doLogout()">Salir</button>
    </div>
  </div>
  <div class="content" id="main-content">
    <div style="text-align:center;padding:60px;color:#94a3b8;font-size:16px">⏳ Cargando inventario...</div>
  </div>
</div>

<div class="overlay" id="overlay">
  <div class="modal" id="modal-body"></div>
</div>

<script>
// ── AUTH ─────────────────────────────────────────────
const TOKEN = localStorage.getItem('takua_token');
const ME    = JSON.parse(localStorage.getItem('takua_user') || 'null');
if (!TOKEN || !ME) window.location.href = '/portal.html';
if (ME && ME.rol !== 'admin') window.location.href = '/index.html';

document.getElementById('user-av').textContent = (ME?.nombre||'A')[0].toUpperCase();
document.getElementById('tb-user').textContent  = 'Admin · ' + (ME?.nombre||'');

function doLogout() {
  localStorage.removeItem('takua_token');
  localStorage.removeItem('takua_user');
  window.location.href = '/portal.html';
}

// Hamburger
document.getElementById('hamburger').addEventListener('click', () => {
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('sb-overlay').classList.toggle('open');
});
document.getElementById('sb-overlay').addEventListener('click', () => {
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('sb-overlay').classList.remove('open');
});

// Cargar logo desde index.html
fetch('/index.html').then(r=>r.text()).then(txt => {
  const m = txt.match(/class="s-logo"><img src="(data:image[^"]+)"/);
  if (m) document.getElementById('s-logo-inv').innerHTML =
    '<img src="'+m[1]+'" style="width:100%;height:100%;object-fit:cover">';
}).catch(()=>{});

// ── API ───────────────────────────────────────────────
async function api(method, path, body) {
  try {
    const r = await fetch('/api'+path, {
      method,
      headers:{'Content-Type':'application/json','Authorization':'Bearer '+TOKEN},
      body: body ? JSON.stringify(body) : undefined
    });
    return r.json();
  } catch(e) { return {error:e.message}; }
}

// ── UTILS ─────────────────────────────────────────────
const fmt = n => n==null ? '—' : new Intl.NumberFormat('es-AR',{style:'currency',currency:'ARS',minimumFractionDigits:0,maximumFractionDigits:0}).format(n);
const fmtDate = iso => iso ? new Date(iso).toLocaleString('es-AR',{day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit'}) : '—';

function toast(msg, ok=true) {
  const t = document.createElement('div');
  t.style.cssText = 'position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:'
    +(ok?'#1a2035':'#dc2626')+';color:#fff;padding:12px 22px;border-radius:12px;font-weight:700;'
    +'font-size:13px;z-index:9999;box-shadow:0 4px 20px rgba(0,0,0,.3);font-family:Nunito,sans-serif;white-space:nowrap';
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 3000);
}

function openModal(html) {
  document.getElementById('modal-body').innerHTML = html;
  document.getElementById('overlay').classList.add('open');
}
function closeModal() { document.getElementById('overlay').classList.remove('open'); }
document.getElementById('overlay').addEventListener('click', e => {
  if (e.target.id === 'overlay') closeModal();
});

// ── ESTADO ────────────────────────────────────────────
const G = { tab:'productos', productos:[], alertas:[], filtroModulo:'todos', filtroCat:'todas', busqueda:'' };

const MODULOS = [
  {id:'todos',    label:'Todos',    icon:'📦'},
  {id:'bebidas',  label:'Bebidas',  icon:'🍺'},
  {id:'frigobar', label:'Frigobar', icon:'🧊'},
  {id:'cocina',   label:'Cocina',   icon:'🍳'},
  {id:'limpieza', label:'Limpieza', icon:'🧹'},
  {id:'general',  label:'General',  icon:'📋'},
];
const MOD_CLASS = {bebidas:'mod-bebidas',frigobar:'mod-frigobar',cocina:'mod-cocina',limpieza:'mod-limpieza',general:'mod-general'};
const MOD_ICON  = {bebidas:'🍺',frigobar:'🧊',cocina:'🍳',limpieza:'🧹',general:'📋',todos:'📦'};
const TIPO_ICON  = {entrada:'⬆️',salida:'⬇️',consumo:'🍽️',ajuste:'⚖️'};
const TIPO_COLOR = {entrada:'#16a34a',salida:'#dc2626',consumo:'#f97316',ajuste:'#2563eb'};
const TIPO_PILL  = {entrada:'pg',salida:'pr',consumo:'po',ajuste:'pb'};

function stockBadge(p) {
  const s = Number(p.stock)||0, u = p.unidad||'u';
  if (s<=0)              return '<span class="stock-badge stock-zero">⛔ Sin stock</span>';
  if (s<=p.stock_minimo) return '<span class="stock-badge stock-low">⚠️ '+s+' '+u+'</span>';
  return '<span class="stock-badge stock-ok">✅ '+s+' '+u+'</span>';
}

// ── CARGA ─────────────────────────────────────────────
async function loadAll() {
  const [prods, alertas] = await Promise.all([
    api('GET','/inventario/productos'),
    api('GET','/inventario/alertas')
  ]);
  G.productos = Array.isArray(prods) ? prods : [];
  G.alertas   = Array.isArray(alertas) ? alertas : [];
}

// ── RENDER PRINCIPAL ──────────────────────────────────
async function render() {
  await loadAll();
  const total     = G.productos.length;
  const sinStock  = G.productos.filter(p=>Number(p.stock)<=0).length;
  const stockBajo = G.alertas.length;
  const valorTotal= G.productos.reduce((s,p)=>s+(Number(p.stock)*Number(p.costo||0)),0);

  const alertHTML = G.alertas.length ? '<div class="alert-stock">'
    +'<div style="font-weight:800;color:#dc2626;font-size:14px;margin-bottom:10px">⚠️ '
    +G.alertas.length+' producto'+(G.alertas.length>1?'s':'')+' con stock bajo o agotado</div>'
    +G.alertas.map(a=>'<div class="alert-row"><span>'
      +'<span class="mod-badge '+(MOD_CLASS[a.modulo]||'mod-general')+'">'+(MOD_ICON[a.modulo]||'📋')+' '+(a.modulo||'general')+'</span>'
      +' <strong style="margin-left:6px">'+a.nombre+'</strong>'
      +(a.categoria?'<span style="color:#94a3b8;font-size:12px;margin-left:4px">('+a.categoria+')</span>':'')
    +'</span><span style="font-weight:700;color:'+(Number(a.stock)<=0?'#dc2626':'#d97706')+'">'
    +a.stock+' / mín '+a.stock_minimo+' '+(a.unidad||'u')+'</span></div>').join('')
    +'</div>' : '';

  document.getElementById('main-content').innerHTML = alertHTML
    +'<div class="stats-grid">'
    +'<div class="stat-card" style="background:linear-gradient(135deg,#0f766e,#14b8a6)"><div class="stat-lbl">Total productos</div><div class="stat-val">'+total+'</div><div class="stat-sub">en inventario</div></div>'
    +'<div class="stat-card" style="background:linear-gradient(135deg,#dc2626,#ef4444)"><div class="stat-lbl">Sin stock</div><div class="stat-val">'+sinStock+'</div><div class="stat-sub">agotados</div></div>'
    +'<div class="stat-card" style="background:linear-gradient(135deg,#d97706,#f59e0b)"><div class="stat-lbl">Stock bajo</div><div class="stat-val">'+stockBajo+'</div><div class="stat-sub">bajo mínimo</div></div>'
    +'<div class="stat-card" style="background:linear-gradient(135deg,#1d4ed8,#3b82f6)"><div class="stat-lbl">Valor en stock</div><div class="stat-val" style="font-size:'+(valorTotal>9999999?'14px':'18px')+'">'+fmt(valorTotal)+'</div><div class="stat-sub">a precio de costo</div></div>'
    +'</div>'
    +'<div class="tabs">'
    +'<button class="tab '+(G.tab==='productos'?'active':'')+'" onclick="setTab(\'productos\')">📦 Productos</button>'
    +'<button class="tab '+(G.tab==='movimientos'?'active':'')+'" onclick="setTab(\'movimientos\')">📋 Movimientos</button>'
    +'<button class="tab '+(G.tab==='reporte'?'active':'')+'" onclick="setTab(\'reporte\')">📊 Reporte</button>'
    +'</div>'
    +'<div id="tab-content"></div>';

  renderTab();
}

function setTab(tab) {
  G.tab = tab;
  document.querySelectorAll('.tab').forEach((t,i) => {
    t.classList.toggle('active', ['productos','movimientos','reporte'][i]===tab);
  });
  renderTab();
}
function renderTab() {
  const el = document.getElementById('tab-content');
  if (!el) return;
  if (G.tab==='productos')    renderTabProductos(el);
  else if (G.tab==='movimientos') renderTabMovimientos(el);
  else renderTabReporte(el);
}

// ── TAB PRODUCTOS ─────────────────────────────────────
function renderTabProductos(el) {
  // Renderizar SIEMPRE todos los productos — el filtrado es en DOM
  const prods = G.productos;
  const cats  = [...new Set(prods.map(p=>p.categoria).filter(Boolean))].sort();

  const rows = prods.map(p=>'<tr'
    +' data-nombre="'+(p.nombre||'').toLowerCase()+'"'
    +' data-cat="'+(p.categoria||'').toLowerCase()+'"'
    +' data-mod="'+(p.modulo||'general')+'"'
    +' data-prov="'+(p.proveedor||'').toLowerCase()+'">'
    +'<td><div style="font-weight:700">'+p.nombre+'</div>'+(p.proveedor?'<div style="font-size:11px;color:#94a3b8">'+p.proveedor+'</div>':'')+'</td>'
    +'<td><span class="mod-badge '+(MOD_CLASS[p.modulo]||'mod-general')+'">'+(MOD_ICON[p.modulo]||'📋')+' '+(p.modulo||'general')+'</span></td>'
    +'<td><span class="pill pgr">'+(p.categoria||'—')+'</span></td>'
    +'<td>'+stockBadge(p)+'</td>'
    +'<td style="color:#94a3b8">'+p.stock_minimo+' '+(p.unidad||'u')+'</td>'
    +'<td>'+(p.costo?fmt(p.costo):'—')+'</td>'
    +'<td>'+(p.precio?fmt(p.precio):'—')+'</td>'
    +'<td><div style="display:flex;gap:5px;flex-wrap:wrap">'
    +'<button class="btn-sm" style="background:#dcfce7;color:#16a34a" onclick="modalEntrada('+p.id+',\''+p.nombre.replace(/'/g,"\\'")+'\','+p.stock+',\''+(p.unidad||'unidad')+'\')">+ Entrada</button>'
    +'<button class="btn-sm" style="background:#fee2e2;color:#dc2626" onclick="modalSalida('+p.id+',\''+p.nombre.replace(/'/g,"\\'")+'\','+p.stock+',\''+(p.unidad||'unidad')+'\')">− Salida</button>'
    +'<button class="btn-sm" style="background:#eff6ff;color:#2563eb" onclick="modalEditar('+p.id+')">✏️</button>'

// ── TAB REPORTE ───────────────────────────────────────
async function renderTabReporte(el) {
  el.innerHTML='<div style="text-align:center;padding:24px;color:#94a3b8">Generando reporte...</div>';
  const data=await api('GET','/inventario/reporte');
  const prods=data?.productos||[];
  const movs =data?.movimientos||[];
  const porModulo={};
  for(const p of prods){
    const mod=p.modulo||'general';
    if(!porModulo[mod]) porModulo[mod]={count:0,valor:0,bajos:0};
    porModulo[mod].count++;
    porModulo[mod].valor+=Number(p.stock)*Number(p.costo||0);
    if(Number(p.stock)<=Number(p.stock_minimo)) porModulo[mod].bajos++;
  }
  const modRows=Object.entries(porModulo).map(([mod,d])=>'<tr>'
    +'<td><span class="mod-badge '+(MOD_CLASS[mod]||'mod-general')+'">'+(MOD_ICON[mod]||'📋')+' '+mod+'</span></td>'
    +'<td style="font-weight:700">'+d.count+'</td>'
    +'<td style="font-weight:700;color:#16a34a">'+fmt(d.valor)+'</td>'
    +'<td style="font-weight:700;color:'+(d.bajos>0?'#dc2626':'#94a3b8')+'">'+d.bajos+'</td>'
    +'</tr>').join('');
  const consumos={};
  for(const m of movs){
    if(m.tipo==='consumo'||m.tipo==='salida')
      consumos[m.producto_nombre]=(consumos[m.producto_nombre]||0)+Number(m.cantidad);
  }
  const top10=Object.entries(consumos).sort((a,b)=>b[1]-a[1]).slice(0,10);

  el.innerHTML='<div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px">'
    +'<div class="section-card"><div class="card-title" style="margin-bottom:16px">📊 Por módulo</div>'
    +'<table class="data-table"><thead><tr><th>Módulo</th><th>Productos</th><th>Valor stock</th><th>Stock bajo</th></tr></thead>'
    +'<tbody>'+(modRows||'<tr><td colspan="4" style="text-align:center;color:#94a3b8;padding:16px">Sin datos</td></tr>')+'</tbody></table></div>'
    +'<div class="section-card"><div class="card-title" style="margin-bottom:16px">🏆 Top 10 más consumidos</div>'
    +(top10.length?top10.map(([nombre,cant],i)=>'<div class="mov-row"><span><strong style="color:#94a3b8;margin-right:6px">#'+(i+1)+'</strong>'+nombre+'</span><span style="font-weight:700;color:#dc2626">'+cant+' u.</span></div>').join('')
    :'<div style="text-align:center;color:#94a3b8;padding:20px">Sin datos de consumo aún</div>')+'</div></div>'
    +'<div class="section-card"><div class="sc-head"><span class="card-title">⚠️ Productos con stock bajo o agotado ('+G.alertas.length+')</span></div>'
    +(G.alertas.length?'<div style="overflow-x:auto"><table class="data-table"><thead><tr><th>Producto</th><th>Módulo</th><th>Categoría</th><th>Stock</th><th>Mínimo</th><th>Acción</th></tr></thead><tbody>'
    +G.alertas.map(p=>'<tr><td style="font-weight:700">'+p.nombre+'</td>'
    +'<td><span class="mod-badge '+(MOD_CLASS[p.modulo]||'mod-general')+'">'+(p.modulo||'—')+'</span></td>'
    +'<td>'+(p.categoria||'—')+'</td>'
    +'<td style="font-weight:700;color:'+(Number(p.stock)<=0?'#dc2626':'#d97706')+'">'+p.stock+' '+(p.unidad||'u')+'</td>'
    +'<td>'+p.stock_minimo+' '+(p.unidad||'u')+'</td>'
    +'<td><button class="btn-sm" style="background:#dcfce7;color:#16a34a" onclick="modalEntrada('+p.id+',\''+p.nombre.replace(/'/g,"\\'")+'\','+p.stock+',\''+(p.unidad||'unidad')+'\')">+ Reponer</button></td>'
    +'</tr>').join('')+'</tbody></table></div>'
    :'<div style="text-align:center;color:#16a34a;padding:20px;font-weight:700">✅ Todo el stock está dentro de los mínimos</div>')+'</div>';
}

function toggleModuloAviso(mod) {
  const aviso = document.getElementById('aviso-bebida');
  const lbl   = document.getElementById('np-precio-lbl');
  if (!aviso) return;
  if (mod === 'bebidas') {
    aviso.style.display = 'block';
    if (lbl) lbl.textContent = 'Precio de venta (menú restaurante)';
  } else {
    aviso.style.display = 'none';
    if (lbl) lbl.textContent = 'Precio de venta';
  }
}
async function crearProducto() {
  const nombre=document.getElementById('np-nom').value.trim();
  if(!nombre){toast('Ingresá el nombre',false);return;}
  const r=await api('POST','/inventario/productos',{
    nombre, modulo:document.getElementById('np-mod').value,
    categoria:document.getElementById('np-cat').value.trim()||'General',
    unidad:document.getElementById('np-uni').value,
    costo:parseFloat(document.getElementById('np-costo').value)||0,
    precio:parseFloat(document.getElementById('np-precio').value)||0,
    stock:parseFloat(document.getElementById('np-stock').value)||0,
    stock_minimo:parseFloat(document.getElementById('np-min').value)||5,
    proveedor:document.getElementById('np-prov').value.trim()
  });
  if(r?.id){toast('Producto creado ✓');closeModal();render();}
  else toast(r?.error||'Error al crear',false);
}

async function guardarEdicion(id) {
  const body={nombre:document.getElementById('ep-nom').value.trim(),modulo:document.getElementById('ep-mod').value,
    categoria:document.getElementById('ep-cat').value.trim(),unidad:document.getElementById('ep-uni').value,
    costo:parseFloat(document.getElementById('ep-costo').value)||0,precio:parseFloat(document.getElementById('ep-precio').value)||0,
    stock_minimo:parseFloat(document.getElementById('ep-min').value)||5,proveedor:document.getElementById('ep-prov').value.trim()};
  if(!body.nombre){toast('Ingresá el nombre',false);return;}
  const r=await api('PUT','/inventario/productos/'+id,body);
  if(r?.ok){toast('Guardado ✓');closeModal();render();}
  else toast(r?.error||'Error',false);
}
async function eliminarProducto(id) {
  const r=await api('DELETE','/inventario/productos/'+id);
  if(r?.ok){toast('Producto eliminado');closeModal();render();}
  else toast(r?.error||'Error',false);
}

async function confirmarSalida(id,stockActual) {
  const cant=parseFloat(document.getElementById('sal-cant').value)||0;
  if(!cant||cant<=0){toast('Cantidad inválida',false);return;}
  if(cant>stockActual){toast('Stock insuficiente',false);return;}
  const motivoSel=document.getElementById('sal-motivo-sel').value;
  const motivoOtro=document.getElementById('sal-motivo-txt')?.value.trim();
  const motivo=motivoSel==='otro'?(motivoOtro||'Otro'):motivoSel;
  const r=await api('POST','/inventario/salida',{producto_id:id,cantidad:cant,motivo});
  if(r?.ok){toast('Salida registrada ✓');closeModal();render();}
  else toast(r?.error||'Error',false);
}

function ajusteStock(id,stockActual,unidad) {
  openModal('<div class="modal-hd"><h3>⚖️ Ajuste de stock</h3><button class="modal-close" onclick="closeModal()">✕</button></div>'
    +'<div style="font-size:13px;color:#64748b;margin-bottom:14px;background:#f8fafc;padding:12px;border-radius:10px">'
    +'Stock actual en sistema: <strong>'+stockActual+' '+unidad+'</strong><br>'
    +'<span style="font-size:12px">Usá esto para corregir el stock real después de un conteo físico.</span></div>'
    +'<div class="form-row"><div class="form-col"><label>Nuevo stock real ('+unidad+')</label>'
    +'<input type="number" id="aj-stock" value="'+stockActual+'" min="0" step="0.1"></div></div>'
    +'<div class="form-col" style="margin-bottom:16px"><label>Motivo del ajuste</label>'
    +'<input id="aj-motivo" placeholder="Ej: Conteo físico, corrección de error..."></div>'
    +'<button class="confirm-btn" style="background:linear-gradient(135deg,#1d4ed8,#2563eb)" onclick="confirmarAjuste('+id+')">⚖️ Confirmar ajuste</button>');
}
async function confirmarAjuste(id) {
  const stockNuevo=parseFloat(document.getElementById('aj-stock').value);
  if(isNaN(stockNuevo)||stockNuevo<0){toast('Stock inválido',false);return;}
  const motivo=document.getElementById('aj-motivo').value.trim()||'Ajuste manual';
  const r=await api('POST','/inventario/ajuste',{producto_id:id,stock_nuevo:stockNuevo,motivo});
  if(r?.ok){toast('Stock ajustado ✓');closeModal();render();}
  else toast(r?.error||'Error',false);
}

// ── HISTORIAL PRODUCTO ────────────────────────────────
async function modalHistorial(id,nombre) {
  openModal('<div class="modal-hd"><h3>📋 Historial — '+nombre+'</h3><button class="modal-close" onclick="closeModal()">✕</button></div>'
    +'<div id="hist-body" style="text-align:center;padding:24px;color:#94a3b8">Cargando...</div>');
  const movs=await api('GET','/inventario/movimientos/'+id);
  const el=document.getElementById('hist-body');
  if(!movs?.length){el.textContent='Sin movimientos registrados.';return;}
  el.innerHTML=movs.map(m=>'<div class="mov-row"><div style="flex:1">'
    +'<div><span style="font-size:16px">'+(TIPO_ICON[m.tipo]||'•')+'</span>'
    +'<span style="font-weight:700;color:'+(TIPO_COLOR[m.tipo]||'#374151')+';margin-left:6px">'+m.tipo+'</span>'
    +'<span style="color:#94a3b8;font-size:11px;margin-left:8px">'+fmtDate(m.created_at)+'</span></div>'
    +'<div style="font-size:12px;color:#64748b;margin-top:2px">'+(m.motivo||'—')+' · '+(m.usuario_nombre||'Sistema')
    +(m.referencia?' · '+m.referencia:'')+'</div></div>'
    +'<div style="text-align:right;flex-shrink:0">'
    +'<div style="font-weight:800;font-size:15px;color:'+(TIPO_COLOR[m.tipo]||'#374151')+'">'+(m.tipo==='entrada'?'+':'-')+m.cantidad+'</div>'
    +'<div style="font-size:11px;color:#94a3b8">'+m.stock_antes+' → '+m.stock_despues+'</div>'
    +'</div></div>').join('');
}

// ── FILTRADO EN DOM (instantáneo) ─────────────────────
function _aplicarFiltrosInv() {
  const q   = (document.getElementById('inv-search')?.value||'').toLowerCase().trim();
  const mod = G.filtroModulo;
  const cat = G.filtroCat;
  const rows = document.querySelectorAll('#inv-tbody tr[data-nombre]');
  let visible = 0;
  rows.forEach(tr => {
    const matchQ   = !q   || tr.dataset.nombre.includes(q) || tr.dataset.cat.includes(q) || tr.dataset.prov.includes(q);
    const matchMod = mod==='todos' || tr.dataset.mod===mod;
    const matchCat = cat==='todas' || tr.dataset.cat===cat;
    const show = matchQ && matchMod && matchCat;
    tr.style.display = show ? '' : 'none';
    if (show) visible++;
  });
  const noRes = document.getElementById('inv-noresult');
  if (noRes) noRes.style.display = visible===0 ? 'block' : 'none';
  // Actualizar contador
  const titulo = document.querySelector('.sc-head .card-title');
  if (titulo) titulo.textContent = 'Productos ('+(q||mod!=='todos'||cat!=='todas'?visible+' de '+G.productos.length:G.productos.length)+')';
}

function filtrarInventarioDom(q) {
  G.busqueda = q;
  _aplicarFiltrosInv();
}

function setFiltroModulo(mod, btn) {
  G.filtroModulo = mod;
  document.querySelectorAll('.filtro-pill[onclick^="setFiltroModulo"]').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  _aplicarFiltrosInv();
}

function setFiltroCat(cat, btn) {
  G.filtroCat = cat;
  document.querySelectorAll('.filtro-pill[onclick^="setFiltroCat"]').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  _aplicarFiltrosInv();
}

// ── IMPRIMIR INVENTARIO ───────────────────────────────
function imprimirInventario() {
  const rows = document.querySelectorAll('#inv-tbody tr[data-nombre]:not([style*="display: none"]):not([style*="display:none"])');
  if (!rows.length) { toast('No hay productos para imprimir', false); return; }

  const fecha = new Date().toLocaleDateString('es-AR',{day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit'});
  const filtroMod = G.filtroModulo !== 'todos' ? ` · Módulo: ${G.filtroModulo}` : '';
  const filtroCat = G.filtroCat   !== 'todas'  ? ` · Categoría: ${G.filtroCat}` : '';

  const MOD_ICON = {bebidas:'🍺',frigobar:'🧊',cocina:'🍳',limpieza:'🧹',general:'📋'};

  const grupos = {};
  rows.forEach(tr => {
    const mod = tr.dataset.mod || 'general';
    if (!grupos[mod]) grupos[mod] = [];
    const celdas = tr.querySelectorAll('td');
    grupos[mod].push({
      nombre:    celdas[0]?.querySelector('div')?.textContent || '',
      proveedor: celdas[0]?.querySelectorAll('div')[1]?.textContent || '',
      categoria: celdas[2]?.textContent.trim() || '',
      stock:     celdas[3]?.textContent.trim() || '',
      minimo:    celdas[4]?.textContent.trim() || '',
    });
  });

  const tablaGrupos = Object.entries(grupos).map(([mod, prods]) => `
    <tr style="background:#f1f5f9">
      <td colspan="4" style="font-weight:800;font-size:12px;padding:7px 10px;color:#1a2035">
        ${MOD_ICON[mod]||'📋'} ${mod.toUpperCase()} (${prods.length})
      </td>
    </tr>
    ${prods.map(p => `<tr>
      <td style="padding:6px 10px;border-bottom:1px solid #f1f5f9">
        <strong>${p.nombre}</strong>
        ${p.proveedor?`<br><small style="color:#94a3b8">${p.proveedor}</small>`:''}
      </td>
      <td style="padding:6px 10px;border-bottom:1px solid #f1f5f9;color:#64748b">${p.categoria}</td>
      <td style="padding:6px 10px;border-bottom:1px solid #f1f5f9;font-weight:700;color:${p.stock.includes('⛔')?'#dc2626':p.stock.includes('⚠️')?'#d97706':'#16a34a'}">${p.stock}</td>
      <td style="padding:6px 10px;border-bottom:1px solid #f1f5f9;color:#94a3b8">${p.minimo}</td>
    </tr>`).join('')}
  `).join('');

  const html = `<!DOCTYPE html><html lang="es"><head><meta charset="UTF-8">
  <title>Inventario — Hotel Takuá</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:Arial,sans-serif;font-size:12px;color:#1a2035;padding:16px}
    h1{font-size:16px;font-weight:900;margin-bottom:2px}
    .sub{font-size:11px;color:#64748b;margin-bottom:14px}
    table{width:100%;border-collapse:collapse}
    th{text-align:left;padding:7px 10px;font-size:10px;font-weight:800;color:#64748b;text-transform:uppercase;letter-spacing:.4px;border-bottom:2px solid #1a2035}
    @page{margin:12mm}
  </style>
  </head><body>
  <h1>📦 Inventario — Hotel Takuá</h1>
  <div class="sub">${fecha}${filtroMod}${filtroCat} · ${rows.length} productos</div>
  <table>
    <thead><tr>
      <th>Producto</th><th>Categoría</th><th>Stock</th><th>Mínimo</th>
    </tr></thead>
    <tbody>${tablaGrupos}</tbody>
  </table>
  <div style="margin-top:16px;font-size:10px;color:#94a3b8;text-align:center">Hotel Takuá · ${fecha}</div>
  </body></html>`;

  // Imprimir con iframe oculto
  const id = 'inv-print-frame';
  let frame = document.getElementById(id);
  if (!frame) {
    frame = document.createElement('iframe');
    frame.id = id;
    frame.style.cssText = 'position:fixed;top:-9999px;left:-9999px;width:0;height:0;border:none';
    document.body.appendChild(frame);
  }
  frame.srcdoc = html;
  frame.onload = () => { frame.contentWindow.focus(); frame.contentWindow.print(); };
}

// ── INIT ──────────────────────────────────────────────
render();
</script>
